<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вхід — School Kingdoms</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#13315f; --navy-d:#0c2247; --navy-l:#1e4d8b;
    --green:#2c7a4b; --gold:#F2C75C; --gold-d:#C9942F;
    --cream:#FBEFD0; --ink:#16315c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{font-family:'Nunito',sans-serif;color:#fff;min-height:100vh;position:relative;
    display:flex;flex-direction:column;overflow-x:hidden}

  /* ── Фон: зоряне небо (як на лендінгу) ── */
  .bg-fallback{position:fixed;inset:0;z-index:-3;
    background:radial-gradient(120% 90% at 50% 0%,#2d1b6b 0%,#1a1040 45%,#0d2647 100%)}
  .stars{position:fixed;inset:0;z-index:-2;overflow:hidden}
  .stars::before,.stars::after{content:"";position:absolute;inset:-50%;
    background-image:
      radial-gradient(1.6px 1.6px at 40px 60px,#fff,transparent),
      radial-gradient(1.4px 1.4px at 130px 170px,#fff,transparent),
      radial-gradient(1px 1px at 210px 90px,#cfe3ff,transparent),
      radial-gradient(1.3px 1.3px at 300px 230px,#fff,transparent),
      radial-gradient(1px 1px at 360px 40px,#ffe9b8,transparent),
      radial-gradient(1.5px 1.5px at 80px 300px,#fff,transparent);
    background-repeat:repeat;background-size:400px 400px;animation:twinkle 4.5s ease-in-out infinite}
  .stars::after{background-size:300px 300px;background-position:90px 130px;animation-duration:6.5s;animation-delay:1.6s;opacity:.7}
  @keyframes twinkle{0%,100%{opacity:.35}50%{opacity:.95}}
  .moon{position:fixed;top:8%;right:9%;width:120px;height:120px;z-index:-2;border-radius:50%;
    background:radial-gradient(circle at 38% 38%,#fff7e0 0%,#ffe9b8 38%,rgba(255,233,184,0) 70%);
    filter:blur(2px);opacity:.85;pointer-events:none}
  @media(prefers-reduced-motion:reduce){.stars::before,.stars::after{animation:none}}

  /* ── Шапка ── */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px clamp(16px,4vw,48px)}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:#fff}
  .brand .crest{font-size:2rem;filter:drop-shadow(0 3px 5px rgba(0,0,0,.45))}
  .brand-name{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(1.3rem,3vw,1.7rem);
    text-shadow:0 2px 5px rgba(0,0,0,.45);letter-spacing:.4px}
  .brand-name b{color:var(--gold)}
  .brand-sub{font-size:.72rem;color:#ffe9b8;font-weight:600;margin-top:1px}

  /* ── Картка входу ── */
  .auth-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 16px 50px}

  .auth-card{width:100%;max-width:440px;border:2px solid rgba(242,199,92,.85);border-radius:24px;
    padding:clamp(22px,4vw,32px);background:linear-gradient(165deg,rgba(39,81,140,.62),rgba(16,40,82,.7));
    backdrop-filter:blur(10px) saturate(1.15);-webkit-backdrop-filter:blur(10px) saturate(1.15);
    box-shadow:0 18px 44px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.16)}
  .auth-title{font-family:'Playfair Display',serif;font-weight:800;font-size:1.7rem;text-align:center;color:#FBEFD0;margin-bottom:4px}
  .auth-sub{text-align:center;color:#cdd9ef;font-weight:600;font-size:.92rem;margin-bottom:18px;line-height:1.4}

  /* ── Перемикач Батьки / Дитина ── */
  .tabs{display:flex;gap:8px;background:rgba(0,0,0,.25);border-radius:14px;padding:5px;margin-bottom:20px}
  .tabs button{flex:1;border:none;border-radius:10px;padding:11px 6px;font-family:'Nunito',sans-serif;
    font-weight:800;font-size:.92rem;color:#cdd9ef;background:transparent;cursor:pointer;transition:.15s}
  .tabs button.active{background:linear-gradient(180deg,#27518c,#16356a);color:#fff;
    box-shadow:0 3px 10px rgba(0,0,0,.3),inset 0 0 0 1.5px var(--gold)}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:.74rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#ffe9b8;margin-bottom:6px}
  .field input{width:100%;padding:13px 14px;border:1.5px solid rgba(242,199,92,.4);border-radius:13px;
    background:rgba(8,20,42,.55);color:#fff;font-size:1rem;font-family:'Nunito',sans-serif;font-weight:600;transition:.15s}
  .field input::placeholder{color:#8ea3c4}
  .field input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 4px rgba(242,199,92,.2)}

  .btn{width:100%;padding:14px;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:800;
    font-size:1.02rem;cursor:pointer;transition:transform .15s,box-shadow .15s;margin-top:4px}
  .btn:active{transform:translateY(1px)}
  .btn-gold{background:linear-gradient(180deg,#FFE7A0,#E0A93A);color:#5a3d08;border:2px solid var(--gold-d);
    box-shadow:0 8px 18px rgba(216,159,34,.4)}
  .btn-gold:hover{filter:brightness(1.05)}
  .btn-blue{background:linear-gradient(180deg,#27518c,#16356a);color:#fff;border:2px solid var(--gold);
    box-shadow:0 8px 18px rgba(0,0,0,.35)}
  .btn-blue:hover{filter:brightness(1.08)}

  .row-link{text-align:center;margin-top:14px}
  .link{background:none;border:none;color:#ffe9b8;font-family:'Nunito',sans-serif;font-weight:700;
    font-size:.88rem;cursor:pointer;text-decoration:underline;padding:2px}
  .divider{display:flex;align-items:center;gap:12px;color:#9fb2d2;font-size:.78rem;font-weight:700;margin:18px 0 12px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(242,199,92,.3)}

  /* ── Профілі дітей ── */
  .child-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;margin-bottom:16px}
  .avatar-option{border:2px solid rgba(242,199,92,.4);border-radius:16px;padding:12px 6px;text-align:center;
    cursor:pointer;background:rgba(8,20,42,.4);transition:.15s}
  .avatar-option:hover{border-color:var(--gold);transform:translateY(-2px)}
  .avatar-option.selected{border-color:#FFE7A0;background:rgba(242,199,92,.18);box-shadow:0 0 0 2px rgba(242,199,92,.5)}
  .avatar-option .emoji{font-size:2rem;display:block}
  .avatar-option .name{font-weight:800;font-size:.88rem;margin-top:4px;display:block;color:#fff}
  .info-msg{grid-column:1/-1;text-align:center;color:#cdd9ef;font-weight:600;font-size:.9rem;padding:8px 0;line-height:1.4}

  /* ── PIN ── */
  .pin-label{text-align:center;font-size:.74rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#ffe9b8;margin:4px 0 8px}
  .pin-wrap{display:flex;gap:10px;justify-content:center;margin-bottom:8px}
  .pin-digit{width:52px;height:60px;text-align:center;font-size:1.7rem;font-weight:800;font-family:'Playfair Display',serif;
    border:1.5px solid rgba(242,199,92,.45);border-radius:14px;background:rgba(8,20,42,.55);color:#fff;transition:.15s}
  .pin-digit:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 4px rgba(242,199,92,.22)}
  .pin-digit.filled{border-color:var(--gold);background:rgba(242,199,92,.12)}

  .hidden{display:none !important}

  /* ── Тост ── */
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:#0c2247;border:2px solid var(--gold);color:#fff;font-weight:700;padding:12px 20px;border-radius:14px;
    box-shadow:0 10px 28px rgba(0,0,0,.5);transition:.25s;z-index:60;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <div class="bg-fallback"></div>
  <div class="stars"></div>
  <div class="moon"></div>

  <header class="topbar">
    <a class="brand" href="index.html" aria-label="School Kingdoms — на головну">
      <span class="crest" aria-hidden="true">🛡️</span>
      <span><span class="brand-name">School <b>Kingdoms</b></span><span class="brand-sub">Моє королівство знань</span></span>
    </a>
  </header>

  <main class="auth-wrap">
    <div class="auth-card">
      <div class="auth-title">Вхід до королівства</div>
      <div class="auth-sub">Оберіть, хто заходить у систему.</div>

      <div class="tabs">
        <button id="tabParent" class="active" onclick="showTab('parent')">Я — user</button>
        <button id="tabChild" onclick="showTab('hero')">Я — Герой</button>
      </div>

      <!-- ── ФОРМА БАТЬКІВ ── -->
      <section id="parentForm">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" type="email" autocomplete="email" placeholder="name@example.com">
        </div>
        <div class="field">
          <label for="loginPass">Пароль</label>
          <input id="loginPass" type="password" autocomplete="current-password" placeholder="••••••••">
        </div>
        <button class="btn btn-blue" onclick="doParentLogin()">Увійти</button>
        <div class="row-link"><button class="link" onclick="forgotPass()">Забули пароль?</button></div>
      </section>

      <!-- ── ФОРМА ГЕРОЯ ── -->
      <section id="childForm" class="hidden">
        <div class="auth-sub" style="margin-top:-4px">Введи свій логін і пароль Героя.</div>
        <div class="field">
          <label for="heroLogin">Логін Героя</label>
          <input id="heroLogin" type="text" autocomplete="username" autocapitalize="none"
                 spellcheck="false" placeholder="напр. lev2024">
        </div>
        <div class="field">
          <label for="heroPass">Пароль</label>
          <input id="heroPass" type="password" autocomplete="current-password" placeholder="••••••••">
        </div>
        <button class="btn btn-gold" onclick="doHeroLogin()">Почати пригоду ⚡</button>
        <div class="divider">потрібен дорослий?</div>
        <button class="btn btn-blue" onclick="showTab('parent')">Вхід для user</button>
      </section>
    </div>

    <!-- ── Посилання на реєстрацію (стиль як на auth.html) ── -->
    <div class="row-link">
      <button class="link" onclick="location.href='auth.html'">Немає акаунту? Зареєструватися</button>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <!-- Реальний вхід через спільний firebase-config.js -->
  <script type="module" src="firebase-config.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    // 'hero' (новий) або 'child' (старий) → одразу вкладка Героя
    const authNext = params.get('next') || '';
    const wantHeroFirst = (authNext === 'hero' || authNext === 'child');

    function $(id){ return document.getElementById(id); }
    let toastT;
    function toast(msg){
      const t = $('toast'); t.textContent = msg; t.classList.add('show');
      clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove('show'), 2600);
    }
    function friendlyAuthError(e){
      const c = (e && e.code) || '';
      if (c.includes('sk/login-too-short')) return 'логін закороткий';
      if (c.includes('invalid-credential') || c.includes('wrong-password') || c.includes('user-not-found')) return 'невірний логін/email або пароль';
      if (c.includes('invalid-email')) return 'некоректний логін або email';
      if (c.includes('too-many-requests')) return 'забагато спроб, спробуйте пізніше';
      if (c.includes('network')) return 'немає зв\'язку з мережею';
      return 'спробуйте ще раз';
    }

    function showTab(which){
      const isHero = (which === 'hero' || which === 'child');
      $('tabParent').classList.toggle('active', !isHero);
      $('tabChild').classList.toggle('active', isHero);
      $('parentForm').classList.toggle('hidden', isHero);
      $('childForm').classList.toggle('hidden', !isHero);
      if (isHero) { const h = $('heroLogin'); if (h) h.focus(); }
    }

    // дочекатися firebase-config (SK)
    function whenSK(cb){
      let n = 0;
      (function wait(){
        if (window.SK && SK.ready){ SK.ready.then(cb); return; }
        if (n++ < 100) setTimeout(wait, 50);
      })();
    }

    // на старті: залогінених ведемо в їхній кабінет
    whenSK(function(u){
      if (u){
        location.replace(SK.isHeroSession() ? 'hero.html' : 'parent.html');
      } else {
        showTab(wantHeroFirst ? 'hero' : 'parent');
      }
    });

    async function doParentLogin(){
      const email = $('loginEmail').value.trim();
      const pass  = $('loginPass').value;
      if (!email || !pass){ toast('⚠️ Введіть email і пароль'); return; }
      if (!window.SK){ toast('⚠️ Зачекайте, ще завантажується…'); return; }
      try{
        await SK.login(email, pass);
        location.href = 'parent.html';
      }catch(e){
        toast('❌ Не вдалося увійти: ' + friendlyAuthError(e));
      }
    }

    async function doHeroLogin(){
      const login = $('heroLogin').value.trim();
      const pass  = $('heroPass').value;
      if (!login || !pass){ toast('⚠️ Введіть логін і пароль'); return; }
      if (!window.SK){ toast('⚠️ Зачекайте, ще завантажується…'); return; }
      try{
        await SK.heroLogin(login, pass);
        location.href = 'hero.html';
      }catch(e){
        console.warn('[login] heroLogin:', e);
        toast('❌ Не вдалося увійти: ' + friendlyAuthError(e));
      }
    }

    function forgotPass(){
      toast('Відновлення пароля зʼявиться згодом. Поки що зверніться до підтримки.');
    }
  </script>
</body>
</html>
