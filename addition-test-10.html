<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>➕ Додавання в межах 10</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#0d1b3e;--indigo:#1a2a5e;--violet:#2d1b4e;--brand-red:#E5383B;--gold:#ffd54a;--green:#4CAF50}
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,var(--navy) 0%,var(--indigo) 50%,var(--violet) 100%);min-height:100vh;color:#fff;overflow-x:hidden;touch-action:manipulation}
.stars-bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.star-dot{position:absolute;background:#fff;border-radius:50%;animation:tw var(--dur,3s) infinite ease-in-out}
@keyframes tw{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
#app{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:14px 14px 28px;min-height:100vh;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
.brand{font-family:'Fredoka One',cursive;font-size:1.05rem;color:var(--gold)}
.back-btn{background:rgba(255,255,255,.1);border:none;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;padding:8px 14px;border-radius:12px;font-size:.85rem;cursor:pointer;transition:.15s;text-decoration:none;display:inline-block}
.back-btn:active{transform:scale(.95)}
.xp-badge{background:rgba(255,213,74,.15);border:1px solid rgba(255,213,74,.35);color:var(--gold);padding:6px 12px;border-radius:12px;font-weight:800;font-size:.85rem;transition:background .3s;white-space:nowrap}
.xp-badge.flash{background:rgba(255,213,74,.45)}

/* MENU */
.page-title{text-align:center;margin:4px 0 14px}
.page-title h1{font-family:'Fredoka One',cursive;font-size:1.9rem;color:var(--gold);text-shadow:0 0 26px rgba(255,213,74,.5)}
.page-title p{color:rgba(255,255,255,.5);font-size:.86rem;margin-top:4px}

.lv-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lv-card{
  background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);
  border-radius:18px;padding:14px 12px;cursor:pointer;transition:.18s;
  display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;position:relative
}
.lv-card:active{transform:scale(.96)}
.lv-card.locked{opacity:.45;cursor:not-allowed}
.lv-card.done{border-color:rgba(255,213,74,.4);background:rgba(255,213,74,.07)}
.lv-circle{
  width:46px;height:46px;border-radius:50%;
  background:linear-gradient(135deg,var(--brand-red),#c62828);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;font-size:1.5rem;color:#fff;margin-bottom:2px;
  box-shadow:0 4px 14px rgba(229,56,59,.35)
}
.lv-card.locked .lv-circle{background:rgba(255,255,255,.12);box-shadow:none}
.lv-card.done .lv-circle{background:linear-gradient(135deg,var(--gold),#f5a623);color:#3a2a00;box-shadow:0 4px 14px rgba(255,213,74,.35)}
.lv-name{font-weight:800;font-size:.82rem}
.lv-count{font-size:.72rem;color:rgba(255,255,255,.5)}
.lv-stars{font-size:.78rem;letter-spacing:1px;min-height:16px;color:var(--gold)}
.lv-lock{position:absolute;top:8px;right:10px;font-size:.85rem}

/* QUIZ */
.quiz-prog{height:7px;background:rgba(255,255,255,.15);border-radius:4px;margin-bottom:6px;overflow:hidden}
.quiz-prog-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .3s ease}
.quiz-top{display:flex;justify-content:space-between;font-size:.8rem;color:rgba(255,255,255,.45);margin-bottom:12px}
.quiz-lvl{font-weight:800;color:rgba(255,255,255,.6)}

.q-card{
  background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);
  border-radius:24px;padding:24px 16px;text-align:center;margin-bottom:12px;
  animation:pop .3s ease;display:flex;flex-direction:column;align-items:center;gap:12px
}
@keyframes pop{0%{opacity:0;transform:scale(.93)}100%{opacity:1;transform:scale(1)}}
.q-expr{font-family:'Fredoka One',cursive;font-size:clamp(2.6rem,11vw,3.6rem);line-height:1;color:#fff}
.q-expr .plus{color:var(--gold)}
.q-expr .eq{color:rgba(255,255,255,.5)}
.q-expr .blank{color:var(--brand-red)}
.q-word{font-size:1.15rem;font-weight:700;line-height:1.55;color:#fff}
.q-word b{color:var(--gold);font-size:1.3rem}
.tts-btn{background:linear-gradient(135deg,#3949ab,#283593);border:none;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;padding:8px 16px;border-radius:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s}
.tts-btn:active{transform:scale(.97)}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{
  background:rgba(255,255,255,.09);border:2px solid rgba(255,255,255,.2);
  border-radius:18px;padding:16px;cursor:pointer;transition:.13s;
  font-family:'Fredoka One',cursive;font-size:2rem;color:#fff;min-height:72px;
  display:flex;align-items:center;justify-content:center
}
.opt:active{transform:scale(.96)}
.opt.correct{background:rgba(76,175,80,.32);border-color:var(--green);animation:pg .4s ease}
.opt.wrong{background:rgba(229,56,59,.32);border-color:var(--brand-red);animation:shake .4s}
.opt.disabled{pointer-events:none}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
@keyframes pg{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}

.feedback{text-align:center;font-size:1rem;font-weight:800;min-height:30px;margin:10px 0;line-height:30px}
.nav-btn{width:100%;background:linear-gradient(135deg,var(--brand-red),#c62828);border:none;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;padding:14px;border-radius:16px;cursor:pointer;box-shadow:0 4px 16px rgba(229,56,59,.32);transition:.15s}
.nav-btn:active{transform:scale(.97)}
.nav-btn.ghost{background:rgba(255,255,255,.1);box-shadow:none;margin-top:8px}

/* RESULT */
.result-box{display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px 0;flex:1;justify-content:center}
.result-stars{font-size:3rem;letter-spacing:8px;animation:pop .4s ease}
.result-title{font-family:'Fredoka One',cursive;font-size:1.9rem;color:var(--gold)}
.result-score{font-size:1rem;color:rgba(255,255,255,.65)}
.result-xp{font-size:1.25rem;font-weight:800;color:var(--gold);background:rgba(255,213,74,.12);border:1px solid rgba(255,213,74,.3);padding:8px 24px;border-radius:14px}
.result-lvl{font-size:.78rem;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase}
</style>
</head>
<body>
<div class="stars-bg" id="stars"></div>
<div id="app"></div>

<script>
(function(){
'use strict';

/* ─── CONFIG ─── */
// 10 levels, question count = level*5  → 5,10,15,...,50. All addition within 10.
const LEVEL_COUNT = 10;
const NAMES = ['Перший крок','Маленький рахівник','Спритні пальчики','Юний математик',
               'Знавець десятки','Швидкий розум','Пошук числа','Кмітливий учень',
               'Майстер задач','Чемпіон додавання'];

const XP_KEY  = 'sk_add_xp_v1';
const UNL_KEY = 'sk_add_unlocked_v1';
const STAR_KEY= 'sk_add_stars_v1';

let xp       = parseInt(localStorage.getItem(XP_KEY) || '0');
let unlocked = parseInt(localStorage.getItem(UNL_KEY) || '1');
let starsMap = {};
try { starsMap = JSON.parse(localStorage.getItem(STAR_KEY) || '{}'); } catch(e){ starsMap = {}; }

let ST = {screen:'menu'};

/* ─── STARS BG ─── */
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<55;i++){
    const d=document.createElement('div');
    d.className='star-dot';
    const s=Math.random()*2.5+.8;
    d.style.cssText=`width:${s}px;height:${s}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${(2+Math.random()*4).toFixed(1)}s;animation-delay:${(Math.random()*6).toFixed(1)}s`;
    c.appendChild(d);
  }
})();

/* ─── HELPERS ─── */
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function shuffle(a){ const r=a.slice(); for(let i=r.length-1;i>0;i--){ const j=randInt(0,i); [r[i],r[j]]=[r[j],r[i]]; } return r; }
function save(k,v){ try{ localStorage.setItem(k, typeof v==='string'?v:JSON.stringify(v)); }catch(e){} }

const NUM_WORDS = ['нуль','один','два','три','чотири','п\'ять','шість','сім','вісім','дев\'ять','десять'];
function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='uk-UA'; u.rate=0.82; u.pitch=1.1;
  window.speechSynthesis.speak(u);
}
function flashXP(){
  document.querySelectorAll('.xp-badge').forEach(el=>{
    el.textContent='⭐ '+xp+' XP'; el.classList.add('flash');
    setTimeout(()=>el.classList.remove('flash'),500);
  });
}

/* ─── QUESTION GENERATORS (all within 10) ─── */
// type 'sum'    : a + b = ?
// type 'missing': a + ? = c   /   ? + b = c
// type 'word'   : текстова задача
function genSum(){
  const sum=randInt(2,10), a=randInt(1,sum-1), b=sum-a;
  return {kind:'sum', a, b, answer:sum,
          html:`<span>${a}</span> <span class="plus">+</span> <span>${b}</span> <span class="eq">=</span> <span class="blank">?</span>`,
          speech:`${NUM_WORDS[a]} плюс ${NUM_WORDS[b]}`};
}
function genMissing(){
  const sum=randInt(3,10), a=randInt(1,sum-1), b=sum-a;
  if(Math.random()<0.5){
    return {kind:'missing', answer:b,
      html:`<span>${a}</span> <span class="plus">+</span> <span class="blank">?</span> <span class="eq">=</span> <span>${sum}</span>`,
      speech:`${NUM_WORDS[a]} плюс скільки дорівнює ${NUM_WORDS[sum]}`};
  } else {
    return {kind:'missing', answer:a,
      html:`<span class="blank">?</span> <span class="plus">+</span> <span>${b}</span> <span class="eq">=</span> <span>${sum}</span>`,
      speech:`Скільки плюс ${NUM_WORDS[b]} дорівнює ${NUM_WORDS[sum]}`};
  }
}
const WORD_TPL = [
  (a,b)=>`У Марійки було <b>${a}</b> 🍎, тато дав ще <b>${b}</b> 🍎. Скільки яблук стало?`,
  (a,b)=>`На гілці сиділо <b>${a}</b> 🐦, прилетіло ще <b>${b}</b> 🐦. Скільки птахів разом?`,
  (a,b)=>`У вазі <b>${a}</b> 🌸, поставили ще <b>${b}</b> 🌸. Скільки квітів у вазі?`,
  (a,b)=>`Олег зліпив <b>${a}</b> ⛄, а Іра ще <b>${b}</b> ⛄. Скільки сніговиків разом?`,
  (a,b)=>`У коробці <b>${a}</b> 🚗, поклали ще <b>${b}</b> 🚗. Скільки машинок стало?`,
  (a,b)=>`На тарілці <b>${a}</b> 🍓, мама додала <b>${b}</b> 🍓. Скільки полуниць разом?`
];
function genWord(){
  const sum=randInt(3,10), a=randInt(1,sum-1), b=sum-a;
  const tpl=WORD_TPL[randInt(0,WORD_TPL.length-1)];
  return {kind:'word', answer:sum, text:tpl(a,b),
          speech:`${NUM_WORDS[a]} додати ${NUM_WORDS[b]}`};
}

function pickGenerator(level){
  // Складність наростає, але все лишається в межах 10
  if(level<=3) return genSum();
  if(level<=6) return Math.random()<0.7 ? genSum() : genMissing();
  if(level<=8) { const r=Math.random(); return r<0.5?genSum() : r<0.8?genMissing() : genWord(); }
  // 9-10
  { const r=Math.random(); return r<0.4?genSum() : r<0.7?genMissing() : genWord(); }
}

function makeOptions(answer){
  const set=new Set([answer]);
  let guard=0;
  while(set.size<4 && guard<40){
    let d=answer+randInt(-3,3);
    if(d>=0 && d<=10 && d!==answer) set.add(d);
    guard++;
  }
  // якщо раптом мало варіантів — добиваємо
  let fill=0;
  while(set.size<4 && fill<=10){ if(!set.has(fill)) set.add(fill); fill++; }
  return shuffle([...set]);
}

function buildQuestions(level){
  const total=level*5;
  const list=[];
  for(let i=0;i<total;i++){
    let q=pickGenerator(level);
    // уникаємо 3 однакових відповідей поспіль
    const recent=list.slice(-2).map(x=>x.answer);
    let tries=0;
    while(tries<8 && recent.length===2 && recent[0]===q.answer && recent[1]===q.answer){
      q=pickGenerator(level); tries++;
    }
    q.opts=makeOptions(q.answer);
    list.push(q);
  }
  return list;
}

/* ─── RENDER: MENU ─── */
const app=document.getElementById('app');

function renderMenu(){
  app.innerHTML=`
    <div class="topbar">
      <a class="back-btn" href="akademiya-geroya.html">← Академія</a>
      <span class="xp-badge">⭐ ${xp} XP</span>
    </div>
    <div class="page-title">
      <h1>➕ Додавання</h1>
      <p>В межах 10 · 10 рівнів · від 5 прикладів</p>
    </div>
    <div class="lv-grid">
      ${Array.from({length:LEVEL_COUNT},(_,i)=>{
        const lv=i+1;
        const locked=lv>unlocked;
        const stars=starsMap[lv]||0;
        const done=stars>0;
        return `
          <button class="lv-card ${locked?'locked':''} ${done?'done':''}"
            ${locked?'':`onclick="window.__app.startLevel(${lv})"`}>
            ${locked?'<span class="lv-lock">🔒</span>':''}
            <span class="lv-circle">${lv}</span>
            <span class="lv-name">${NAMES[i]}</span>
            <span class="lv-count">${lv*5} прикладів</span>
            <span class="lv-stars">${done?'⭐'.repeat(stars):(locked?'':'·')}</span>
          </button>`;
      }).join('')}
    </div>
  `;
}

/* ─── RENDER: QUIZ ─── */
function renderQuiz(){
  const q=ST.questions[ST.qIdx];
  const total=ST.questions.length;
  const pct=Math.round(ST.qIdx/total*100);

  const body = q.kind==='word'
    ? `<div class="q-word">${q.text}</div>`
    : `<div class="q-expr">${q.html}</div>`;

  app.innerHTML=`
    <div class="topbar">
      <button class="back-btn" onclick="window.__app.goMenu()">← Меню</button>
      <span class="xp-badge">⭐ ${xp} XP</span>
    </div>
    <div class="quiz-prog"><div class="quiz-prog-fill" style="width:${pct}%"></div></div>
    <div class="quiz-top">
      <span class="quiz-lvl">Рівень ${ST.level} · ${NAMES[ST.level-1]}</span>
      <span>${ST.qIdx+1} / ${total}</span>
    </div>
    <div class="q-card">
      ${body}
      <button class="tts-btn" onclick="window.__app.speakQ()">🔊 Послухати</button>
    </div>
    <div class="opts">
      ${q.opts.map((v,i)=>`
        <button class="opt" id="opt${i}" onclick="window.__app.answer(${i})">${v}</button>
      `).join('')}
    </div>
    <div class="feedback" id="fb"></div>
  `;
}

/* ─── RENDER: RESULT ─── */
function renderResult(){
  const total=ST.questions.length;
  const pct=ST.correct/total;
  const stars = pct>=0.9?3 : pct>=0.7?2 : 1;
  const gained=ST.correct*1;
  const isLast=ST.level>=LEVEL_COUNT;

  app.innerHTML=`
    <div class="topbar">
      <button class="back-btn" onclick="window.__app.goMenu()">← Меню</button>
      <span class="xp-badge">⭐ ${xp} XP</span>
    </div>
    <div class="result-box">
      <div class="result-lvl">Рівень ${ST.level} · ${NAMES[ST.level-1]}</div>
      <div class="result-stars">${'⭐'.repeat(stars)}</div>
      <div class="result-title">${stars===3?'Бездоганно!':stars===2?'Молодець!':'Готово!'}</div>
      <div class="result-score">${ST.correct} з ${total} правильно</div>
      <div class="result-xp">+${gained} XP</div>
      ${isLast
        ? `<button class="nav-btn" onclick="window.__app.goMenu()">🏆 До меню</button>`
        : `<button class="nav-btn" onclick="window.__app.startLevel(${ST.level+1})">Наступний рівень →</button>`}
      <button class="nav-btn ghost" onclick="window.__app.startLevel(${ST.level})">🔄 Цей рівень ще раз</button>
      <button class="nav-btn ghost" onclick="window.__app.goMenu()">← Усі рівні</button>
    </div>
  `;
}

/* ─── APP API ─── */
window.__app={
  goMenu(){
    if(ST.advanceTimer){ clearTimeout(ST.advanceTimer); ST.advanceTimer=null; }
    window.speechSynthesis && window.speechSynthesis.cancel();
    ST={screen:'menu'};
    renderMenu();
  },
  startLevel(lv){
    if(ST.advanceTimer){ clearTimeout(ST.advanceTimer); ST.advanceTimer=null; }
    ST={screen:'quiz', level:lv, questions:buildQuestions(lv), qIdx:0, correct:0, levelXp:0, answered:false};
    renderQuiz();
  },
  speakQ(){
    const q=ST.questions[ST.qIdx];
    speak(q.speech);
  },
  answer(i){
    if(ST.answered) return;
    ST.answered=true;
    const q=ST.questions[ST.qIdx];
    const chosen=q.opts[i];
    const ok=(chosen===q.answer);
    document.querySelectorAll('.opt').forEach(b=>b.classList.add('disabled'));

    const btn=document.getElementById('opt'+i);
    const fb=document.getElementById('fb');
    if(ok){
      btn.classList.add('correct');
      ST.correct++;
      xp+=1; ST.levelXp+=1; save(XP_KEY,String(xp)); flashXP();
      if(fb){ fb.textContent='✅ Правильно! +1 XP'; fb.style.color='#69DB7C'; }
    } else {
      btn.classList.add('wrong');
      const ci=q.opts.indexOf(q.answer);
      const cb=document.getElementById('opt'+ci);
      if(cb) cb.classList.add('correct');
      if(fb){ fb.textContent='❌ Правильно: '+q.answer+' · ХР рівня згорає'; fb.style.color='#FF6B6B'; }
    }
    // авто-перехід: правильна — далі; помилка — рівень спочатку, ХР за рівень обнуляється
    if(ST.advanceTimer) clearTimeout(ST.advanceTimer);
    if(ok){
      ST.advanceTimer=setTimeout(()=>this.next(), 850);
    } else {
      ST.advanceTimer=setTimeout(()=>{
        xp -= (ST.levelXp||0); if(xp<0) xp=0;
        save(XP_KEY,String(xp));
        this.startLevel(ST.level);
      }, 1700);
    }
  },
  next(){
    if(ST.advanceTimer){ clearTimeout(ST.advanceTimer); ST.advanceTimer=null; }
    ST.answered=false;
    ST.qIdx++;
    if(ST.qIdx>=ST.questions.length){
      // підсумок + збереження зірок/розблокування
      const total=ST.questions.length;
      const pct=ST.correct/total;
      const stars=pct>=0.9?3:pct>=0.7?2:1;
      if((starsMap[ST.level]||0)<stars){ starsMap[ST.level]=stars; save(STAR_KEY,starsMap); }
      if(ST.level===unlocked && unlocked<LEVEL_COUNT){ unlocked++; save(UNL_KEY,String(unlocked)); }
      ST.screen='result';
      renderResult();
    } else {
      renderQuiz();
    }
  }
};

renderMenu();
})();
</script>
</body>
</html>
