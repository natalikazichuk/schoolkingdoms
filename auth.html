<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Створити сім'ю — School Kingdoms</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#13315f; --navy-d:#0c2247; --navy-l:#1e4d8b;
    --green:#2c7a4b; --gold:#F2C75C; --gold-d:#C9942F;
    --cream:#FBEFD0; --ink:#16315c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{font-family:'Nunito',sans-serif;color:#fff;min-height:100vh;position:relative;
    display:flex;flex-direction:column;overflow-x:hidden}

  /* ── Фон: зоряне небо ── */
  .bg-fallback{position:fixed;inset:0;z-index:-3;
    background:radial-gradient(120% 90% at 50% 0%,#2d1b6b 0%,#1a1040 45%,#0d2647 100%)}
  .stars{position:fixed;inset:0;z-index:-2;overflow:hidden}
  .stars::before,.stars::after{content:"";position:absolute;inset:-50%;
    background-image:
      radial-gradient(1.6px 1.6px at 40px 60px,#fff,transparent),
      radial-gradient(1.4px 1.4px at 130px 170px,#fff,transparent),
      radial-gradient(1px 1px at 210px 90px,#cfe3ff,transparent),
      radial-gradient(1.3px 1.3px at 300px 230px,#fff,transparent),
      radial-gradient(1px 1px at 360px 40px,#ffe9b8,transparent),
      radial-gradient(1.5px 1.5px at 80px 300px,#fff,transparent);
    background-repeat:repeat;background-size:400px 400px;animation:twinkle 4.5s ease-in-out infinite}
  .stars::after{background-size:300px 300px;background-position:90px 130px;animation-duration:6.5s;animation-delay:1.6s;opacity:.7}
  @keyframes twinkle{0%,100%{opacity:.35}50%{opacity:.95}}
  .moon{position:fixed;top:8%;right:9%;width:120px;height:120px;z-index:-2;border-radius:50%;
    background:radial-gradient(circle at 38% 38%,#fff7e0 0%,#ffe9b8 38%,rgba(255,233,184,0) 70%);
    filter:blur(2px);opacity:.85;pointer-events:none}
  @media(prefers-reduced-motion:reduce){.stars::before,.stars::after{animation:none}}

  /* ── Шапка ── */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px clamp(16px,4vw,48px)}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:#fff}
  .brand .crest{font-size:2rem;filter:drop-shadow(0 3px 5px rgba(0,0,0,.45))}
  .brand-name{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(1.3rem,3vw,1.7rem);
    text-shadow:0 2px 5px rgba(0,0,0,.45);letter-spacing:.4px}
  .brand-name b{color:var(--gold)}
  .brand-sub{font-size:.72rem;color:#ffe9b8;font-weight:600;margin-top:1px}

  /* ── Картка ── */
  .auth-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 16px 50px}
  .auth-card{width:100%;max-width:460px;border:2px solid rgba(242,199,92,.85);border-radius:24px;
    padding:clamp(22px,4vw,32px);background:linear-gradient(165deg,rgba(39,81,140,.62),rgba(16,40,82,.7));
    backdrop-filter:blur(10px) saturate(1.15);-webkit-backdrop-filter:blur(10px) saturate(1.15);
    box-shadow:0 18px 44px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.16)}
  .auth-title{font-family:'Playfair Display',serif;font-weight:800;font-size:1.7rem;text-align:center;color:#FBEFD0;margin-bottom:4px}
  .auth-sub{text-align:center;color:#cdd9ef;font-weight:600;font-size:.92rem;margin-bottom:18px;line-height:1.4}

  /* ── Індикатор кроків ── */
  .steps{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px}
  .steps .dot{display:flex;align-items:center;gap:8px}
  .steps .num{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:.9rem;
    background:rgba(8,20,42,.55);border:1.5px solid rgba(242,199,92,.45);color:#cdd9ef;transition:.2s}
  .steps .num.active{background:linear-gradient(180deg,#FFE7A0,#E0A93A);color:#5a3d08;border-color:var(--gold-d)}
  .steps .num.done{background:var(--green);color:#fff;border-color:#3fae6a}
  .steps .lbl{font-size:.8rem;font-weight:700;color:#cdd9ef}
  .steps .lbl.active{color:#FBEFD0}
  .steps .bar{flex:0 0 26px;height:2px;background:rgba(242,199,92,.3);border-radius:2px}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:.74rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#ffe9b8;margin-bottom:6px}
  .field input,.field select{width:100%;padding:13px 14px;border:1.5px solid rgba(242,199,92,.4);border-radius:13px;
    background:rgba(8,20,42,.55);color:#fff;font-size:1rem;font-family:'Nunito',sans-serif;font-weight:600;transition:.15s}
  .field input::placeholder{color:#8ea3c4}
  .field input:focus,.field select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 4px rgba(242,199,92,.2)}
  .field select option{background:#0c2247;color:#fff}
  .pass-wrap{position:relative}
  .pass-wrap input{padding-right:46px}
  .pass-toggle{position:absolute;top:50%;right:8px;transform:translateY(-50%);width:34px;height:34px;
    display:grid;place-items:center;border:none;background:transparent;cursor:pointer;border-radius:9px;
    color:#cdd9ef;transition:.15s;padding:0}
  .pass-toggle:hover{color:#FBEFD0;background:rgba(242,199,92,.14)}
  .pass-toggle:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(242,199,92,.3)}
  .pass-toggle svg{width:20px;height:20px;display:block;fill:none;stroke:currentColor;stroke-width:2;
    stroke-linecap:round;stroke-linejoin:round}
  .field-row{display:flex;gap:12px}
  .field-row .field{flex:1}
  .hint{font-size:.76rem;color:#9fb2d2;font-weight:600;margin-top:5px;line-height:1.35}

  /* ── Роль батьків ── */
  .role-chips{display:flex;gap:8px;margin-bottom:14px}
  .role-chips button{flex:1;border:1.5px solid rgba(242,199,92,.4);border-radius:13px;padding:11px 6px;
    font-family:'Nunito',sans-serif;font-weight:800;font-size:.92rem;color:#cdd9ef;background:rgba(8,20,42,.4);
    cursor:pointer;transition:.15s}
  .role-chips button:hover{border-color:var(--gold)}
  .role-chips button.active{border-color:#FFE7A0;background:rgba(242,199,92,.18);color:#fff;
    box-shadow:0 0 0 2px rgba(242,199,92,.4)}

  .btn{width:100%;padding:14px;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:800;
    font-size:1.02rem;cursor:pointer;transition:transform .15s,box-shadow .15s,filter .15s;margin-top:4px}
  .btn:active{transform:translateY(1px)}
  .btn[disabled]{opacity:.6;cursor:default}
  .btn-gold{background:linear-gradient(180deg,#FFE7A0,#E0A93A);color:#5a3d08;border:2px solid var(--gold-d);
    box-shadow:0 8px 18px rgba(216,159,34,.4)}
  .btn-gold:hover{filter:brightness(1.05)}
  .btn-blue{background:linear-gradient(180deg,#27518c,#16356a);color:#fff;border:2px solid var(--gold);
    box-shadow:0 8px 18px rgba(0,0,0,.35)}
  .btn-blue:hover{filter:brightness(1.08)}

  .row-link{text-align:center;margin-top:14px}
  .link{background:none;border:none;color:#ffe9b8;font-family:'Nunito',sans-serif;font-weight:700;
    font-size:.88rem;cursor:pointer;text-decoration:underline;padding:2px}
  .divider{display:flex;align-items:center;gap:12px;color:#9fb2d2;font-size:.78rem;font-weight:700;margin:18px 0 12px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(242,199,92,.3)}

  /* ── Вибір аватара дитини ── */
  .avatar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:8px;margin-bottom:14px}
  .avatar-option{border:2px solid rgba(242,199,92,.4);border-radius:14px;padding:10px 4px;text-align:center;
    cursor:pointer;background:rgba(8,20,42,.4);transition:.15s;font-size:1.6rem}
  .avatar-option:hover{border-color:var(--gold);transform:translateY(-2px)}
  .avatar-option.selected{border-color:#FFE7A0;background:rgba(242,199,92,.18);box-shadow:0 0 0 2px rgba(242,199,92,.5)}

  /* ── PIN ── */
  .pin-label{text-align:center;font-size:.74rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#ffe9b8;margin:4px 0 8px}
  .pin-wrap{display:flex;gap:10px;justify-content:center;margin-bottom:8px}
  .pin-digit{width:52px;height:60px;text-align:center;font-size:1.7rem;font-weight:800;font-family:'Playfair Display',serif;
    border:1.5px solid rgba(242,199,92,.45);border-radius:14px;background:rgba(8,20,42,.55);color:#fff;transition:.15s}
  .pin-digit:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 4px rgba(242,199,92,.22)}
  .pin-digit.filled{border-color:var(--gold);background:rgba(242,199,92,.12)}

  .hidden{display:none !important}

  /* ── Тост ── */
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:#0c2247;border:2px solid var(--gold);color:#fff;font-weight:700;padding:12px 20px;border-radius:14px;
    box-shadow:0 10px 28px rgba(0,0,0,.5);transition:.25s;z-index:60;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <div class="bg-fallback"></div>
  <div class="stars"></div>
  <div class="moon"></div>

  <header class="topbar">
    <a class="brand" href="index.html" aria-label="School Kingdoms — на головну">
      <span class="crest" aria-hidden="true">🛡️</span>
      <span><span class="brand-name">School <b>Kingdoms</b></span><span class="brand-sub">Моє королівство знань</span></span>
    </a>
  </header>

  <main class="auth-wrap">
    <div class="auth-card">
      <div class="auth-title">Створи сім'ю</div>
      <div class="auth-sub" id="authSub">Лише два кроки — і ваше королівство готове.</div>

      <div class="steps">
        <div class="dot"><span class="num active" id="sNum1">1</span><span class="lbl active" id="sLbl1">Батьки</span></div>
        <span class="bar"></span>
        <div class="dot"><span class="num" id="sNum2">2</span><span class="lbl" id="sLbl2">Дитина</span></div>
      </div>

      <!-- ── КРОК 1: БАТЬКИ ── -->
      <section id="stepParent">
        <div class="field">
          <label for="pName">Ваше ім'я</label>
          <input id="pName" type="text" autocomplete="name" placeholder="Наприклад, Наталія">
        </div>

        <label style="display:block;font-size:.74rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#ffe9b8;margin-bottom:6px">Хто ви</label>
        <div class="role-chips" id="roleChips">
          <button type="button" data-role="мама" class="active" onclick="selectRole(this)">Мама</button>
          <button type="button" data-role="тато" onclick="selectRole(this)">Тато</button>
        </div>

        <div class="field">
          <label for="pEmail">Email</label>
          <input id="pEmail" type="email" autocomplete="email" placeholder="name@example.com">
        </div>
        <div class="field">
          <label for="pPass">Пароль</label>
          <div class="pass-wrap">
            <input id="pPass" type="password" autocomplete="new-password" placeholder="мінімум 6 символів">
            <button type="button" class="pass-toggle" aria-label="Показати пароль" aria-pressed="false" onclick="togglePass(this,'pPass')">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <label for="pPass2">Повторіть пароль</label>
          <div class="pass-wrap">
            <input id="pPass2" type="password" autocomplete="new-password" placeholder="••••••••">
            <button type="button" class="pass-toggle" aria-label="Показати пароль" aria-pressed="false" onclick="togglePass(this,'pPass2')">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button class="btn btn-gold" id="btnRegister" onclick="doRegister()">Створити сім'ю →</button>

        <div class="row-link">
          <button class="link" onclick="location.href='login.html'">Вже маєте акаунт? Увійти</button>
        </div>
      </section>

      <!-- ── КРОК 2: ДИТИНА ── -->
      <section id="stepChild" class="hidden">
        <div class="field">
          <label for="cName">Ім'я дитини</label>
          <input id="cName" type="text" placeholder="Наприклад, Софійка">
        </div>

        <label style="display:block;font-size:.74rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#ffe9b8;margin-bottom:6px">Аватар героя</label>
        <div class="avatar-grid" id="avatarGrid"></div>

        <div class="field-row">
          <div class="field">
            <label for="cAge">Вік</label>
            <input id="cAge" type="number" min="4" max="18" placeholder="7">
          </div>
          <div class="field">
            <label for="cGrade">Клас</label>
            <select id="cGrade">
              <option value="1">1 клас</option>
              <option value="2">2 клас</option>
              <option value="3">3 клас</option>
              <option value="4">4 клас</option>
              <option value="5">5 клас</option>
              <option value="6">6 клас</option>
              <option value="7">7 клас</option>
              <option value="8">8 клас</option>
              <option value="9">9 клас</option>
              <option value="10">10 клас</option>
              <option value="11">11 клас</option>
            </select>
          </div>
        </div>

        <div class="pin-label">PIN для входу дитини (4 цифри)</div>
        <div class="pin-wrap" id="pinWrap">
          <input class="pin-digit" type="tel" inputmode="numeric" maxlength="1" aria-label="Цифра 1">
          <input class="pin-digit" type="tel" inputmode="numeric" maxlength="1" aria-label="Цифра 2">
          <input class="pin-digit" type="tel" inputmode="numeric" maxlength="1" aria-label="Цифра 3">
          <input class="pin-digit" type="tel" inputmode="numeric" maxlength="1" aria-label="Цифра 4">
        </div>
        <div class="hint" style="text-align:center;margin-bottom:14px">Цей PIN дитина вводитиме сама при вході у свій кабінет.</div>

        <button class="btn btn-gold" id="btnFinish" onclick="doAddChildAndFinish()">Додати дитину і завершити →</button>

        <div class="divider">або</div>
        <button class="btn btn-blue" onclick="skipChild()">Пропустити — додам пізніше</button>
      </section>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script type="module" src="firebase-config.js"></script>
  <script>
    function $(id){ return document.getElementById(id); }
    let toastT;
    function toast(msg){
      const t = $('toast'); t.textContent = msg; t.classList.add('show');
      clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove('show'), 2800);
    }

    let selectedRole = 'мама';
    let selectedAvatar = '🦁';

    function friendlyAuthError(e){
      const c = (e && e.code) || '';
      if (c.includes('email-already-in-use')) return 'цей email уже зареєстровано — спробуйте увійти';
      if (c.includes('invalid-email'))        return 'некоректний email';
      if (c.includes('weak-password'))        return 'пароль закороткий (мінімум 6 символів)';
      if (c.includes('too-many-requests'))    return 'забагато спроб, спробуйте пізніше';
      if (c.includes('network'))              return 'немає зв\'язку з мережею';
      return 'спробуйте ще раз';
    }

    // дочекатися firebase-config (SK)
    function whenSK(cb){
      let n = 0;
      (function wait(){
        if (window.SK && SK.ready){ SK.ready.then(cb); return; }
        if (n++ < 100) setTimeout(wait, 50);
      })();
    }

    // вже залогінених не тримаємо на реєстрації
    whenSK(function(u){
      if (u) location.replace('parent.html');
    });

    function selectRole(btn){
      document.querySelectorAll('#roleChips button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedRole = btn.dataset.role;
    }

    // показати / приховати пароль
    const EYE_OPEN  = '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
    const EYE_CLOSED= '<path d="M3 3l18 18"/><path d="M10.6 10.6a3 3 0 0 0 4.2 4.2"/><path d="M9.4 5.2A9.6 9.6 0 0 1 12 5c6.5 0 10 7 10 7a16 16 0 0 1-3.1 3.9"/><path d="M6.1 6.1A16 16 0 0 0 2 12s3.5 7 10 7a9.5 9.5 0 0 0 3.9-.8"/>';
    function togglePass(btn, inputId){
      const inp = $(inputId);
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.querySelector('svg').innerHTML = show ? EYE_CLOSED : EYE_OPEN;
      btn.setAttribute('aria-pressed', show ? 'true' : 'false');
      btn.setAttribute('aria-label', show ? 'Приховати пароль' : 'Показати пароль');
    }

    // палітра аватарів героя
    const AVATARS = ['🦁','🐯','🦊','🐺','🐲','🦄','🐉','🦅','🐻','🐼','🦉','🐢'];
    (function buildAvatars(){
      const grid = $('avatarGrid');
      grid.innerHTML = AVATARS.map(a =>
        '<div class="avatar-option'+(a===selectedAvatar?' selected':'')+'" onclick="selectAvatar(this,\''+a+'\')">'+a+'</div>'
      ).join('');
    })();
    function selectAvatar(el, a){
      document.querySelectorAll('#avatarGrid .avatar-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      selectedAvatar = a;
    }

    // ── PIN: автоперехід, backspace, вставка ──
    const pinCells = Array.from(document.querySelectorAll('#pinWrap .pin-digit'));
    pinCells.forEach((cell, i) => {
      cell.addEventListener('input', () => {
        cell.value = cell.value.replace(/\D/g,'').slice(0,1);
        cell.classList.toggle('filled', cell.value !== '');
        if (cell.value && i < pinCells.length-1) pinCells[i+1].focus();
      });
      cell.addEventListener('keydown', ev => {
        if (ev.key === 'Backspace' && !cell.value && i > 0) pinCells[i-1].focus();
      });
      cell.addEventListener('paste', ev => {
        const d = (ev.clipboardData.getData('text')||'').replace(/\D/g,'').slice(0,4);
        if (!d) return; ev.preventDefault();
        d.split('').forEach((n,k)=>{ if(pinCells[k]){ pinCells[k].value=n; pinCells[k].classList.add('filled'); }});
        pinCells[Math.min(d.length, pinCells.length-1)].focus();
      });
    });
    function getPin(){ return pinCells.map(c=>c.value).join(''); }

    // ── КРОК 1 → реєстрація сім'ї ──
    async function doRegister(){
      const name  = $('pName').value.trim();
      const email = $('pEmail').value.trim();
      const pass  = $('pPass').value;
      const pass2 = $('pPass2').value;

      if (!name)               { toast('⚠️ Введіть ваше ім\'я'); return; }
      if (!email)              { toast('⚠️ Введіть email'); return; }
      if (pass.length < 6)     { toast('⚠️ Пароль — мінімум 6 символів'); return; }
      if (pass !== pass2)      { toast('⚠️ Паролі не збігаються'); return; }
      if (!window.SK)          { toast('⚠️ Зачекайте, ще завантажується…'); return; }

      const btn = $('btnRegister');
      btn.disabled = true; btn.textContent = 'Створюємо…';
      try{
        await SK.ready;
        await SK.registerFamily({ parentName: name, parentRole: selectedRole, email, password: pass });
        toast('✅ Сім\'ю створено!');
        goStep2();
      }catch(e){
        console.warn('[auth] registerFamily:', e);
        toast('❌ Не вдалося: ' + friendlyAuthError(e));
        btn.disabled = false; btn.textContent = 'Створити сім\'ю →';
      }
    }

    function goStep2(){
      $('stepParent').classList.add('hidden');
      $('stepChild').classList.remove('hidden');
      $('authSub').textContent = 'Додамо першого героя — або зробите це пізніше в кабінеті.';
      $('sNum1').classList.remove('active'); $('sNum1').classList.add('done'); $('sNum1').textContent = '✓';
      $('sLbl1').classList.remove('active');
      $('sNum2').classList.add('active'); $('sLbl2').classList.add('active');
      $('cName').focus();
    }

    // ── КРОК 2 → додати дитину ──
    async function doAddChildAndFinish(){
      const cName  = $('cName').value.trim();
      const cAge   = $('cAge').value;
      const cGrade = $('cGrade').value;
      const pin    = getPin();

      if (!cName)              { toast('⚠️ Введіть ім\'я дитини'); return; }
      if (!/^\d{4}$/.test(pin)){ toast('⚠️ PIN має бути з 4 цифр'); return; }
      if (!window.SK){ toast('⚠️ Зачекайте, ще завантажується…'); return; }

      const btn = $('btnFinish');
      btn.disabled = true; btn.textContent = 'Зберігаємо…';
      try{
        await SK.addChild({ name: cName, avatar: selectedAvatar, age: cAge, grade: cGrade, pin });
        toast('🎉 Готово! Вітаємо у королівстві.');
        setTimeout(()=>location.href = 'parent.html', 700);
      }catch(e){
        console.warn('[auth] addChild:', e);
        toast('❌ Не вдалося додати дитину. Спробуйте ще раз.');
        btn.disabled = false; btn.textContent = 'Додати дитину і завершити →';
      }
    }

    function skipChild(){
      location.href = 'parent.html';
    }
  </script>
</body>
</html>
