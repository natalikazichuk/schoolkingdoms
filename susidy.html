<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Цифри-сусіди — Числовий ряд</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-0:#0b1030; --navy-1:#141a44; --violet:#3a2b6e;
    --gold:#ffcf4d; --gold-deep:#e0a92e; --ink:#0a0e26;
    --text:#f4f1ff; --green:#7be0a4; --green-d:#2e9e54; --red:#ff8b8b;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; overflow:hidden;}
  body{
    font-family:"Fredoka",system-ui,sans-serif; background:var(--navy-0); color:var(--text);
    user-select:none; -webkit-user-select:none; touch-action:manipulation; overscroll-behavior:none;
  }
  #wrap{position:fixed; inset:0; display:flex; flex-direction:column;
    background:radial-gradient(120% 80% at 50% 0%,var(--violet),var(--navy-0) 60%);}

  /* ── top bar ── */
  #top{display:flex; align-items:center; gap:8px;
    padding:calc(env(safe-area-inset-top) + 10px) 12px 4px;}
  .pill{background:rgba(20,26,68,.72); border:2px solid rgba(255,207,77,.35);
    border-radius:14px; padding:7px 12px; font-weight:700; font-size:14px; white-space:nowrap;}
  .pill .lab{opacity:.7; font-size:11px; display:block; line-height:1;}
  .pill .val{font-size:18px; line-height:1.1;}
  .pill.q .val{color:var(--gold);}
  #spacer{flex:1;}
  #menuBtn{cursor:pointer; font-family:inherit; font-weight:700; font-size:14px;
    background:rgba(20,26,68,.72); border:2px solid rgba(255,207,77,.35); color:var(--text);
    border-radius:14px; padding:8px 12px;}

  /* ── progress ── */
  #barWrap{padding:8px 14px 2px;}
  #bar{height:10px; border-radius:999px; background:rgba(255,255,255,.1);
    border:1px solid rgba(255,207,77,.25); overflow:hidden;}
  #barFill{height:100%; width:0%; border-radius:999px;
    background:linear-gradient(90deg,#FFE7A0,var(--gold-deep));
    box-shadow:0 0 12px rgba(255,207,77,.5); transition:width .35s;}

  /* ── вулиця з будиночками ── */
  #rowWrap{flex:1 1 auto; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:12px; padding:6px 10px;}
  #hint{font-weight:600; font-size:15px; opacity:.9; min-height:22px; text-align:center;}
  #hint b{color:var(--gold);}

  #row{position:relative; display:flex; align-items:flex-end; justify-content:center;
    gap:clamp(8px,3vw,18px); max-width:100%; padding-bottom:12px;}
  #row::after{content:""; position:absolute; left:0; right:0; bottom:0;
    height:8px; border-radius:999px;
    background:linear-gradient(90deg,rgba(255,207,77,0),rgba(255,207,77,.4),rgba(255,207,77,0));}

  .house{position:relative; z-index:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:2px;
    width:clamp(76px,25vw,116px); height:clamp(86px,27vw,128px);
    border-radius:0 0 18px 18px;
    border:2px solid rgba(255,207,77,.3); border-top:none;
    background:linear-gradient(180deg,rgba(38,48,107,.95),rgba(18,22,60,.95));
    box-shadow:0 5px 0 rgba(0,0,0,.28), 0 8px 18px rgba(0,0,0,.35);}
  /* дах */
  .house::before{content:""; position:absolute; left:-6px; right:-6px; top:0;
    height:clamp(18px,5.5vw,26px); transform:translateY(-100%);
    background:linear-gradient(180deg,#FFE7A0,var(--gold-deep));
    clip-path:polygon(50% 0%, 100% 100%, 0% 100%);
    filter:drop-shadow(0 3px 5px rgba(0,0,0,.4));}
  .house .ico{font-size:clamp(18px,5.4vw,26px); line-height:1;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.45));}
  .house .val{font-size:clamp(26px,8vw,40px); font-weight:700; line-height:1.05;
    color:var(--text); text-shadow:0 2px 6px rgba(0,0,0,.45);}

  .house.center{border-color:var(--gold); box-shadow:0 5px 0 rgba(0,0,0,.28),
    0 8px 18px rgba(0,0,0,.35), 0 0 22px rgba(255,207,77,.28);}

  .house.socket{border:3px dashed rgba(255,207,77,.6); border-top:none;
    background:rgba(255,207,77,.07);
    box-shadow:inset 0 0 18px rgba(255,207,77,.12);
    transition:box-shadow .15s, border-color .15s, background .2s, transform .2s;}
  .house.socket::before{opacity:.45;}
  .house.socket .ico{opacity:.35; filter:grayscale(.6);}
  .house.socket .val{color:var(--gold);}
  .house.socket.active{border-color:rgba(255,207,77,.95);}
  .house.socket.active::before{opacity:.8;}
  .house.socket.hot{border-color:var(--gold); background:rgba(255,207,77,.18);
    box-shadow:inset 0 0 22px rgba(255,207,77,.35), 0 0 16px rgba(255,207,77,.35);
    transform:translateY(-4px);}
  .house.socket.good{border-style:solid; border-color:var(--green);
    background:rgba(123,224,164,.18); box-shadow:inset 0 0 20px rgba(123,224,164,.35);}
  .house.socket.good::before{opacity:1;}
  .house.socket.good .ico{opacity:1; filter:none;}
  .house.socket.good .val{color:var(--green);}
  .house.socket.bad{animation:shake .34s;}
  .house.pop{animation:pop .34s;}
  @keyframes pop{0%{transform:scale(.6)}60%{transform:scale(1.1)}100%{transform:scale(1)}}

  /* ── лоток з цифрами ── */
  #tray{display:flex; align-items:center; justify-content:center; gap:clamp(6px,2.4vw,14px);
    padding:8px 10px calc(env(safe-area-inset-bottom) + 16px); flex-wrap:wrap;}
  .piece{position:relative; cursor:grab; touch-action:none; font-family:inherit; font-weight:700;
    width:clamp(52px,15.5vw,80px); height:clamp(52px,15.5vw,80px);
    font-size:clamp(22px,6.6vw,36px); color:#4a3300;
    background:linear-gradient(180deg,#FFE7A0,var(--gold-deep));
    border:none; border-radius:18px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 0 #a9761a, 0 10px 20px rgba(0,0,0,.4);
    transition:transform .12s, box-shadow .12s; will-change:transform;}
  .piece::before{content:""; position:absolute; top:-9px; left:50%; transform:translateX(-50%);
    width:24px; height:15px; background:inherit; border-radius:50%;}
  .piece:active{cursor:grabbing;}
  .piece.dragging{transition:none; box-shadow:0 12px 26px rgba(0,0,0,.5); z-index:50; opacity:.96;}
  .piece.flyto{transition:transform .22s cubic-bezier(.3,.9,.3,1.2);}
  .piece.wrong{animation:shake .34s;}
  .piece.placed{opacity:0; transform:scale(.3); pointer-events:none;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}
    40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}

  /* ── overlays ── */
  .screen{position:absolute; inset:0; z-index:60; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:24px; gap:14px;
    background:radial-gradient(120% 90% at 50% 25%,rgba(58,43,110,.72),rgba(11,16,48,.96)); backdrop-filter:blur(2px);}
  .screen.hidden{display:none;}
  .crown{font-size:52px; filter:drop-shadow(0 4px 12px rgba(255,207,77,.45));}
  .title{font-size:28px; font-weight:700; color:var(--gold); line-height:1.12;}
  .sub{font-size:15px; opacity:.86; max-width:340px; line-height:1.45;}
  .cta{margin-top:6px; border:none; cursor:pointer; font-family:inherit; font-weight:700;
    background:linear-gradient(180deg,var(--gold),var(--gold-deep)); color:#3a2a00;
    font-size:18px; padding:14px 42px; border-radius:999px;
    box-shadow:0 5px 0 rgba(0,0,0,.3); transition:transform .06s;}
  .cta:active{transform:translateY(3px); box-shadow:0 2px 0 rgba(0,0,0,.3);}
  .linkbtn{cursor:pointer; font-family:inherit; font-weight:700; font-size:14px; text-decoration:none;
    background:rgba(20,26,68,.72); border:2px solid rgba(255,207,77,.35); color:var(--text);
    border-radius:999px; padding:11px 22px;}
  .stars{font-size:40px; letter-spacing:6px;}
  .winrow{display:flex; gap:10px; flex-wrap:wrap; justify-content:center;}
</style>
</head>
<body>
<div id="wrap">
  <div id="top">
    <div class="pill q"><span class="lab">Питання</span><span class="val" id="qNum">1/20</span></div>
    <div class="pill"><span class="lab">Очки</span><span class="val" id="score">0</span></div>
    <div id="spacer"></div>
    <button id="menuBtn">☰ Меню</button>
  </div>

  <div id="barWrap"><div id="bar"><div id="barFill"></div></div></div>

  <div id="rowWrap">
    <div id="hint">Знайди сусідів числа</div>
    <div id="row"></div>
  </div>

  <div id="tray"></div>

  <!-- start / menu -->
  <div class="screen" id="startScreen">
    <div class="crown">🏘️</div>
    <div class="title">Цифри-сусіди</div>
    <div class="sub">На вулиці числа живуть по порядку. Постав сусідів — число <b>перед</b> і число <b>після</b>. Перетягни цифру знизу на порожній будиночок або просто торкнись її. 20 питань, числа від 1 до 19.</div>
    <button class="cta" id="playBtn">Грати ▶</button>
    <a class="linkbtn" href="igry.html">← До ігор</a>
  </div>

  <!-- win -->
  <div class="screen hidden" id="winScreen">
    <div class="crown">👑</div>
    <div class="title" id="winTitle">Вулицю заселено!</div>
    <div class="stars" id="winStars">⭐⭐⭐</div>
    <div class="sub" id="winSub">Чудова робота!</div>
    <div class="winrow">
      <button class="cta" id="againBtn">↻ Ще раз</button>
    </div>
    <div class="winrow">
      <a class="linkbtn" href="igry.html">← До ігор</a>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  var TOTAL = 20;          // питань у грі
  var MIN = 1, MAX = 19;   // діапазон чисел на вулиці

  // ── мешканці будиночків ──
  var THEMES = ["⭐","❤️","🧁","🍎","🌸","🐝","🍄","🎈","🐟","🍓","🍪","🌟","🦋","🍋","🐞","🎀"];

  var rowEl   = document.getElementById("row");
  var trayEl  = document.getElementById("tray");
  var hintEl  = document.getElementById("hint");
  var scoreEl = document.getElementById("score");
  var qNumEl  = document.getElementById("qNum");
  var fillEl  = document.getElementById("barFill");

  var score=0, streak=0, qIndex=0, mistakes=0;
  var current=null, locked=false, sockets=[];

  function rnd(min,max){ return min + Math.floor(Math.random()*(max-min+1)); }
  function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=rnd(0,i); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  // ── генерація питання ──
  function makeOptions(prev,next,center){
    var set={}; var list=[prev,next];
    set[prev]=1; set[next]=1; set[center]=1;      // центр не пропонуємо
    var guard=0;
    while(list.length<5 && guard++<300){
      var d = rnd(1,3) * (Math.random()<0.5?-1:1);
      var v = center + d;
      if(v<MIN || v>MAX || set[v]) continue;
      set[v]=1; list.push(v);
    }
    guard=0;
    while(list.length<5 && guard++<300){
      var w = rnd(MIN,MAX);
      if(set[w]) continue;
      set[w]=1; list.push(w);
    }
    shuffle(list);
    return list;
  }

  var lastCenter=-1, lastTheme="";
  function genQuestion(){
    var center;
    var guard=0;
    do { center = rnd(MIN+1, MAX-1); } while(center===lastCenter && guard++<50);
    var prev = center-1, next = center+1;

    var theme;
    do { theme = THEMES[rnd(0,THEMES.length-1)]; } while(theme===lastTheme && THEMES.length>1);

    lastCenter=center; lastTheme=theme;
    return { center:center, prev:prev, next:next, theme:theme,
             options:makeOptions(prev,next,center) };
  }

  // ── рендер ──
  function makeHouse(cls, icoTxt, valTxt){
    var h=document.createElement("div");
    h.className="house "+cls;
    var ico=document.createElement("span"); ico.className="ico"; ico.textContent=icoTxt;
    var val=document.createElement("span"); val.className="val"; val.textContent=valTxt;
    h.appendChild(ico); h.appendChild(val);
    return h;
  }

  function renderQuestion(){
    current = genQuestion();
    rowEl.innerHTML=""; sockets=[];

    var left  = makeHouse("socket","🚪","?");
    left.dataset.answer = current.prev;
    var mid   = makeHouse("center", current.theme, current.center);
    var right = makeHouse("socket","🚪","?");
    right.dataset.answer = current.next;

    rowEl.appendChild(left); rowEl.appendChild(mid); rowEl.appendChild(right);
    sockets=[left,right];
    markActive();

    trayEl.innerHTML="";
    current.options.forEach(function(val){
      var p=document.createElement("button");
      p.className="piece"; p.textContent=val;
      p.dataset.val=val;
      attachDrag(p);
      trayEl.appendChild(p);
    });

    hintEl.innerHTML="Хто сусіди числа <b>"+current.center+"</b>?";
    qNumEl.textContent=(qIndex+1)+"/"+TOTAL;
    fillEl.style.width = Math.round(qIndex/TOTAL*100)+"%";
    locked=false;
  }

  function openSockets(){
    return sockets.filter(function(s){ return !s.classList.contains("good"); });
  }
  function markActive(){
    var open=openSockets();
    sockets.forEach(function(s){ s.classList.remove("active"); });
    if(open.length) open[0].classList.add("active");
  }

  // ── взаємодія: перетягування + тап ──
  function socketAt(x,y){
    var pad=22, found=null;
    openSockets().forEach(function(s){
      var r=s.getBoundingClientRect();
      if(x>=r.left-pad && x<=r.right+pad && y>=r.top-pad && y<=r.bottom+pad) found=s;
    });
    return found;
  }

  function attachDrag(p){
    var startX=0, startY=0, dx=0, dy=0, moved=false, dragging=false, pid=null;

    p.addEventListener("pointerdown", function(e){
      if(locked) return;
      dragging=true; moved=false; pid=e.pointerId;
      startX=e.clientX; startY=e.clientY; dx=0; dy=0;
      p.classList.add("dragging");
      try{ p.setPointerCapture(pid); }catch(_){}
    });

    p.addEventListener("pointermove", function(e){
      if(!dragging) return;
      dx=e.clientX-startX; dy=e.clientY-startY;
      if(Math.abs(dx)+Math.abs(dy)>6) moved=true;
      p.style.transform="translate("+dx+"px,"+dy+"px)";
      var hot=socketAt(e.clientX,e.clientY);
      sockets.forEach(function(s){ s.classList.toggle("hot", s===hot); });
    });

    function endDrag(e){
      if(!dragging) return;
      dragging=false;
      try{ p.releasePointerCapture(pid); }catch(_){}
      p.classList.remove("dragging");
      sockets.forEach(function(s){ s.classList.remove("hot"); });

      if(!moved){                                   // тап → у активний будиночок
        var open=openSockets();
        if(open.length) flyTo(p, open[0]);
        return;
      }
      var target=socketAt(e.clientX, e.clientY);
      if(target) resolve(p, target);
      else returnPiece(p);
    }
    p.addEventListener("pointerup", endDrag);
    p.addEventListener("pointercancel", endDrag);
  }

  function returnPiece(p){
    p.classList.add("flyto"); p.style.transform="translate(0,0)";
    setTimeout(function(){ p.classList.remove("flyto"); p.style.transform=""; }, 240);
  }

  function flyTo(p, target){
    if(locked) return;
    var pr=p.getBoundingClientRect(), sr=target.getBoundingClientRect();
    var tx=(sr.left+sr.width/2)-(pr.left+pr.width/2);
    var ty=(sr.top+sr.height/2)-(pr.top+pr.height/2);
    p.classList.add("flyto");
    p.style.transform="translate("+tx+"px,"+ty+"px)";
    setTimeout(function(){ resolve(p, target); }, 210);
  }

  function resolve(p, target){
    if(locked) return;
    var correct = String(p.dataset.val) === String(target.dataset.answer);
    if(correct){
      p.classList.add("placed");
      target.classList.remove("active","hot");
      target.classList.add("good","pop");
      target.querySelector(".val").textContent = target.dataset.answer;
      target.querySelector(".ico").textContent = current.theme;
      streak++; var gain=10+Math.min(streak-1,5)*2; score+=gain;
      scoreEl.textContent=score;
      buzz(20); chime();
      markActive();

      if(openSockets().length===0){                // обидва сусіди на місці
        locked=true;
        hintEl.innerHTML="Сусіди знайдені: <b>"+current.prev+"</b> і <b>"+current.next+"</b> 🎉";
        qIndex++;
        fillEl.style.width = Math.round(qIndex/TOTAL*100)+"%";
        if(qIndex>=TOTAL){ setTimeout(finish, 700); return; }
        setTimeout(renderQuestion, 700);
      } else {
        hintEl.innerHTML="Тепер другий сусід числа <b>"+current.center+"</b>";
      }
    } else {
      streak=0; mistakes++;
      buzz([30,40,30]); thud();
      p.classList.remove("flyto"); p.style.transform="";
      p.classList.add("wrong");
      target.classList.add("bad");
      hintEl.textContent="Числа стоять по порядку — на 1 менше і на 1 більше 🤔";
      setTimeout(function(){
        p.classList.remove("wrong");
        target.classList.remove("bad");
        hintEl.innerHTML="Хто сусіди числа <b>"+current.center+"</b>?";
      }, 950);
    }
  }

  // ── звук ──
  var actx=null;
  function tone(f,d,type){ try{
    if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
    var o=actx.createOscillator(), g=actx.createGain();
    o.type=type||"triangle"; o.frequency.value=f; g.gain.value=0.06;
    o.connect(g); g.connect(actx.destination); o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+d); o.stop(actx.currentTime+d+0.02);
  }catch(e){} }
  function chime(){ tone(660,0.09); setTimeout(function(){tone(880,0.11);},90); }
  function thud(){ tone(180,0.16,"sine"); }
  function fanfare(){ tone(523,0.12); setTimeout(function(){tone(659,0.12);},120);
    setTimeout(function(){tone(784,0.14);},240); setTimeout(function(){tone(1046,0.18);},380); }
  function buzz(v){ try{ if(navigator.vibrate) navigator.vibrate(v); }catch(e){} }

  // ── фініш ──
  function finish(){
    fanfare();
    var stars = mistakes===0 ? "⭐⭐⭐" : (mistakes<=3 ? "⭐⭐" : "⭐");
    document.getElementById("winStars").textContent=stars;
    document.getElementById("winTitle").textContent =
      mistakes===0 ? "Бездоганно!" : "Вулицю заселено!";
    document.getElementById("winSub").textContent =
      "Пройдено "+TOTAL+" з "+TOTAL+" • Помилок: "+mistakes+" • Очки: "+score;
    document.getElementById("winScreen").classList.remove("hidden");
  }

  function startGame(){
    score=0; streak=0; qIndex=0; mistakes=0;
    lastCenter=-1; lastTheme="";
    scoreEl.textContent=score;
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("winScreen").classList.add("hidden");
    renderQuestion();
  }

  document.getElementById("playBtn").addEventListener("click", startGame);
  document.getElementById("againBtn").addEventListener("click", startGame);
  document.getElementById("menuBtn").addEventListener("click", function(){
    document.getElementById("startScreen").classList.remove("hidden");
  });

  renderQuestion();
})();
</script>
</body>
</html>
