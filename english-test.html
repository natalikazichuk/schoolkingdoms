<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔤 Англійська A1 — Академія Героїв</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --brand-red:#E5383B;
  --navy:#0a0e2e;
  --indigo:#12174d;
  --violet:#1e1b6b;
  --gold:#FFD700;
  --gold2:#FFA500;
  --star:#ffe066;
  --btn-bg:#2a2f7a;
  --btn-hover:#3a40aa;
  --correct:#27ae60;
  --wrong:#e74c3c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito',sans-serif;
  background:linear-gradient(160deg,var(--navy) 0%,var(--indigo) 50%,var(--violet) 100%);
  min-height:100vh;color:#fff;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}
.stars-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star-dot{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur,3s) infinite ease-in-out}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
#app{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:16px}

.page-header{text-align:center;padding:20px 0 12px}
.page-header h1{
  font-family:'Fredoka One',cursive;font-size:clamp(1.6rem,5vw,2.4rem);
  background:linear-gradient(135deg,var(--gold),var(--gold2),#fff,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 8px rgba(255,215,0,.5));
}
.page-header p{color:#ccc;font-size:.95rem;margin-top:6px}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:#fff;padding:8px 16px;border-radius:20px;
  text-decoration:none;font-size:.9rem;font-weight:700;
  transition:.2s;cursor:pointer;margin-bottom:14px;
}
.back-btn:hover{background:rgba(255,255,255,.2)}

.levels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.level-card{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:14px;padding:14px;position:relative;overflow:hidden;
  border-left:4px solid var(--lc,#888);
}
.lc-num{font-family:'Fredoka One',cursive;font-size:1.5rem;color:rgba(255,255,255,.45);position:absolute;right:12px;top:8px}
.lc-badge{font-size:1.5rem;margin-bottom:4px}
.lc-title{font-size:.95rem;font-weight:800;color:#e8e8ff}
.lc-sub{font-size:.78rem;color:#aab;margin-top:2px;min-height:30px}
.lc-timed{font-size:.72rem;color:var(--gold);font-weight:700;margin-top:4px;display:inline-block}
.lc-play{
  display:block;width:100%;margin-top:10px;padding:9px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--brand-red),#c0392b);color:#fff;
  font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:800;cursor:pointer;transition:.15s;
}
.lc-play:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(229,56,59,.4)}

#test-screen,#result-screen{animation:fadeIn .3s ease}
.test-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.test-level-name{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--gold);flex:1}
.test-score{background:rgba(255,255,255,.1);padding:6px 14px;border-radius:20px;font-size:.85rem;font-weight:700}
.timer-chip{background:rgba(255,213,74,.15);color:#ffd54a;border:1px solid rgba(255,213,74,.35);padding:6px 14px;border-radius:20px;font-size:.85rem;font-weight:800}
.progress-bar{width:100%;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin-bottom:22px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--brand-red),var(--gold));border-radius:4px;transition:width .3s}
.question-box{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  border-radius:16px;padding:28px 20px;margin-bottom:20px;text-align:center;transition:.2s;
}
.question-box.ok{background:rgba(39,174,96,.18);border-color:var(--correct)}
.question-box.bad{background:rgba(231,76,60,.18);border-color:var(--wrong)}
.q-direction{font-size:.85rem;color:var(--star);font-weight:700;margin-bottom:10px}
.q-word{font-family:'Fredoka One',cursive;font-size:2rem;color:#fff}
.q-result{font-size:1.5rem;font-weight:800;font-family:'Fredoka One',cursive;margin:4px 0}
.q-result .arrow{color:#fff}
.q-status{font-size:1rem;font-weight:800;margin-top:8px}
.q-status.ok{color:#7fff9f}
.q-status.bad{color:#ffaaaa}
.q-hint{font-size:.85rem;color:#bbb;margin-top:8px}
.answer-row{display:flex;gap:10px}
.answer-row input{
  flex:1;height:48px;font-size:1.05rem;font-family:'Nunito',sans-serif;font-weight:700;
  border:2px solid rgba(255,255,255,.2);border-radius:12px;
  background:rgba(255,255,255,.06);color:#fff;padding:0 14px;
}
.answer-row input::placeholder{color:#8a90c0}
.answer-row input:focus{outline:none;border-color:var(--gold)}
.answer-row button{
  padding:0 22px;border:none;border-radius:12px;font-family:'Nunito',sans-serif;
  font-size:.95rem;font-weight:800;cursor:pointer;white-space:nowrap;
  background:linear-gradient(135deg,var(--btn-bg),var(--btn-hover));color:#fff;transition:.2s;
}
.answer-row button:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.3)}

#result-screen{text-align:center;padding:24px 0}
.result-icon{font-size:4rem;margin-bottom:10px}
.result-kicker{color:#ccc;font-size:.95rem}
.result-title{font-family:'Fredoka One',cursive;font-size:1.9rem;color:var(--gold);margin:4px 0 6px}
.result-sub{color:#bbb;font-size:.9rem;margin-bottom:22px}
.result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.result-actions button{
  padding:12px 26px;border-radius:12px;font-family:'Nunito',sans-serif;
  font-size:1rem;font-weight:800;cursor:pointer;border:none;transition:.2s;
}
.btn-next{background:linear-gradient(135deg,#4CAF50,#2e7d32);color:#fff}
.btn-home{background:linear-gradient(135deg,var(--btn-bg),var(--btn-hover));color:#fff}
.result-actions button:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
@media(max-width:560px){.levels-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}.q-word{font-size:1.7rem}}
</style>
</head>
<body>
<div class="stars-bg" id="starsContainer"></div>
<div id="app">
  <div class="page-header">
    <a href="akademiya-geroya.html" class="back-btn">← Академія</a>
    <h1>🔤 Англійська A1</h1>
    <p>1 клас · 10 рівнів · переклад слів</p>
  </div>
  <div id="root"></div>
</div>

<script>
(function(){
  // ── stars ──
  (function(){
    const c=document.getElementById('starsContainer');
    for(let i=0;i<70;i++){
      const s=document.createElement('div');s.className='star-dot';
      const sz=Math.random()*2+1;
      s.style.width=sz+'px';s.style.height=sz+'px';
      s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
      s.style.setProperty('--dur',(2+Math.random()*5)+'s');
      s.style.animationDelay=(Math.random()*5)+'s';
      c.appendChild(s);
    }
  })();

  const root = document.getElementById('root');
  function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){ const j=randInt(0,i); const t=a[i]; a[i]=a[j]; a[j]=t; }
    return a;
  }

  const wordLists = {
    1: [ {en:"one", ua:"один"}, {en:"two", ua:"два"}, {en:"three", ua:"три"}, {en:"four", ua:"чотири"}, {en:"five", ua:"п'ять"}, {en:"six", ua:"шість"}, {en:"seven", ua:"сім"}, {en:"eight", ua:"вісім"}, {en:"nine", ua:"дев'ять"}, {en:"ten", ua:"десять"} ],
    2: [ {en:"red", ua:"червоний"}, {en:"blue", ua:"синій"}, {en:"green", ua:"зелений"}, {en:"yellow", ua:"жовтий"}, {en:"black", ua:"чорний"}, {en:"white", ua:"білий"}, {en:"orange", ua:"помаранчевий"}, {en:"pink", ua:"рожевий"}, {en:"purple", ua:"фіолетовий"}, {en:"brown", ua:"коричневий"} ],
    3: [ {en:"mother", ua:"мама"}, {en:"father", ua:"тато"}, {en:"sister", ua:"сестра"}, {en:"brother", ua:"брат"}, {en:"son", ua:"син"}, {en:"daughter", ua:"донька"}, {en:"grandmother", ua:"бабуся"}, {en:"grandfather", ua:"дідусь"}, {en:"aunt", ua:"тітка"}, {en:"uncle", ua:"дядько"} ],
    4: [ {en:"dog", ua:"собака"}, {en:"cat", ua:"кіт"}, {en:"bird", ua:"птах"}, {en:"fish", ua:"риба"}, {en:"horse", ua:"кінь"}, {en:"cow", ua:"корова"}, {en:"pig", ua:"свиня"}, {en:"sheep", ua:"овечка"}, {en:"mouse", ua:"миша"}, {en:"rabbit", ua:"кролик"} ],
    5: [ {en:"bread", ua:"хліб"}, {en:"milk", ua:"молоко"}, {en:"water", ua:"вода"}, {en:"apple", ua:"яблуко"}, {en:"banana", ua:"банан"}, {en:"egg", ua:"яйце"}, {en:"cheese", ua:"сир"}, {en:"meat", ua:"м'ясо"}, {en:"rice", ua:"рис"}, {en:"sugar", ua:"цукор"} ],
    6: [ {en:"shirt", ua:"сорочка"}, {en:"dress", ua:"плаття"}, {en:"shoes", ua:"взуття"}, {en:"hat", ua:"шапка"}, {en:"jacket", ua:"куртка"}, {en:"socks", ua:"шкарпетки"}, {en:"trousers", ua:"штани"}, {en:"skirt", ua:"спідниця"}, {en:"coat", ua:"пальто"}, {en:"gloves", ua:"рукавички"} ],
    7: [ {en:"house", ua:"будинок"}, {en:"room", ua:"кімната"}, {en:"door", ua:"двері"}, {en:"window", ua:"вікно"}, {en:"table", ua:"стіл"}, {en:"chair", ua:"стілець"}, {en:"bed", ua:"ліжко"}, {en:"kitchen", ua:"кухня"}, {en:"garden", ua:"сад"}, {en:"wall", ua:"стіна"} ],
    8: [ {en:"head", ua:"голова"}, {en:"hand", ua:"рука"}, {en:"leg", ua:"нога"}, {en:"eye", ua:"око"}, {en:"ear", ua:"вухо"}, {en:"nose", ua:"ніс"}, {en:"mouth", ua:"рот"}, {en:"hair", ua:"волосся"}, {en:"foot", ua:"стопа"}, {en:"tooth", ua:"зуб"} ],
    9: [ {en:"go", ua:"йти"}, {en:"eat", ua:"їсти"}, {en:"drink", ua:"пити"}, {en:"sleep", ua:"спати"}, {en:"run", ua:"бігти"}, {en:"jump", ua:"стрибати"}, {en:"read", ua:"читати"}, {en:"write", ua:"писати"}, {en:"play", ua:"грати"}, {en:"swim", ua:"плавати"} ]
  };

  const levelsMeta = [
    {id:1, title:'Числа 1-10', subtitle:'one … ten', timed:false, icon:'🔢', lc:'#5fd0ff', badge:'Новачок англійської'},
    {id:2, title:'Кольори', subtitle:'colours', timed:false, icon:'🎨', lc:'#ff8fb1', badge:'Знавець кольорів'},
    {id:3, title:'Родина', subtitle:'family', timed:false, icon:'👨‍👩‍👧', lc:'#a78bfa', badge:'Знавець родини'},
    {id:4, title:'Тварини', subtitle:'animals', timed:false, icon:'🐾', lc:'#7ee787', badge:'Друг тварин'},
    {id:5, title:'Їжа', subtitle:'food', timed:false, icon:'🍎', lc:'#ffb86b', badge:'Гурман англійської'},
    {id:6, title:'Одяг', subtitle:'clothes', timed:false, icon:'👕', lc:'#62d4c4', badge:'Модник англійської'},
    {id:7, title:'Дім', subtitle:'house', timed:false, icon:'🏠', lc:'#ffd166', badge:'Господар англійської'},
    {id:8, title:'Частини тіла', subtitle:'body', timed:false, icon:'🧍', lc:'#f78fb3', badge:'Знавець тіла'},
    {id:9, title:'Дієслова', subtitle:'verbs · на час', timed:true, perTime:10, icon:'🏃', lc:'#ff9f43', badge:'Швидкий перекладач'},
    {id:10, title:'Майстер A1', subtitle:'усе разом · на час', timed:true, perTime:15, icon:'👑', lc:'#ffd700', badge:'Майстер англійської A1'}
  ];

  function makeProblem(pair, forceDir){
    const dir = forceDir || (Math.random()<0.5 ? 'en-ua' : 'ua-en');
    if(dir==='en-ua'){
      return {prompt:pair.en, answer:pair.ua, direction:'Переклади українською:'};
    } else {
      return {prompt:pair.ua, answer:pair.en, direction:'Translate into English:'};
    }
  }

  function generateProblems(id){
    if(id<=9){
      return shuffle(wordLists[id]).map(p=>makeProblem(p));
    }
    let pool = [];
    for(let i=1;i<=9;i++) pool = pool.concat(wordLists[i]);
    return shuffle(pool).slice(0,10).map(p=>makeProblem(p,'ua-en'));
  }

  function normalize(s){
    if(s===null || s===undefined) return '';
    let t = s.toString().trim().toLowerCase();
    t = t.replace(/^(a |an |the )/,'');
    t = t.replace(/[.,!?]/g,'');
    return t;
  }

  let state = {screen:'menu'};

  function clearAllTimers(){
    if(state.timerId){ clearInterval(state.timerId); state.timerId=null; }
    if(state.feedbackTimer){ clearTimeout(state.feedbackTimer); state.feedbackTimer=null; }
  }

  function startLevel(id){
    clearAllTimers();
    const meta = levelsMeta.find(l=>l.id===id);
    state = {screen:'quiz', levelId:id, problems:generateProblems(id), index:0, timeLeft:meta.timed?meta.perTime:0, timerId:null, feedbackTimer:null};
    render();
    if(meta.timed) startTimer();
  }

  function startTimer(){
    if(state.timerId) clearInterval(state.timerId);
    state.timerId = setInterval(()=>{
      state.timeLeft--;
      if(state.timeLeft<=0){ submitAnswer(true); }
      else {
        const el = document.getElementById('timer-val');
        if(el) el.textContent = state.timeLeft;
      }
    },1000);
  }

  function submitAnswer(timeout){
    const input = document.getElementById('answer-input');
    const val = timeout ? null : (input ? input.value : null);
    const p = state.problems[state.index];
    const isCorrect = !timeout && normalize(val)===normalize(p.answer);
    clearAllTimers();
    state.lastGiven = val;
    state.lastTimeout = timeout;
    state.screen = isCorrect ? 'correct' : 'wrong';
    render();
    if(isCorrect){
      state.feedbackTimer = setTimeout(advanceAfterCorrect, 700);
    } else {
      state.feedbackTimer = setTimeout(()=>{ startLevel(state.levelId); }, 2200);
    }
  }

  function advanceAfterCorrect(){
    const meta = levelsMeta.find(l=>l.id===state.levelId);
    state.index++;
    if(state.index>=state.problems.length){ state.screen='result'; render(); completeTest(); return; }
    state.screen='quiz';
    if(meta.timed) state.timeLeft = meta.perTime;
    render();
    if(meta.timed) startTimer();
    const input = document.getElementById('answer-input');
    if(input) input.focus();
  }

  function completeTest(){
    // прогрес героя у Firebase (метод увімкнеться, коли буде реалізований у window.SK)
    try{
      if(window.SK && typeof window.SK.completeTest==='function'){
        window.SK.completeTest('english-a1-level-'+state.levelId, {subject:'english', level:state.levelId});
      }
    }catch(e){}
  }

  function nextLevel(){ const id = Math.min(10, state.levelId+1); startLevel(id); }
  function restart(){ clearAllTimers(); state={screen:'menu'}; render(); }
  function handleKey(e){ if(e.key==='Enter') submitAnswer(false); }

  window.__app = {startLevel, submitAnswer, nextLevel, restart, handleKey};

  function render(){
    if(state.screen==='menu') renderMenu();
    else if(state.screen==='quiz') renderQuiz();
    else if(state.screen==='correct') renderFeedback(true);
    else if(state.screen==='wrong') renderFeedback(false);
    else renderResult();
  }

  function renderMenu(){
    root.innerHTML = `
      <div class="levels-grid">
        ${levelsMeta.map(l=>`
          <div class="level-card" style="--lc:${l.lc}">
            <span class="lc-num">${l.id}</span>
            <div class="lc-badge">${l.icon}</div>
            <div class="lc-title">${l.title}</div>
            <div class="lc-sub">${l.subtitle}${l.timed?'<br><span class="lc-timed">⏱ на час</span>':''}</div>
            <button class="lc-play" onclick="window.__app.startLevel(${l.id})">Грати ▶</button>
          </div>
        `).join('')}
      </div>
    `;
  }

  function headerHtml(meta){
    const pct = Math.round((state.index/state.problems.length)*100);
    return `
      <div class="test-header">
        <span class="test-level-name">${meta.icon} ${meta.title}</span>
        ${meta.timed?`<span class="timer-chip">⏱ <span id="timer-val">${state.timeLeft}</span> с</span>`:''}
        <span class="test-score">${state.index+1} / ${state.problems.length}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    `;
  }

  function renderQuiz(){
    const meta = levelsMeta.find(l=>l.id===state.levelId);
    const p = state.problems[state.index];
    root.innerHTML = `
      ${headerHtml(meta)}
      <div class="question-box">
        <div class="q-direction">${p.direction}</div>
        <div class="q-word">${p.prompt}</div>
      </div>
      <div class="answer-row">
        <input id="answer-input" type="text" placeholder="Твоя відповідь" autocomplete="off" autocapitalize="off" autocorrect="off" onkeydown="window.__app.handleKey(event)" />
        <button onclick="window.__app.submitAnswer(false)">Перевірити</button>
      </div>
    `;
    setTimeout(()=>{ const i=document.getElementById('answer-input'); if(i) i.focus(); },0);
  }

  function renderFeedback(ok){
    const meta = levelsMeta.find(l=>l.id===state.levelId);
    const p = state.problems[state.index];
    root.innerHTML = `
      ${headerHtml(meta)}
      <div class="question-box ${ok?'ok':'bad'}">
        <div class="q-result">${p.prompt} <span class="arrow">→</span> ${p.answer}</div>
        <div class="q-status ${ok?'ok':'bad'}">${ok?'✅ Правильно!':'❌ '+(state.lastTimeout?'Час вийшов':'Неправильно'+(state.lastGiven?' ('+state.lastGiven+')':''))}</div>
        ${ok?'':'<div class="q-hint">Рівень починається знову…</div>'}
      </div>
    `;
  }

  function renderResult(){
    const meta = levelsMeta.find(l=>l.id===state.levelId);
    const isLast = state.levelId===10;
    root.innerHTML = `
      <div id="result-screen">
        <div class="result-icon">${isLast?'👑':'🏅'}</div>
        <div class="result-kicker">Ти отримав звання</div>
        <div class="result-title">«${meta.badge}»</div>
        <div class="result-sub">${meta.icon} ${meta.title} — пройдено без жодної помилки!</div>
        <div class="result-actions">
          ${isLast?'':'<button class="btn-next" onclick="window.__app.nextLevel()">Наступний рівень →</button>'}
          <button class="btn-home" onclick="window.__app.restart()">До рівнів</button>
        </div>
      </div>
    `;
  }

  render();
})();
</script>
</body>
</html>
