<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конструктор книг — Школа Королівство</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#0d1b3e;--indigo:#1a2a5e;--violet:#2d1b4e;--gold:#ffd54a;--gold-d:#b8860b;--green:#4CAF50;--red:#E5383B}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,var(--navy) 0%,var(--indigo) 50%,var(--violet) 100%);min-height:100vh;color:#fff}
#wrap{max-width:820px;margin:0 auto;padding:16px 14px 60px}

.topbar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.brand{font-family:'Fredoka One',cursive;font-size:1.15rem;color:var(--gold);text-decoration:none}
.nav{display:flex;gap:8px;flex-wrap:wrap}
.nav a,.nav button{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:#fff;font-family:'Nunito',sans-serif;font-weight:800;padding:7px 12px;border-radius:11px;font-size:.82rem;cursor:pointer;text-decoration:none}
.nav a:hover,.nav button:hover{background:rgba(255,255,255,.18)}

h1{font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--gold);margin:0 0 4px}
.sub{color:rgba(255,255,255,.6);font-size:.9rem;margin-bottom:16px}

.panel{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);border-radius:18px;padding:16px;margin-bottom:16px}
.panel h2{font-family:'Fredoka One',cursive;font-size:1.15rem;color:#fff;margin:0 0 12px;display:flex;align-items:center;gap:8px}

/* список книг */
.blist{display:flex;flex-direction:column;gap:8px}
.brow{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:9px 12px}
.brow .cv{font-size:1.5rem;line-height:1}
.brow .info{flex:1;min-width:0}
.brow .bt{font-weight:800;font-size:.98rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brow .bm{font-size:.76rem;color:rgba(255,255,255,.55)}
.brow .acts{display:flex;gap:6px;flex-shrink:0}
.mini{border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;border-radius:9px;padding:6px 9px;font-weight:800;font-size:.78rem;cursor:pointer}
.mini:hover{background:rgba(255,255,255,.16)}
.mini.on{background:rgba(76,175,80,.28);border-color:var(--green);color:#c7f5cd}
.mini.off{background:rgba(255,255,255,.06);color:rgba(255,255,255,.55)}
.mini.danger{background:rgba(229,56,59,.18);border-color:rgba(229,56,59,.5);color:#ffc9ca}
.empty{color:rgba(255,255,255,.5);font-size:.9rem;padding:8px 2px}

/* форма */
.field{margin-bottom:12px}
.field label{display:block;font-weight:800;color:rgba(255,255,255,.7);font-size:.76rem;text-transform:uppercase;letter-spacing:.03em;margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;box-sizing:border-box;font-family:'Nunito',sans-serif;font-weight:600;font-size:1rem;color:#fff;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.16);border-radius:11px;padding:10px 12px;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold)}
.field textarea{resize:vertical;min-height:70px;line-height:1.5}
.field select option{background:var(--indigo);color:#fff}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.inline-note{font-size:.8rem;color:rgba(255,255,255,.55);margin-top:-6px}
.chk{display:flex;align-items:center;gap:8px;font-weight:800;color:#fff;cursor:pointer}
.chk input{width:auto}

/* сторінки */
.page-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:14px;margin-bottom:12px}
.page-card>.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.page-card>.ph .pn{font-family:'Fredoka One',cursive;color:var(--gold);font-size:1rem}
.q-card{background:rgba(255,255,255,.05);border:1px dashed rgba(255,255,255,.2);border-radius:12px;padding:11px;margin-top:10px}
.q-card>.qh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.q-card>.qh .qn{font-weight:800;color:rgba(255,255,255,.7);font-size:.82rem}
.opt-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.opt-row input[type=radio]{width:20px;height:20px;flex-shrink:0;accent-color:var(--green)}
.opt-row input[type=text]{flex:1}
.opt-row .rm{background:rgba(229,56,59,.16);border:1px solid rgba(229,56,59,.4);color:#ffc9ca;border-radius:8px;padding:6px 9px;font-weight:800;cursor:pointer;flex-shrink:0}
.addrow{margin-top:2px}
.add-btn{background:rgba(255,213,74,.14);border:1px solid rgba(255,213,74,.4);color:var(--gold);border-radius:10px;padding:8px 12px;font-weight:800;font-size:.82rem;cursor:pointer}
.add-btn:hover{background:rgba(255,213,74,.24)}

.img-prev{margin-top:8px}
.img-prev-el{max-height:130px;max-width:100%;border-radius:10px;display:block;border:1px solid rgba(255,255,255,.18)}
.img-prev-err{display:none;color:#ffb3b4;font-weight:800;font-size:.82rem}
.img-prev-emoji{font-size:2.6rem;line-height:1;display:block}
.savebar{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.btn{border:none;border-radius:13px;padding:12px 20px;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;color:#1a1030;background:linear-gradient(180deg,#ffe07a,var(--gold));box-shadow:0 4px 0 rgba(180,140,0,.5)}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(180,140,0,.5)}
.btn.ghost{background:rgba(255,255,255,.1);color:#fff;box-shadow:none;font-family:'Nunito',sans-serif;font-weight:800}
.msg{margin-top:10px;font-weight:800;min-height:20px}
.msg.ok{color:#69DB7C}.msg.err{color:#ffb3b4}

textarea#jsonBox{min-height:120px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.82rem}

.gate{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);border-radius:18px;padding:26px;text-align:center;margin-top:30px}
.gate .big{font-size:2.6rem;margin-bottom:8px}
.spinner{width:34px;height:34px;border:4px solid rgba(255,255,255,.2);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite;margin:16px auto}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:560px){.grid,.grid3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="wrap">
  <div class="topbar">
    <a class="brand" href="index.html">👑 Школа Королівство</a>
    <nav class="nav">
      <a href="admin.html">🧩 Тести</a>
      <a href="biblioteka.html">📖 Бібліотека</a>
      <button id="logoutBtn" style="display:none">Вийти</button>
    </nav>
  </div>
  <div id="root">
    <div class="gate"><div class="spinner"></div><p class="sub" style="margin:0">Перевіряємо доступ…</p></div>
  </div>
</div>

<script type="module" src="firebase-config.js"></script>
<script>
/* ============================================================
   КОНСТРУКТОР КНИГ (admin-only). Книга = послідовність сторінок:
   { text, image, questions:[{q,options,correct}] }. Пише у колекцію
   books через SK.saveBook / listBooks / deleteBook / setBookActive.
   Читання качає health (stat:'health') — поки що. Питання у форматі
   q/options/correct — той самий, що й у тестах.
   ============================================================ */
'use strict';
var root=document.getElementById('root');
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function num(v){ v=parseFloat(v); return isNaN(v)?0:v; }
function el(sel){ return document.querySelector(sel); }

var SUBJECTS=['Читання','Українська мова','ЯДС','Логіка/Пам\u2019ять/Англійська','Математика','Інше'];
var BOOKS=[];
var M=null;   // поточна модель у редакторі

function blankQuestion(){ return { q:'', options:['','',''], correct:0 }; }
function blankPage(){ return { text:'', image:'', questions:[] }; }
function blankBook(){
  return {
    id:null, title:'', cover:'📕', subject:'Читання', grade:1,
    xpMode:'perCorrect', xpValue:1,
    statMode:'fixed', statValue:2, stat:'health',
    coins:3, active:true,
    pages:[ blankPage() ]
  };
}

/* ---------- рендер списку книг ---------- */
function renderList(){
  var host=el('#bookList');
  if(!host) return;
  if(!BOOKS.length){ host.innerHTML='<div class="empty">Поки жодної книги. Створи першу нижче 👇</div>'; return; }
  host.innerHTML=BOOKS.map(function(b){
    var np=(b.pages||[]).length;
    var nq=(b.pages||[]).reduce(function(s,p){ return s+((p&&p.questions)?p.questions.length:0); },0);
    var on=b.active!==false;
    return '<div class="brow">'
      +'<span class="cv">'+esc(b.cover||'📕')+'</span>'
      +'<div class="info"><div class="bt">'+esc(b.title||'(без назви)')+'</div>'
        +'<div class="bm">'+esc(b.subject||'—')+' · клас '+esc(b.grade!=null?b.grade:'1')+' · '+np+' стор. · '+nq+' пит.</div></div>'
      +'<div class="acts">'
        +'<button class="mini '+(on?'on':'off')+'" data-act="toggle" data-id="'+esc(b.id)+'">'+(on?'✓ активна':'○ вимк.')+'</button>'
        +'<button class="mini" data-act="edit" data-id="'+esc(b.id)+'">✏️</button>'
        +'<button class="mini danger" data-act="del" data-id="'+esc(b.id)+'">🗑</button>'
      +'</div></div>';
  }).join('');
}

/* ---------- рендер редактора ---------- */
function optRow(pi,qi,oi,val,correct){
  var name='correct-'+pi+'-'+qi;
  var canRemove=(M.pages[pi].questions[qi].options.length>2);
  return '<div class="opt-row">'
    +'<input type="radio" name="'+name+'" value="'+oi+'"'+(correct===oi?' checked':'')+' title="Правильна">'
    +'<input type="text" class="o-text" data-p="'+pi+'" data-q="'+qi+'" data-o="'+oi+'" value="'+esc(val)+'" placeholder="Варіант '+(oi+1)+'">'
    +(canRemove?'<button class="rm" data-act="delopt" data-p="'+pi+'" data-q="'+qi+'" data-o="'+oi+'">✕</button>':'')
    +'</div>';
}
function qCard(pi,qi,q){
  var opts=q.options.map(function(v,oi){ return optRow(pi,qi,oi,v,q.correct); }).join('');
  return '<div class="q-card">'
    +'<div class="qh"><span class="qn">Питання '+(qi+1)+'</span>'
      +'<button class="mini danger" data-act="delq" data-p="'+pi+'" data-q="'+qi+'">видалити</button></div>'
    +'<div class="field" style="margin-bottom:8px"><input type="text" class="q-q" data-p="'+pi+'" data-q="'+qi+'" value="'+esc(q.q)+'" placeholder="Напр.: Як звали котика?"></div>'
    +opts
    +(q.options.length<4?'<div class="addrow"><button class="add-btn" data-act="addopt" data-p="'+pi+'" data-q="'+qi+'">+ варіант</button></div>':'')
    +'</div>';
}
function imgPrevHtml(val){
  val=String(val==null?'':val).trim();
  if(!val) return '';
  if(/^https?:\/\//i.test(val)){
    return '<img class="img-prev-el" src="'+esc(val)+'" alt="" '
      +'onload="this.nextElementSibling.style.display=\'none\'" '
      +'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'">'
      +'<span class="img-prev-err">⚠️ Картинку не знайдено за цим посиланням</span>';
  }
  return '<span class="img-prev-emoji">'+esc(val)+'</span>';
}
function pageCard(pi,p){
  var qs=p.questions.map(function(q,qi){ return qCard(pi,qi,q); }).join('');
  return '<div class="page-card">'
    +'<div class="ph"><span class="pn">📄 Сторінка '+(pi+1)+'</span>'
      +(M.pages.length>1?'<button class="mini danger" data-act="delpage" data-p="'+pi+'">видалити сторінку</button>':'')+'</div>'
    +'<div class="field"><label>Текст сторінки (1–3 короткі речення)</label>'
      +'<textarea class="pg-text" data-p="'+pi+'" placeholder="Жив собі котик Мурчик. Він дуже любив молоко.">'+esc(p.text)+'</textarea></div>'
    +'<div class="field" style="margin-bottom:8px"><label>Картинка (емодзі 🐱 або посилання, необов\u2019язково)</label>'
      +'<input type="text" class="pg-image" data-p="'+pi+'" value="'+esc(p.image)+'" placeholder="🐱">'
      +'<div class="img-prev" id="imgprev-'+pi+'">'+imgPrevHtml(p.image)+'</div></div>'
    +qs
    +'<div class="addrow" style="margin-top:10px"><button class="add-btn" data-act="addq" data-p="'+pi+'">+ питання до сторінки</button></div>'
    +'</div>';
}
function renderEditor(){
  var pages=M.pages.map(function(p,pi){ return pageCard(pi,p); }).join('');
  el('#editor').innerHTML=
     '<div class="grid">'
    +'  <div class="field"><label>Назва книги</label><input type="text" id="m_title" value="'+esc(M.title)+'" placeholder="Котик Мурчик"></div>'
    +'  <div class="field"><label>Обкладинка (емодзі)</label><input type="text" id="m_cover" value="'+esc(M.cover)+'" placeholder="🐱"></div>'
    +'</div>'
    +'<div class="grid">'
    +'  <div class="field"><label>Предмет</label><select id="m_subject">'
       +SUBJECTS.map(function(s){ return '<option value="'+esc(s)+'"'+(M.subject===s?' selected':'')+'>'+esc(s)+'</option>'; }).join('')
       +'</select></div>'
    +'  <div class="field"><label>Клас</label><input type="number" id="m_grade" min="1" max="11" value="'+esc(M.grade)+'"></div>'
    +'</div>'
    +'<div class="grid3">'
    +'  <div class="field"><label>XP — режим</label><select id="m_xpMode">'
       +'<option value="perCorrect"'+(M.xpMode==='perCorrect'?' selected':'')+'>за правильну</option>'
       +'<option value="fixed"'+(M.xpMode==='fixed'?' selected':'')+'>раз за книгу</option></select></div>'
    +'  <div class="field"><label>XP — значення</label><input type="number" id="m_xpValue" step="0.5" min="0" value="'+esc(M.xpValue)+'"></div>'
    +'  <div class="field"><label>Монети за книгу</label><input type="number" id="m_coins" min="0" value="'+esc(M.coins)+'"></div>'
    +'</div>'
    +'<div class="grid3">'
    +'  <div class="field"><label>Здоров\u2019я — режим</label><select id="m_statMode">'
       +'<option value="fixed"'+(M.statMode==='fixed'?' selected':'')+'>раз за книгу</option>'
       +'<option value="perCorrect"'+(M.statMode==='perCorrect'?' selected':'')+'>за правильну</option></select></div>'
    +'  <div class="field"><label>Здоров\u2019я — значення</label><input type="number" id="m_statValue" step="0.5" min="0" value="'+esc(M.statValue)+'"></div>'
    +'  <div class="field"><label>Качає стат</label><input type="text" value="Здоров\u2019я ❤️" disabled></div>'
    +'</div>'
    +'<label class="chk" style="margin-bottom:14px"><input type="checkbox" id="m_active"'+(M.active!==false?' checked':'')+'> Книга активна (видима в бібліотеці)</label>'
    +'<h2 style="font-size:1.05rem;margin:6px 0 10px">📚 Сторінки книги</h2>'
    +pages
    +'<div class="addrow" style="margin:6px 0 14px"><button class="add-btn" data-act="addpage">+ додати сторінку</button></div>'
    +'<div class="savebar">'
    +'  <button class="btn" data-act="save">💾 Зберегти</button>'
    +'  <button class="btn ghost" data-act="new">＋ Нова книга</button>'
    +(M.id?'  <button class="btn ghost" data-act="delcur" style="color:#ffc9ca">🗑 Видалити цю</button>':'')
    +'</div>'
    +'<div class="msg" id="msg"></div>';
}

/* ---------- зчитування форми у модель ---------- */
function collectForm(){
  if(!el('#m_title')) return;
  M.title=el('#m_title').value;
  M.cover=el('#m_cover').value;
  M.subject=el('#m_subject').value;
  M.grade=el('#m_grade').value;
  M.xpMode=el('#m_xpMode').value;
  M.xpValue=el('#m_xpValue').value;
  M.coins=el('#m_coins').value;
  M.statMode=el('#m_statMode').value;
  M.statValue=el('#m_statValue').value;
  M.active=el('#m_active').checked;
  M.pages.forEach(function(p,pi){
    var t=el('.pg-text[data-p="'+pi+'"]'); if(t) p.text=t.value;
    var im=el('.pg-image[data-p="'+pi+'"]'); if(im) p.image=im.value;
    p.questions.forEach(function(q,qi){
      var qq=el('.q-q[data-p="'+pi+'"][data-q="'+qi+'"]'); if(qq) q.q=qq.value;
      q.options.forEach(function(o,oi){
        var ot=el('.o-text[data-p="'+pi+'"][data-q="'+qi+'"][data-o="'+oi+'"]'); if(ot) q.options[oi]=ot.value;
      });
      var r=document.querySelector('input[name="correct-'+pi+'-'+qi+'"]:checked');
      q.correct = r ? parseInt(r.value,10) : 0;
    });
  });
}

/* ---------- чистий об'єкт для збереження ---------- */
function buildClean(){
  collectForm();
  var out={
    title:(M.title||'').trim(),
    cover:(M.cover||'📕').trim()||'📕',
    subject:(M.subject||'Читання').trim(),
    grade:parseInt(M.grade,10)||1,
    xpMode: M.xpMode==='perCorrect'?'perCorrect':'fixed',
    xpValue: num(M.xpValue),
    statMode: M.statMode==='perCorrect'?'perCorrect':'fixed',
    statValue: num(M.statValue),
    stat:'health',
    coins: num(M.coins),
    active: !!M.active,
    pages: []
  };
  M.pages.forEach(function(p){
    var text=(p.text||'').trim();
    var qs=[];
    (p.questions||[]).forEach(function(q){
      var qq=(q.q||'').trim();
      var origCorrect=parseInt(q.correct,10); if(isNaN(origCorrect)) origCorrect=0;
      var correctText=(q.options[origCorrect]!=null)?String(q.options[origCorrect]).trim():'';
      var opts=(q.options||[]).map(function(o){ return String(o==null?'':o).trim(); }).filter(function(o){ return o!==''; });
      if(qq && opts.length>=2){
        var c=opts.indexOf(correctText); if(c<0) c=0;
        qs.push({ q:qq, options:opts, correct:c });
      }
    });
    if(text || qs.length){ out.pages.push({ text:text, image:(p.image||'').trim(), questions:qs }); }
  });
  if(M.id) out.id=M.id;
  return out;
}

function setMsg(text, ok){
  var m=el('#msg'); if(!m) return;
  m.textContent=text; m.className='msg '+(ok?'ok':'err');
}

/* ---------- дії ---------- */
function editorInput(e){
  var t=e.target;
  if(t && t.classList && t.classList.contains('pg-image')){
    var pi=t.getAttribute('data-p');
    var box=document.getElementById('imgprev-'+pi);
    if(box) box.innerHTML=imgPrevHtml(t.value);
  }
}
function editorClick(e){
  var b=e.target.closest('[data-act]'); if(!b) return;
  var act=b.getAttribute('data-act');
  var pi=b.getAttribute('data-p')!=null?parseInt(b.getAttribute('data-p'),10):null;
  var qi=b.getAttribute('data-q')!=null?parseInt(b.getAttribute('data-q'),10):null;
  var oi=b.getAttribute('data-o')!=null?parseInt(b.getAttribute('data-o'),10):null;

  if(act==='addpage'){ collectForm(); M.pages.push(blankPage()); renderEditor(); return; }
  if(act==='delpage'){ collectForm(); M.pages.splice(pi,1); if(!M.pages.length) M.pages.push(blankPage()); renderEditor(); return; }
  if(act==='addq'){ collectForm(); M.pages[pi].questions.push(blankQuestion()); renderEditor(); return; }
  if(act==='delq'){ collectForm(); M.pages[pi].questions.splice(qi,1); renderEditor(); return; }
  if(act==='addopt'){ collectForm(); if(M.pages[pi].questions[qi].options.length<4){ M.pages[pi].questions[qi].options.push(''); } renderEditor(); return; }
  if(act==='delopt'){
    collectForm();
    var q=M.pages[pi].questions[qi];
    if(q.options.length>2){ q.options.splice(oi,1); if(q.correct>=q.options.length) q.correct=0; }
    renderEditor(); return;
  }
  if(act==='new'){ M=blankBook(); renderEditor(); window.scrollTo(0,el('#editor').offsetTop-10); return; }
  if(act==='save'){ doSave(); return; }
  if(act==='delcur'){ if(M.id) doDelete(M.id); return; }
}

function doSave(){
  var clean=buildClean();
  if(!clean.title){ setMsg('Додай назву книги.', false); return; }
  var hasText=clean.pages.some(function(p){ return p.text; });
  if(!hasText){ setMsg('Потрібна хоча б одна сторінка з текстом.', false); return; }
  setMsg('💾 Зберігаємо…', true);
  SK.saveBook(clean).then(function(id){
    M.id=id;
    setMsg('✅ Збережено!', true);
    return SK.listBooks();
  }).then(function(list){ BOOKS=list||[]; renderList(); renderEditor(); })
    .catch(function(err){ setMsg('⚠️ Помилка збереження: '+(err&&err.message||err), false); });
}

function doDelete(id){
  if(!confirm('Видалити цю книгу назавжди?')) return;
  SK.deleteBook(id).then(function(){
    if(M.id===id) M=blankBook();
    return SK.listBooks();
  }).then(function(list){ BOOKS=list||[]; renderList(); renderEditor(); })
    .catch(function(err){ alert('Не вдалося видалити: '+(err&&err.message||err)); });
}

function listClick(e){
  var b=e.target.closest('[data-act]'); if(!b) return;
  var act=b.getAttribute('data-act');
  var id=b.getAttribute('data-id');
  var book=BOOKS.filter(function(x){ return x.id===id; })[0];
  if(act==='edit'){
    if(!book) return;
    M=JSON.parse(JSON.stringify(book));
    if(!Array.isArray(M.pages)||!M.pages.length) M.pages=[blankPage()];
    M.pages.forEach(function(p){ if(!Array.isArray(p.questions)) p.questions=[]; p.questions.forEach(function(q){ if(!Array.isArray(q.options)||q.options.length<2) q.options=['','','']; }); });
    renderEditor();
    window.scrollTo(0, el('#editor').offsetTop-10);
  } else if(act==='toggle'){
    if(!book) return;
    var next=(book.active===false);
    SK.setBookActive(id, next).then(function(){ book.active=next; renderList(); }).catch(function(err){ alert('Помилка: '+(err&&err.message||err)); });
  } else if(act==='del'){
    doDelete(id);
  }
}

/* ---------- JSON імпорт / експорт ---------- */
function exportJSON(){
  var clean=buildClean();
  el('#jsonBox').value=JSON.stringify(clean, null, 2);
  setMsg('Готово — можеш скопіювати JSON нижче.', true);
}
function importJSON(){
  var raw=el('#jsonBox').value.trim();
  if(!raw){ setMsg('Встав JSON у поле нижче.', false); return; }
  var obj;
  try{ obj=JSON.parse(raw); }catch(e){ setMsg('Некоректний JSON: '+e.message, false); return; }
  if(!obj || typeof obj!=='object'){ setMsg('Очікується об\u2019єкт книги.', false); return; }
  var m=blankBook();
  ['title','cover','subject','xpMode','statMode','stat'].forEach(function(k){ if(obj[k]!=null) m[k]=obj[k]; });
  ['grade','xpValue','statValue','coins'].forEach(function(k){ if(obj[k]!=null) m[k]=obj[k]; });
  if(obj.active!=null) m.active=!!obj.active;
  if(Array.isArray(obj.pages) && obj.pages.length){
    m.pages=obj.pages.map(function(p){
      p=p||{};
      var qs=Array.isArray(p.questions)?p.questions.map(function(q){
        q=q||{};
        var opts=Array.isArray(q.options)?q.options.slice():['','',''];
        while(opts.length<2) opts.push('');
        return { q:q.q||'', options:opts, correct:parseInt(q.correct,10)||0 };
      }):[];
      return { text:p.text||'', image:p.image||'', questions:qs };
    });
  }
  m.id=obj.id||null;
  M=m; renderEditor();
  setMsg('✅ Імпортовано у форму. Перевір і натисни «Зберегти».', true);
  window.scrollTo(0, el('#editor').offsetTop-10);
}

/* ---------- каркас сторінки після перевірки доступу ---------- */
function renderAdminUI(){
  root.innerHTML=
     '<h1>📖 Конструктор книг</h1>'
    +'<p class="sub">Книга — це кілька коротких сторінок; після кожної можна поставити прості питання. Читання качає ❤️ Здоров\u2019я.</p>'
    +'<div class="panel"><h2>📚 Наявні книги</h2><div class="blist" id="bookList"></div></div>'
    +'<div class="panel"><h2>✏️ Редактор</h2><div id="editor"></div></div>'
    +'<div class="panel"><h2>🔁 JSON (імпорт / експорт)</h2>'
      +'<div class="savebar" style="margin-bottom:10px">'
        +'<button class="btn ghost" id="btnExport">⬇ Показати JSON форми</button>'
        +'<button class="btn ghost" id="btnImport">⬆ Завантажити JSON у форму</button>'
      +'</div>'
      +'<textarea id="jsonBox" placeholder=\'{ "title": "...", "pages": [ ... ] }\'></textarea>'
    +'</div>';

  M=blankBook();
  renderEditor();
  renderList();

  el('#editor').addEventListener('click', editorClick);
  el('#editor').addEventListener('input', editorInput);
  el('#bookList').addEventListener('click', listClick);
  el('#btnExport').addEventListener('click', exportJSON);
  el('#btnImport').addEventListener('click', importJSON);
}

function gate(msg){
  root.innerHTML='<div class="gate"><div class="big">🔒</div>'
    +'<h1 style="font-size:1.3rem">Доступ обмежено</h1>'
    +'<p class="sub" style="margin:8px 0 14px">'+esc(msg)+'</p>'
    +'<a class="btn ghost" href="login.html">Увійти</a></div>';
}

(function whenSK(){
  var tries=0;
  (function tick(){
    if(window.SK && SK.ready){
      SK.ready.then(function(){
        if(!SK.currentUser || !SK.currentUser()){ gate('Увійди адміністратором, щоб редагувати книги.'); return; }
        SK.isAdmin().then(function(isA){
          if(!isA){ gate('Ця сторінка лише для адміністраторів.'); return; }
          var lo=document.getElementById('logoutBtn');
          if(lo){ lo.style.display=''; lo.onclick=function(){ SK.logout().then(function(){ location.href='login.html'; }); }; }
          SK.listBooks().then(function(list){ BOOKS=list||[]; renderAdminUI(); })
            .catch(function(){ BOOKS=[]; renderAdminUI(); });
        }).catch(function(){ gate('Не вдалося перевірити права доступу.'); });
      });
      return;
    }
    if(tries++<100) setTimeout(tick,50);
    else gate('Не вдалося підключитися до бази.');
  })();
})();
</script>
