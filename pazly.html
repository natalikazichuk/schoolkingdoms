<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Математичні пазли</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sk-game.css">
<style>

  /* ── top bar ── */

  .pill.lvl .val{color:var(--gold);}

  /* ── crown jigsaw (progress picture) ── */
  #mosaicWrap{display:flex; justify-content:center; align-items:center; padding:6px 12px 2px;}
  #mosaic{position:relative; width:clamp(96px,26vh,150px); aspect-ratio:1;
    border-radius:20px; background:radial-gradient(circle at 50% 42%,rgba(255,207,77,.18),transparent 70%);
    display:flex; align-items:center; justify-content:center;}
  #crownPic{font-size:clamp(64px,17vh,110px); line-height:1; filter:drop-shadow(0 6px 14px rgba(255,207,77,.45));}
  #tiles{position:absolute; inset:0; display:grid;
    grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr); gap:3px; padding:4px;}
  .tile{background:linear-gradient(180deg,#26306b,#161a3e);
    border:1px solid rgba(255,255,255,.08); border-radius:8px;
    transition:opacity .35s, transform .35s;}
  .tile.gone{opacity:0; transform:scale(.4) rotate(12deg); pointer-events:none;}

  /* ── equation ── */
  #eqWrap{flex:1 1 auto; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:10px; padding:4px 12px;}
  #hint{font-weight:600; font-size:14px; opacity:.82; min-height:20px; text-align:center;}
  #eq{display:flex; align-items:center; justify-content:center; gap:clamp(4px,2vw,10px);
    flex-wrap:wrap; max-width:100%;}
  .num,.op,.socket{display:inline-flex; align-items:center; justify-content:center;
    font-weight:700; line-height:1;}
  .num{font-size:clamp(30px,9vw,46px); color:var(--text); min-width:clamp(30px,9vw,46px);
    text-shadow:0 2px 6px rgba(0,0,0,.4);}
  .op{font-size:clamp(26px,7.5vw,40px); color:var(--gold); padding:0 2px;}
  .socket{width:clamp(58px,17vw,84px); height:clamp(58px,17vw,84px);
    border:3px dashed rgba(255,207,77,.6); border-radius:20px;
    background:rgba(255,207,77,.06); font-size:clamp(30px,9vw,46px); color:var(--gold);
    box-shadow:inset 0 0 18px rgba(255,207,77,.12); transition:box-shadow .15s, border-color .15s, background .2s;}
  .socket.hot{border-color:var(--gold); background:rgba(255,207,77,.16);
    box-shadow:inset 0 0 22px rgba(255,207,77,.35), 0 0 16px rgba(255,207,77,.3);}
  .socket.good{border-style:solid; border-color:var(--green);
    background:rgba(123,224,164,.18); color:var(--green); box-shadow:inset 0 0 20px rgba(123,224,164,.35);}

  /* ── tray of number pieces ── */
  #tray{display:flex; align-items:center; justify-content:center; gap:clamp(8px,3.5vw,16px);
    padding:8px 12px calc(env(safe-area-inset-bottom) + 16px); flex-wrap:wrap;}
  .piece{position:relative; cursor:grab; touch-action:none; font-family:inherit; font-weight:700;
    width:clamp(64px,20vw,92px); height:clamp(64px,20vw,92px);
    font-size:clamp(28px,8.5vw,42px); color:#4a3300;
    background:linear-gradient(180deg,#FFE7A0,var(--gold-deep));
    border:none; border-radius:20px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 0 #a9761a, 0 10px 20px rgba(0,0,0,.4);
    transition:transform .12s, box-shadow .12s; will-change:transform;}
  .piece::before{content:""; position:absolute; top:-9px; left:50%; transform:translateX(-50%);
    width:26px; height:16px; background:inherit; border-radius:50%;}
  .piece:active{cursor:grabbing;}
  .piece.dragging{transition:none; box-shadow:0 12px 26px rgba(0,0,0,.5); z-index:50; opacity:.96;}
  .piece.flyto{transition:transform .22s cubic-bezier(.3,.9,.3,1.2);}
  .piece.wrong{animation:shake .34s;}
  .piece.placed{opacity:0; transform:scale(.3); pointer-events:none;}

  /* ── overlays ── */

  .group{display:flex; flex-direction:column; gap:8px; width:min(330px,88vw);}
  .glabel{font-size:13px; opacity:.72; margin-top:2px;}
  .seg{display:flex; gap:8px;}
  .opt{flex:1; cursor:pointer; font-family:inherit; font-weight:600; font-size:14px;
    background:rgba(20,26,68,.7); border:2px solid rgba(255,207,77,.3); color:var(--text);
    border-radius:14px; padding:12px 6px;}
  .opt.sel{border-color:var(--gold); background:linear-gradient(180deg,#241c52,#12102e);
    box-shadow:0 0 14px rgba(255,207,77,.3);}
</style>
</head>
<body>
<div id="wrap">
  <div id="top">
    <div class="pill lvl"><span class="lab">Рівень</span><span class="val" id="lvlName">Легко</span></div>
    <div class="pill"><span class="lab">Очки</span><span class="val" id="score">0</span></div>
    <div id="spacer"></div>
    <button id="menuBtn">☰ Меню</button>
  </div>

  <div id="mosaicWrap">
    <div id="mosaic">
      <div id="crownPic">👑</div>
      <div id="tiles"></div>
    </div>
  </div>

  <div id="eqWrap">
    <div id="hint">Перетягни або торкнись потрібної частинки 🧩</div>
    <div id="eq"></div>
  </div>

  <div id="tray"></div>

  <!-- start / menu -->
  <div class="screen" id="startScreen">
    <div class="crown">🧩</div>
    <div class="title">Математичні пазли</div>
    <div class="group">
      <div class="glabel">Обери складність</div>
      <div class="seg" id="diffSeg">
        <button class="opt sel" data-diff="easy">🙂 Легко</button>
        <button class="opt" data-diff="medium">🧠 Середньо</button>
        <button class="opt" data-diff="hard">🔥 Складно</button>
      </div>
    </div>
    <button class="cta" id="playBtn">Грати ▶</button>
    <div class="sub">Знайди частинку, якої не вистачає у прикладі. За кожну правильну відповідь відкривається шматочок корони — збери її всю!</div>
    <a class="linkbtn" href="igry.html">← До ігор</a>
  </div>

  <!-- win -->
  <div class="screen hidden" id="winScreen">
    <div class="crown">👑</div>
    <div class="title">Корону зібрано!</div>
    <div class="stars" id="winStars">⭐⭐⭐</div>
    <div class="sub" id="winSub">Чудова робота!</div>
    <div class="winrow">
      <button class="cta" id="nextBtn">Далі ▶</button>
    </div>
    <div class="winrow">
      <button class="linkbtn" id="againBtn">↻ Ще раз</button>
      <button class="linkbtn" id="toMenuBtn">☰ Меню</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var MOSAIC = 9;                       // частинок у короні
  var DIFFS = ["easy","medium","hard"];
  var LABELS = {easy:"Легко", medium:"Середньо", hard:"Складно"};

  var eqEl    = document.getElementById("eq");
  var trayEl  = document.getElementById("tray");
  var tilesEl = document.getElementById("tiles");
  var hintEl  = document.getElementById("hint");
  var scoreEl = document.getElementById("score");
  var lvlEl   = document.getElementById("lvlName");

  var diff="easy", score=0, streak=0, solved=0, mistakes=0;
  var current=null, locked=false, tileOrder=[];

  function rnd(min,max){ return min + Math.floor(Math.random()*(max-min+1)); }
  function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=rnd(0,i); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  // ── генерація прикладу з відсутньою частинкою ──
  function makeOptions(ans, cap){
    var set={}; var list=[ans]; set[ans]=1;
    var spread = cap<=10 ? [1,2,3] : (cap<=20 ? [1,2,3,5] : [1,2,3,5,10]);
    var guard=0;
    while(list.length<3 && guard++<80){
      var d = spread[rnd(0,spread.length-1)] * (Math.random()<0.5?-1:1);
      var v = ans + d;
      if(v<0 || v>cap+5) continue;
      if(set[v]) continue;
      set[v]=1; list.push(v);
    }
    if(list.length<3) return null;
    shuffle(list);
    return { list:list, idx:list.indexOf(ans) };
  }

  var lastKey="";
  function genPuzzle(){
    var cap = diff==="easy" ? 10 : (diff==="medium" ? 20 : 100);
    for(var tries=0; tries<300; tries++){
      var op = Math.random()<0.5 ? "+" : "-";
      var a,b,r;
      if(op==="+"){
        r = rnd(2, cap);
        a = rnd(1, r-1); b = r - a;
      } else {
        r = rnd(1, cap-1);
        b = rnd(1, cap - r);
        a = r + b;
      }
      // яку частинку заховати
      var rr=Math.random(), slot;
      if(diff==="hard") slot = rr<0.70 ? "r" : (rr<0.85 ? "a" : "b");
      else              slot = rr<0.55 ? "r" : (rr<0.78 ? "a" : "b");

      var answer, tokens;
      if(slot==="r"){ answer=r; tokens=[a,op,b,"=","?"]; }
      else if(slot==="a"){ answer=a; tokens=["?",op,b,"=",r]; }
      else { answer=b; tokens=[a,op,"?","=",r]; }

      var key = tokens.join(" ");
      if(key===lastKey) continue;

      var opts = makeOptions(answer, cap);
      if(!opts) continue;

      lastKey = key;
      return { tokens:tokens, answer:answer, options:opts.list, correctIndex:opts.idx };
    }
    // запасний варіант
    lastKey="";
    return { tokens:[2,"+",3,"=","?"], answer:5, options:[4,5,6], correctIndex:1 };
  }

  // ── рендер прикладу + частинок ──
  var socketEl=null;
  function renderPuzzle(){
    current = genPuzzle();
    eqEl.innerHTML=""; socketEl=null;
    current.tokens.forEach(function(tk){
      var el=document.createElement("span");
      if(tk==="?"){ el.className="socket"; socketEl=el; }
      else if(tk==="+"||tk==="-"||tk==="="){ el.className="op"; el.textContent=tk; }
      else { el.className="num"; el.textContent=tk; }
      eqEl.appendChild(el);
    });

    trayEl.innerHTML="";
    current.options.forEach(function(val,i){
      var p=document.createElement("button");
      p.className="piece"; p.textContent=val;
      p.dataset.correct = (i===current.correctIndex) ? "1" : "0";
      attachDrag(p);
      trayEl.appendChild(p);
    });
    locked=false;
  }

  // ── взаємодія: перетягування + тап ──
  function socketRect(){ return socketEl ? socketEl.getBoundingClientRect() : null; }
  function overSocket(x,y){
    var r=socketRect(); if(!r) return false;
    var pad=26;
    return x>=r.left-pad && x<=r.right+pad && y>=r.top-pad && y<=r.bottom+pad;
  }

  function attachDrag(p){
    var startX=0, startY=0, dx=0, dy=0, moved=false, dragging=false, pid=null;

    p.addEventListener("pointerdown", function(e){
      if(locked) return;
      dragging=true; moved=false; pid=e.pointerId;
      startX=e.clientX; startY=e.clientY; dx=0; dy=0;
      p.classList.add("dragging");
      try{ p.setPointerCapture(pid); }catch(_){}
    });

    p.addEventListener("pointermove", function(e){
      if(!dragging) return;
      dx=e.clientX-startX; dy=e.clientY-startY;
      if(Math.abs(dx)+Math.abs(dy)>6) moved=true;
      p.style.transform="translate("+dx+"px,"+dy+"px)";
      if(socketEl) socketEl.classList.toggle("hot", overSocket(e.clientX,e.clientY));
    });

    function endDrag(e){
      if(!dragging) return;
      dragging=false;
      try{ p.releasePointerCapture(pid); }catch(_){}
      p.classList.remove("dragging");
      if(socketEl) socketEl.classList.remove("hot");
      var x=e.clientX, y=e.clientY;
      if(!moved){ flyToSocket(p); return; }      // тап → летить у гніздо
      if(overSocket(x,y)){ resolve(p); }
      else { returnPiece(p); }
    }
    p.addEventListener("pointerup", endDrag);
    p.addEventListener("pointercancel", endDrag);
  }

  function returnPiece(p){
    p.classList.add("flyto"); p.style.transform="translate(0,0)";
    setTimeout(function(){ p.classList.remove("flyto"); p.style.transform=""; }, 240);
  }

  function flyToSocket(p){
    if(locked) return;
    var pr=p.getBoundingClientRect(), sr=socketRect();
    if(!sr){ resolve(p); return; }
    var tx=(sr.left+sr.width/2)-(pr.left+pr.width/2);
    var ty=(sr.top+sr.height/2)-(pr.top+pr.height/2);
    p.classList.add("flyto");
    p.style.transform="translate("+tx+"px,"+ty+"px)";
    setTimeout(function(){ resolve(p); }, 210);
  }

  function resolve(p){
    if(locked) return;
    var correct = p.dataset.correct==="1";
    if(correct){
      locked=true;
      p.classList.add("placed");
      if(socketEl){ socketEl.classList.add("good"); socketEl.textContent=current.answer; }
      streak++; var gain=10+Math.min(streak-1,5)*2; score+=gain;
      scoreEl.textContent=score;
      buzz(20); chime();
      revealTile();
      solved++;
      if(solved>=MOSAIC){ setTimeout(winRound, 520); return; }
      setTimeout(function(){ renderPuzzle(); }, 480);
    } else {
      streak=0; mistakes++;
      buzz([30,40,30]); thud();
      p.classList.remove("flyto"); p.style.transform="";
      p.classList.add("wrong");
      hintEl.textContent="Спробуй іншу частинку 🤔";
      setTimeout(function(){ p.classList.remove("wrong"); hintEl.textContent="Перетягни або торкнись потрібної частинки 🧩"; }, 700);
    }
  }

  // ── корона-мозаїка ──
  function buildMosaic(){
    tilesEl.innerHTML=""; tileOrder=[];
    for(var i=0;i<MOSAIC;i++){
      var t=document.createElement("div"); t.className="tile";
      tilesEl.appendChild(t); tileOrder.push(t);
    }
    shuffle(tileOrder);
  }
  function revealTile(){
    var t=tileOrder.pop();
    if(t) t.classList.add("gone");
  }

  // ── звук ──
  var actx=null;
  function tone(f,d,type){ try{
    if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
    var o=actx.createOscillator(), g=actx.createGain();
    o.type=type||"triangle"; o.frequency.value=f; g.gain.value=0.06;
    o.connect(g); g.connect(actx.destination); o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+d); o.stop(actx.currentTime+d+0.02);
  }catch(e){} }
  function chime(){ tone(660,0.09); setTimeout(function(){tone(880,0.11);},90); }
  function thud(){ tone(180,0.16,"sine"); }
  function fanfare(){ tone(523,0.12); setTimeout(function(){tone(659,0.12);},120);
    setTimeout(function(){tone(784,0.14);},240); setTimeout(function(){tone(1046,0.18);},380); }
  function buzz(v){ try{ if(navigator.vibrate) navigator.vibrate(v); }catch(e){} }

  // ── завершення раунду ──
  function winRound(){
    fanfare();
    var stars = mistakes===0 ? "⭐⭐⭐" : (mistakes<=2 ? "⭐⭐" : "⭐");
    document.getElementById("winStars").textContent=stars;
    var idx=DIFFS.indexOf(diff);
    var sub, nextLabel;
    if(idx<DIFFS.length-1){
      sub = "Помилок: "+mistakes+". Готовий(-а) до складнішого рівня?";
      nextLabel = "Далі: "+LABELS[DIFFS[idx+1]]+" ▶";
    } else {
      sub = "Помилок: "+mistakes+". Ти пройшов(-ла) найскладніший рівень! 🎉";
      nextLabel = "Ще одна корона ▶";
    }
    document.getElementById("winSub").textContent=sub;
    document.getElementById("nextBtn").textContent=nextLabel;
    document.getElementById("winScreen").classList.remove("hidden");
  }

  function startRound(keepScore){
    if(!keepScore) score=0;
    streak=0; solved=0; mistakes=0;
    scoreEl.textContent=score; lvlEl.textContent=LABELS[diff];
    hintEl.textContent="Перетягни або торкнись потрібної частинки 🧩";
    buildMosaic();
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("winScreen").classList.add("hidden");
    renderPuzzle();
  }

  // ── меню ──
  document.querySelectorAll("#diffSeg .opt").forEach(function(o){
    o.addEventListener("click", function(){
      document.querySelectorAll("#diffSeg .opt").forEach(function(x){x.classList.remove("sel");});
      o.classList.add("sel"); diff=o.dataset.diff;
    });
  });
  document.getElementById("playBtn").addEventListener("click", function(){ startRound(false); });
  document.getElementById("menuBtn").addEventListener("click", function(){
    document.getElementById("startScreen").classList.remove("hidden");
  });
  document.getElementById("againBtn").addEventListener("click", function(){ startRound(false); });
  document.getElementById("toMenuBtn").addEventListener("click", function(){
    document.getElementById("winScreen").classList.add("hidden");
    document.getElementById("startScreen").classList.remove("hidden");
  });
  document.getElementById("nextBtn").addEventListener("click", function(){
    var idx=DIFFS.indexOf(diff);
    if(idx<DIFFS.length-1) diff=DIFFS[idx+1];
    // синхронізуємо вибір у меню
    document.querySelectorAll("#diffSeg .opt").forEach(function(x){
      x.classList.toggle("sel", x.dataset.diff===diff);
    });
    startRound(true);
  });

  buildMosaic();
})();
</script>
</body>
</html>
