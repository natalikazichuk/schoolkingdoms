<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Пам'ять і Логіка — 1 клас</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=Pacifico&family=Marck+Script&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --brand-red:#E5383B;
  --navy:#0a0e2e;
  --indigo:#12174d;
  --violet:#1e1b6b;
  --gold:#FFD700;
  --gold2:#FFA500;
  --star:#ffe066;
  --btn-bg:#2a2f7a;
  --btn-hover:#3a40aa;
  --correct:#27ae60;
  --wrong:#e74c3c;
  --bronze:#cd7f32;
  --silver:#aaa9ad;
  --gold-c:#ffd700;
  --star-c:#00bfff;
  --diamond:#b9f2ff;
  --crown:#ff69b4;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito',sans-serif;
  background:linear-gradient(160deg,var(--navy) 0%,var(--indigo) 50%,var(--violet) 100%);
  min-height:100vh;color:#fff;overflow-x:hidden;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;
}
.stars-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star-dot{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur,3s) infinite ease-in-out}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
#app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:16px}

/* ── HEADER ── */
.page-header{text-align:center;padding:24px 0 16px}
.page-header h1{
  font-family:'Fredoka One',cursive;font-size:clamp(1.6rem,5vw,2.6rem);
  background:linear-gradient(135deg,var(--gold),var(--gold2),#fff,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;text-shadow:none;
  filter:drop-shadow(0 2px 8px rgba(255,215,0,.5));
}
.page-header p{color:#ccc;font-size:.95rem;margin-top:6px}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:#fff;padding:8px 16px;border-radius:20px;
  text-decoration:none;font-size:.9rem;font-weight:600;
  transition:.2s;cursor:pointer;margin-bottom:16px;
}
.back-btn:hover{background:rgba(255,255,255,.2)}

/* ── LEVEL GRID ── */
#home-screen{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.section-title{
  font-family:'Fredoka One',cursive;font-size:1.1rem;
  color:var(--star);margin:16px 0 10px;letter-spacing:1px;
  display:flex;align-items:center;gap:8px;
}
.levels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.level-card{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:14px;padding:14px;cursor:pointer;
  transition:.2s;position:relative;overflow:hidden;
  border-left:4px solid var(--lc,#888);
}
.level-card:hover{transform:translateY(-3px);background:rgba(255,255,255,.13);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.level-card.completed{border-color:rgba(255,215,0,.5)}
.lc-num{font-family:'Fredoka One',cursive;font-size:1.5rem;color:rgba(255,255,255,.5);position:absolute;right:12px;top:8px}
.lc-badge{font-size:1.4rem;margin-bottom:4px}
.lc-title{font-size:.82rem;font-weight:700;line-height:1.3;margin-bottom:8px;color:#e8e8ff}
.lc-info{display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:#aaa}
.lc-stars span{color:var(--gold);font-size:.9rem}
.lc-best{background:rgba(255,255,255,.1);padding:2px 8px;border-radius:10px;font-size:.72rem}
.lc-play{
  display:block;width:100%;margin-top:10px;padding:8px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--brand-red),#c0392b);color:#fff;
  font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:800;cursor:pointer;transition:.15s;
}
.lc-play:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(229,56,59,.4)}
.lc-lock{margin-top:10px;text-align:center;font-size:.8rem;color:#888;font-weight:700}
.level-card.locked{cursor:not-allowed}
.level-card.locked:hover{transform:none;background:rgba(255,255,255,.07);box-shadow:none}

/* ── TEST SCREEN ── */
#test-screen{display:none;animation:fadeIn .3s ease}
.test-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.test-level-name{font-family:'Fredoka One',cursive;font-size:1.15rem;color:var(--gold);flex:1}
.test-score{background:rgba(255,255,255,.1);padding:6px 14px;border-radius:20px;font-size:.85rem;font-weight:700}
.progress-bar{width:100%;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin-bottom:24px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--brand-red),var(--gold));border-radius:4px;transition:width .3s}
.question-box{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  border-radius:16px;padding:24px;margin-bottom:20px;
  font-size:1.05rem;font-weight:700;line-height:1.5;min-height:80px;
  display:flex;align-items:center;
}
.question-num{color:var(--star);font-size:.85rem;margin-bottom:8px;font-weight:600}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.opt-btn{
  background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);
  color:#fff;padding:14px 16px;border-radius:12px;font-family:'Nunito',sans-serif;
  font-size:.95rem;font-weight:700;cursor:pointer;text-align:left;
  transition:.15s;line-height:1.3;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.opt-btn:hover:not(:disabled){background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.5);transform:translateY(-2px)}
.opt-btn.correct{background:rgba(39,174,96,.3);border-color:var(--correct);color:#7fff7f}
.opt-btn.wrong{background:rgba(231,76,60,.3);border-color:var(--wrong);color:#ffaaaa}
.opt-btn:disabled{cursor:default}
.opt-label{display:inline-block;width:22px;height:22px;background:rgba(255,255,255,.15);
  border-radius:50%;text-align:center;line-height:22px;font-size:.78rem;margin-right:8px;flex-shrink:0}
.feedback{text-align:center;font-size:1.5rem;min-height:36px;margin-bottom:12px;font-family:'Fredoka One',cursive}
.next-btn{
  display:block;width:100%;padding:14px;background:linear-gradient(135deg,var(--btn-bg),var(--btn-hover));
  color:#fff;border:none;border-radius:12px;font-family:'Nunito',sans-serif;
  font-size:1rem;font-weight:800;cursor:pointer;transition:.2s;display:none;
}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}

/* ── RESULT SCREEN ── */
#result-screen{display:none;text-align:center;animation:fadeIn .4s ease;padding:20px 0}
.result-icon{font-size:4rem;margin-bottom:12px}
.result-title{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--gold);margin-bottom:8px}
.result-score{font-size:1.1rem;color:#ccc;margin-bottom:20px}
.result-badge-row{display:flex;align-items:center;gap:10px;justify-content:center;margin:6px 0 12px}
.result-badge-icon{font-size:2rem}
.result-badge-label{font-size:.95rem;color:#b0b8d8}
.stat-bar{font-size:.9rem;color:#9aaac8;text-align:center;margin:2px 0}
.result-stars{font-size:2.5rem;margin-bottom:24px}
.result-pct{font-family:'Fredoka One',cursive;font-size:3rem;
  background:linear-gradient(135deg,var(--gold),#fff);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
.result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.result-actions button{
  padding:12px 28px;border-radius:12px;font-family:'Nunito',sans-serif;
  font-size:1rem;font-weight:800;cursor:pointer;border:none;transition:.2s;
}
.btn-retry{background:linear-gradient(135deg,var(--brand-red),#c0392b);color:#fff}
.btn-next{background:linear-gradient(135deg,#4CAF50,#2e7d32);color:#fff}
.btn-home{background:linear-gradient(135deg,var(--btn-bg),var(--btn-hover));color:#fff}
.btn-retry:hover,.btn-home:hover,.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}

@media(max-width:560px){
  .options-grid{grid-template-columns:1fr}
  .levels-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}
}
.xp-stat{color:#ffd54a !important;font-weight:800}
#xp-counter{background:rgba(255,213,74,.15);color:#ffd54a;border:1px solid rgba(255,213,74,.35)}
.xp-popup{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Fredoka One',cursive;font-size:2.2rem;font-weight:900;
  color:#ffd54a;text-shadow:0 0 14px rgba(255,213,74,.8),0 2px 4px rgba(0,0,0,.5);
  pointer-events:none;z-index:9999;animation:xpFloat 1s ease-out forwards;
}
@keyframes xpFloat{
  0%{opacity:0;transform:translate(-50%,-30%) scale(.6)}
  25%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}
  60%{opacity:1;transform:translate(-50%,-90%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-140%) scale(.9)}
}
/* ── Рукописний (прописний) шрифт для відповідних рівнів ── */
.options-grid.cursive .opt-btn{
  font-family:'Pacifico','Marck Script','Caveat',cursive !important;
  font-style:italic;
  font-size:2.3rem;font-weight:400;line-height:1.15;letter-spacing:1px;
}
.question-box.cursive{
  font-family:'Pacifico','Marck Script','Caveat',cursive !important;
  font-style:italic;
  font-size:2rem;font-weight:400;
}
@media(max-width:560px){
  .options-grid.cursive .opt-btn{font-size:2rem}
}
</style>
</head>
<body>
<div class="stars-bg" id="starsContainer"></div>
<div id="app">
  <!-- HOME SCREEN -->
  <div id="home-screen">
    <div class="page-header">
      <a href="akademiya-geroya.html" class="back-btn">← Академія</a>
      <h1>🧠 Пам'ять і Логіка</h1>
      <p>1 клас · 10 рівнів · логіка та пам'ять</p>
      <div id="totalStarsDisplay" class="stat-bar"></div>
      <div id="xpDisplayHome" class="stat-bar xp-stat"></div>
      <div id="progressDisplay" class="stat-bar"></div>
    </div>
    <div id="levels-container" class="levels-grid"></div>
  </div>

  <!-- TEST SCREEN -->
  <div id="test-screen">
    <div class="test-header">
      <button class="back-btn" onclick="goHome()">← Рівні</button>
      <div class="test-level-name" id="test-title"></div>
      <div class="test-score" id="xp-counter">⚡ 0 ХР</div>
      <div class="test-score" id="test-score">0 / 0</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="question-num" id="q-num"></div>
    <div class="question-box" id="q-text"></div>
    <div class="options-grid" id="options-grid"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen">
    <div class="result-icon" id="res-icon">🏆</div>
    <div class="result-badge-row">
      <span id="resultBadge" class="result-badge-icon"></span>
      <span id="resultLevel" class="result-badge-label"></span>
    </div>
    <div class="result-title" id="res-title">Чудово!</div>
    <div class="result-pct" id="res-pct">0%</div>
    <div class="result-stars" id="res-stars">⭐⭐⭐</div>
    <div class="result-score" id="res-score"></div>
    <div class="result-actions">
      <button class="btn-retry" onclick="retryLevel()">🔄 Повторити</button>
      <button id="nextLevelBtn" class="btn-next" onclick="">⏭ Далі</button>
      <button class="btn-home" onclick="goHome()">🏠 Всі рівні</button>
    </div>
  </div>
</div>
<script>
// ═══════════════════════════════════════════════════════
// QUESTION BANKS — format: [question, [opt0,opt1,opt2,opt3], correctIdx]
// ═══════════════════════════════════════════════════════

["На чому їздять по рейках?",["літак","потяг","човен","велосипед"],1]
],

// ── РІВЕНЬ 3 🥈 Маленький Дослідник (need 15) ──
[
["Хто дає молоко?",["корова","собака","кіт","півень"],0],
["Що росте на дереві?",["картопля","яблуко","морква","цибуля"],1],
["Хто лікує людей?",["вчитель","лікар","водій","кухар"],1],
["Яка пора року найхолодніша?",["літо","весна","зима","осінь"],2],

/* ══════════════════════════════════════════════
   КОНФІГУРАЦІЯ РІВНІВ
══════════════════════════════════════════════ */
const LEVELS = [
  {n:5,  title:"Уважний Учень",          badge:"🥉", color:"var(--bronze)"},
  {n:10, title:"Спостережливий Герой",   badge:"🥉", color:"var(--bronze)"},
  {n:15, title:"Маленький Дослідник",    badge:"🥈", color:"var(--silver)"},
  {n:20, title:"Майстер Уваги",          badge:"🥈", color:"var(--silver)"},
  {n:25, title:"Юний Логік",             badge:"🥈", color:"var(--silver)"},
  {n:30, title:"Майстер Пам'яті",        badge:"🥇", color:"var(--gold-c)"},
  {n:35, title:"Розумний Дослідник",     badge:"🥇", color:"var(--gold-c)"},
  {n:40, title:"Герой Щоденного Життя",  badge:"🥇", color:"var(--gold-c)"},
  {n:45, title:"Чемпіон Логіки",         badge:"🏆", color:"var(--star-c)"},
  {n:50, title:"Лицар Мудрості 👑",      badge:"👑", color:"var(--crown)"}
];

// Тематичні звання за рівень (для 3★)
const EPITHETS = [
  "Уважний Учень", "Спостережливий Герой", "Маленький Дослідник", "Майстер Уваги",
  "Юний Логік", "Майстер Пам'яті", "Розумний Дослідник", "Герой Щоденного Життя",
  "Чемпіон Логіки", "Лицар Мудрості"
];

// Різноманітні фрази за результат
const MSG_POOLS = {
  3: ["Чудово! Ти справжній лицар!", "Бездоганно! Ти майстер!", "Неперевершено! Ти чемпіон!",
      "Фантастика! Ти зірочка!", "Блискуче! Ти герой!", "Супер! Ти переможець!",
      "Вражаюче! Ти геній!", "Відмінно! Ти найкращий!"],
  2: ["Молодець! Майже ідеально!", "Чудова робота!", "Дуже добре! Ще трішки!",
      "Гарний результат! Так тримати!", "Молодчина! Ти на правильному шляху!",
      "Класно! Зовсім близько до зірки!"],
  1: ["Непогано! Спробуй ще раз!", "Добре! Можеш ще краще!", "Є прогрес! Продовжуй!",
      "Незле! Ще трохи практики!", "Гарний початок! Не зупиняйся!"],
  0: ["Тренуйся більше!", "Не здавайся — усе вийде!", "Ще раз — і ти впораєшся!",
      "Спробуй знову, ти зможеш!", "Кожна спроба робить тебе сильнішим!"]
};
const STARS_EMOJI = {3:"🏆", 2:"🌟", 1:"💪", 0:"📚"};

function pickMsg(stars){
  const pool = MSG_POOLS[stars];
  return STARS_EMOJI[stars] + " " + pool[Math.floor(Math.random()*pool.length)];
}

/* ══════════════════════════════════════════════
   СТАН ГРИ
══════════════════════════════════════════════ */
const STORAGE_KEY = 'logikaPamyat';
let state = {
  levelIdx: 0,
  questions: [],
  current: 0,
  score: 0,
  correctIdx: 0
};

/* ══════════════════════════════════════════════
   УТИЛІТИ
══════════════════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch(e) { return {}; }
}

const XP_KEY = 'logikaPamyatXP';
function getXP() {
  return parseInt(localStorage.getItem(XP_KEY) || '0', 10) || 0;
}
function addXP(amount) {
  const total = getXP() + amount;
  localStorage.setItem(XP_KEY, String(total));
  return total;
}

function saveProgress(idx, stars, pct) {
  const p = getProgress();
  if (!p[idx] || stars >= (p[idx].stars || 0)) {
    p[idx] = { stars, pct };
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}

function starsForPct(pct) {
  if (pct >= 85) return 3;
  if (pct >= 70) return 2;
  if (pct >= 50) return 1;
  return 0;
}

function buildMixedPool() {
  let mixed = [];
  for (let i = 0; i < 9; i++) {
    if (POOLS[i] && POOLS[i].length) {
      const sample = shuffle([...POOLS[i]]).slice(0, 6);
      mixed.push(...sample);
    }
  }
  return shuffle(mixed);
}

/* ══════════════════════════════════════════════
   ЗІРКИ ТЛА
══════════════════════════════════════════════ */
function initStars() {
  const container = document.getElementById('starsContainer');
  if (!container) return;
  for (let i = 0; i < 70; i++) {
    const star = document.createElement('div');
    star.className = 'star-dot';
    const size = 0.8 + Math.random() * 2.5;
    star.style.cssText = `
      left:${Math.random() * 100}%;
      top:${Math.random() * 100}%;
      width:${size}px;
      height:${size}px;
      --dur:${2 + Math.random() * 5}s;
      animation-delay:${Math.random() * 5}s
    `;
    container.appendChild(star);
  }
}

/* ══════════════════════════════════════════════
   ГОЛОВНА СТОРІНКА
══════════════════════════════════════════════ */
function renderHome() {
  const progress = getProgress();

  document.getElementById('home-screen').style.display = 'block';
  document.getElementById('test-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';

  const grid = document.getElementById('levels-container');
  grid.innerHTML = '';

  LEVELS.forEach((lv, idx) => {
    const saved = progress[idx];
    const stars = saved ? saved.stars : 0;
    const pct = saved ? saved.pct : 0;
    const unlocked = idx === 0 || (progress[idx - 1] && progress[idx - 1].stars > 0);

    const card = document.createElement('div');
    card.className = `level-card${unlocked ? '' : ' locked'}${saved && saved.stars > 0 ? ' completed' : ''}`;
    card.style.setProperty('--lc', lv.color);
    if (!unlocked) card.style.opacity = '0.5';

    const starsHtml = [1,2,3].map(s =>
      `<span style="color:${stars >= s ? 'var(--gold)' : 'rgba(255,255,255,.25)'}">★</span>`
    ).join('');

    card.innerHTML = `
      <div class="lc-num">${idx + 1}</div>
      <div class="lc-badge">${lv.badge}</div>
      <div class="lc-title">${lv.title}</div>
      <div class="lc-info">
        <span class="lc-stars">${starsHtml}</span>
        ${saved ? `<span class="lc-best">${pct}%</span>` : '<span class="lc-best">—</span>'}
      </div>
      ${unlocked
        ? `<button class="lc-play" onclick="startLevel(${idx})">▶ Грати</button>`
        : '<div class="lc-lock">🔒 Закрито</div>'}
    `;

    grid.appendChild(card);
  });

  const totalStars = Object.values(progress).reduce((s, v) => s + (v.stars || 0), 0);
  const maxStars = LEVELS.length * 3;
  document.getElementById('totalStarsDisplay').textContent = `⭐ Зірок: ${totalStars} / ${maxStars}`;
  document.getElementById('xpDisplayHome').textContent = `⚡ Досвід: ${getXP()} ХР`;
  document.getElementById('progressDisplay').textContent = `Рівнів пройдено: ${Object.keys(progress).length} / ${LEVELS.length}`;
}

/* ══════════════════════════════════════════════
   СТАРТ РІВНЯ
══════════════════════════════════════════════ */
function startLevel(idx) {
  state.levelIdx = idx;
  state.current = 0;
  state.score = 0;
  updateXpDisplay(getXP());

  const lv = LEVELS[idx];
  let pool;
  if (idx === 9) {
    pool = buildMixedPool();
  } else {
    pool = shuffle([...POOLS[idx]]);
  }

  const needed = lv.n;
  state.questions = pool.slice(0, Math.min(needed, pool.length));

  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('test-screen').style.display = 'block';
  document.getElementById('test-title').textContent = `Рівень ${idx + 1}: ${lv.title}`;

  showQuestion();
}

/* ══════════════════════════════════════════════
   ПОКАЗАТИ ПИТАННЯ
══════════════════════════════════════════════ */
function showQuestion() {
  const { questions, current, score } = state;
  const total = questions.length;
  const q = questions[current];

  const pct = Math.round((current / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-num').textContent = `${current + 1} / ${total}`;
  document.getElementById('test-score').textContent = `✅ ${score}`;

  document.getElementById('q-text').textContent = q[0];

  // Рукописний шрифт для рівнів із прописними літерами
  const isCursive = /прописн/i.test(LEVELS[state.levelIdx].title);
  const optionsEl = document.getElementById('options-grid');
  optionsEl.classList.toggle('cursive', isCursive);
  document.getElementById('q-text').classList.toggle('cursive', false);

  optionsEl.innerHTML = '';

  // Перемішуємо варіанти, щоб правильна відповідь не була завжди на одному місці
  const shuffledOpts = shuffle(q[1].map((text, i) => ({ text, orig: i })));
  state.correctIdx = shuffledOpts.findIndex(o => o.orig === q[2]);

  shuffledOpts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = o.text;
    btn.onclick = () => handleAnswer(i);
    optionsEl.appendChild(btn);
  });

  document.getElementById('feedback').textContent = '';
}

/* ══════════════════════════════════════════════
   ОБРОБКА ВІДПОВІДІ
══════════════════════════════════════════════ */
function handleAnswer(idx) {
  const correct = state.correctIdx;
  const buttons = document.querySelectorAll('.opt-btn');

  buttons.forEach(btn => btn.disabled = true);

  if (idx === correct) {
    buttons[idx].classList.add('correct');
    state.score++;
    document.getElementById('feedback').textContent = '✅ Правильно! +1 ХР';
    document.getElementById('feedback').style.color = '#4CAF50';
    // +1 ХР лише за правильну відповідь
    const newXP = addXP(1);
    showXpPopup();
    updateXpDisplay(newXP);
  } else {
    buttons[idx].classList.add('wrong');
    buttons[correct].classList.add('correct');
    document.getElementById('feedback').textContent = '❌ Неправильно!';
    document.getElementById('feedback').style.color = '#E5383B';
  }

  // Автоматичний перехід до наступного питання
  const delay = idx === correct ? 700 : 1300;
  setTimeout(() => nextQuestion(), delay);
}

function showXpPopup() {
  const pop = document.createElement('div');
  pop.className = 'xp-popup';
  pop.textContent = '+1 ХР';
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 1000);
}

function updateXpDisplay(xp) {
  const el = document.getElementById('xp-counter');
  if (el) el.textContent = `⚡ ${xp} ХР`;
}

/* ══════════════════════════════════════════════
   НАСТУПНЕ ПИТАННЯ
══════════════════════════════════════════════ */
function nextQuestion() {
  state.current++;
  if (state.current >= state.questions.length) {
    showResult();
  } else {
    showQuestion();
  }
}

/* ══════════════════════════════════════════════
   РЕЗУЛЬТАТ
══════════════════════════════════════════════ */
function showResult() {
  const { levelIdx, score, questions } = state;
  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  const stars = starsForPct(pct);
  const lv = LEVELS[levelIdx];

  saveProgress(levelIdx, stars, pct);

  document.getElementById('test-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const starsEl = document.getElementById('res-stars');
  starsEl.innerHTML = [1,2,3].map(s =>
    `<span class="result-star${stars >= s ? ' earned' : ''}">★</span>`
  ).join('');

  document.getElementById('res-pct').textContent = `${pct}%`;
  document.getElementById('res-score').textContent = `${score} / ${total} правильних`;

  const msg = pickMsg(stars);
  document.getElementById('res-title').textContent = msg;

  // Тематичне звання за відмінний результат
  const epithet = EPITHETS[levelIdx];
  let levelLine = `Рівень ${levelIdx + 1}: ${lv.title}`;
  if (stars === 3 && epithet) {
    levelLine = `🎖️ Тепер ти — ${epithet}!`;
  }
  document.getElementById('resultBadge').textContent = lv.badge;
  document.getElementById('resultLevel').textContent = levelLine;

  const nextBtn = document.getElementById('nextLevelBtn');
  if (stars > 0 && levelIdx + 1 < LEVELS.length) {
    nextBtn.style.display = 'inline-block';
    nextBtn.onclick = () => startLevel(levelIdx + 1);
  } else {
    nextBtn.style.display = 'none';
  }
}

function retryLevel() {
  startLevel(state.levelIdx);
}

function goHome() {
  renderHome();
}

/* ══════════════════════════════════════════════
   ІНІЦІАЛІЗАЦІЯ
══════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  initStars();
  renderHome();
});
</script>
