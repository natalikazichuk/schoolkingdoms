<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Десятки і одиниці — 10 рівнів</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sk-game-chalk.css">
<style>

/* розрядний стіл */
.mat{
  border:1px solid var(--line);border-radius:var(--r);
  background:rgba(11,16,48,.7);margin:16px 0;overflow:hidden
}
.cols{display:grid;grid-template-columns:1fr 1fr;min-height:150px}
.col{padding:10px 8px 12px}
.col+.col{border-left:1px dashed var(--grid)}
.col h2{
  font-family:"Fredoka",sans-serif;font-size:10px;letter-spacing:.14em;
  color:var(--line);text-transform:uppercase;text-align:center;margin:0 0 10px;font-weight:400
}
.col.hi h2{color:var(--amber)}
.rods{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;align-items:flex-end;min-height:104px}
.rod{
  width:13px;height:100px;border-radius:3px;border:1px solid var(--amber);
  background:repeating-linear-gradient(180deg,rgba(255,193,69,.5) 0 9px,transparent 9px 10px);
  animation:pop .18s ease
}
.cubes{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;align-content:flex-end;min-height:104px}
.cube{
  width:14px;height:14px;border-radius:3px;border:1px solid var(--mint);
  background:rgba(79,214,164,.35);animation:pop .18s ease
}
.rod.bundle{animation:bundle .45s ease}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes bundle{0%{transform:scale(.3) rotate(-8deg);box-shadow:0 0 0 12px rgba(255,193,69,.35)}100%{transform:none;box-shadow:0 0 0 0 rgba(255,193,69,0)}}
.readout{
  border-top:1px solid var(--grid);padding:9px;text-align:center;
  font-family:"Fredoka",sans-serif;font-size:11px;letter-spacing:.1em;color:var(--dim)
}
.readout b{font-family:"Fredoka",sans-serif;font-size:16px;color:var(--chalk);letter-spacing:0}

.bignum{
  font-family:"Fredoka",sans-serif;font-weight:800;font-size:44px;text-align:center;
  padding:26px 10px;letter-spacing:.04em
}
.bignum .d{padding:0 3px;border-radius:8px}
.bignum .d.tens{color:var(--amber)}
.bignum .d.units{color:var(--mint)}

.target{text-align:center;font-family:"Fredoka",sans-serif;font-size:30px;color:var(--amber);margin:2px 0 0}

.opt.word{font-family:"Fredoka",sans-serif;font-size:14px}

.tools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.tools.solo{grid-template-columns:1fr}
.tool{
  border-radius:10px;padding:14px 8px;cursor:pointer;font-family:"Fredoka",sans-serif;
  font-weight:800;font-size:14px;border:1px solid var(--grid);background:rgba(20,26,68,.72);color:var(--chalk)
}
.tool.ten{border-color:var(--amber);color:var(--amber)}
.tool.one{border-color:var(--mint);color:var(--mint)}
.tool:hover{filter:brightness(1.25)}
.reset{
  width:100%;margin-top:8px;padding:10px;border-radius:10px;border:1px solid var(--grid);
  background:transparent;color:var(--dim);font-family:"Fredoka",sans-serif;font-size:11px;cursor:pointer
}
</style>
</head>
<body>
<div class="wrap">

  <div id="screen-map">
    <div class="eyebrow">Математика · 10 рівнів · <span id="sync" class="sync">…</span></div>
    <h1>Десятки і одиниці</h1>
    <div class="hud">
      <div class="stat"><span class="k">XP</span><b id="hud-xp">0</b></div>
      <div class="stat"><span class="k">Точність</span><b id="hud-acc">—</b></div>
      <div class="stat"><span class="k">Рівні</span><b id="hud-lv">0/10</b></div>
    </div>
    <div class="map" id="map"></div>
    <div class="rule"></div>
    <div class="eyebrow">10 одиниць = 1 десяток</div>
    <a class="backlink" href="igry.html">← До ігор</a>
  </div>

  <div id="screen-play" class="hide">
    <div class="eyebrow" id="p-eyebrow"></div>
    <h1 id="p-title"></h1>
    <div class="mat">
      <div class="cols">
        <div class="col" id="col-t"><h2>Десятки</h2><div class="rods" id="rods"></div></div>
        <div class="col" id="col-u"><h2>Одиниці</h2><div class="cubes" id="cubes"></div></div>
      </div>
      <div class="readout" id="readout"></div>
    </div>
    <div class="bignum hide" id="bignum"></div>
    <p class="q" id="p-q"></p>
    <div class="target hide" id="p-target"></div>
    <div class="opts" id="p-opts"></div>
    <div id="p-tools"></div>
    <div class="dots" id="p-dots"></div>
    <div class="msg" id="p-msg"></div>
    <button class="btn ghost" id="p-back">До карти рівнів</button>
  </div>

  <div id="screen-done" class="hide">
    <div class="eyebrow">Рівень пройдено</div>
    <h1 id="d-title"></h1>
    <div class="mat"><p class="q" id="d-text" style="padding:20px 12px"></p></div>
    <button class="btn" id="d-next">Наступний рівень</button>
    <button class="btn ghost" id="d-map">До карти рівнів</button>
  </div>

</div>

<script type="module" src="firebase-config.js"></script>
<script>
const LEVELS = [
  {t:"Порахуй одиниці",  s:"Скільки кубиків на столі",     kind:"countU"},
  {t:"Порахуй десятки",  s:"Скільки паличок по 10",        kind:"countT"},
  {t:"Порахуй усе",      s:"Десятки разом з одиницями",    kind:"countAll"},
  {t:"Одиниці в числі",  s:"Скільки одиниць у числі",      kind:"digitU"},
  {t:"Десятки в числі",  s:"Скільки десятків у числі",     kind:"digitT"},
  {t:"Збери число",      s:"Виклади число на столі",       kind:"build"},
  {t:"Зроби десяток",    s:"10 одиниць = 1 десяток",       kind:"bundle"},
  {t:"Розрядні доданки", s:"47 = 40 + □",                  kind:"split"},
  {t:"Круглі числа",     s:"Нуль одиниць",                 kind:"round"},
  {t:"Чемпіон розрядності", s:"Змішаний рівень",           kind:"mixed"},
];
const PER_LEVEL = 5, XP_FULL = 10, XP_REPLAY = 5;
const MIXED = ["countAll","digitU","digitT","build","split","round"];

const S = {xp:0, unlocked:0, done:Array(10).fill(false), asked:0, right:0};
let L=0, qs=[], qi=0, levelXP=0, replay=false, busy=false;
let mat = {t:0, u:0};   // що зараз лежить на столі

const $ = id => document.getElementById(id);
const rnd = (a,b) => a + Math.floor(Math.random()*(b-a+1));
const shuffle = a => a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(p=>p[1]);

/* ---------- питання ---------- */
function opts3(ans, near){
  const s = new Set([ans]);
  (near||[]).forEach(n => { if(n>=0 && n!==ans && s.size<3) s.add(n); });
  let guard=0;
  while(s.size<3 && guard++<200){ const d = ans + rnd(-3,3); if(d>=0 && d!==ans) s.add(d); }
  return shuffle([...s]).map(String);
}
function make(kind){
  if(kind==="mixed") kind = shuffle(MIXED)[0];
  const n = rnd(11,99), t = Math.floor(n/10), u = n%10;

  if(kind==="countU"){
    const k = rnd(3,9);
    return {kind, show:{t:0,u:k}, q:"Скільки тут одиниць?", opts:opts3(k,[k+1,k-1]), ans:String(k)};
  }
  if(kind==="countT"){
    const k = rnd(2,9);
    return {kind, show:{t:k,u:0}, q:"Скільки тут десятків?", opts:opts3(k,[k*10,k+1]), ans:String(k)};
  }
  if(kind==="countAll"){
    return {kind, show:{t,u}, q:"Скільки всього?", opts:opts3(n,[u*10+t, t+u, n+10]), ans:String(n)};
  }
  if(kind==="digitU"){
    return {kind, num:n, q:`Скільки одиниць у числі ${n}?`, opts:opts3(u,[t,u+1]), ans:String(u)};
  }
  if(kind==="digitT"){
    return {kind, num:n, q:`Скільки десятків у числі ${n}?`, opts:opts3(t,[u,t+1]), ans:String(t)};
  }
  if(kind==="split"){
    const m = u===0 ? n+rnd(1,9) : n, mt = Math.floor(m/10)*10, mu = m%10;
    return {kind, num:m, q:`Розклади число: ${m} = ${mt} + □`, opts:opts3(mu,[mt,Math.floor(m/10)]), ans:String(mu)};
  }
  if(kind==="round"){
    const k = rnd(1,9)*10, ask = Math.random()<.5;
    return ask
      ? {kind, num:k, q:`Скільки одиниць у числі ${k}?`, opts:opts3(0,[k/10,1]), ans:"0"}
      : {kind, num:k, q:`Скільки десятків у числі ${k}?`, opts:opts3(k/10,[0,k/10+1]), ans:String(k/10)};
  }
  if(kind==="build"){
    const target = rnd(12,99);
    return {kind, build:true, target, q:"Виклади це число на столі", tools:"both"};
  }
  // bundle: тільки одиниці — десяток збереться сам
  const target = rnd(11,24);
  return {kind, build:true, target, q:"Виклади число, додаючи по одній одиниці", tools:"one"};
}
function buildLevel(){
  qs = Array.from({length:PER_LEVEL}, () => make(LEVELS[L].kind));
  qi = 0; levelXP = 0;
}

/* ---------- стіл ---------- */
function drawMat(bundled){
  $("rods").innerHTML  = Array.from({length:mat.t}, () => `<div class="rod${bundled?" bundle":""}"></div>`).join("");
  $("cubes").innerHTML = Array.from({length:mat.u}, () => '<div class="cube"></div>').join("");
  const n = mat.t*10 + mat.u;
  $("readout").innerHTML = `${mat.t} ДЕС. + ${mat.u} ОД. = <b>${n}</b>`;
}
function addUnit(){
  if(busy) return;
  mat.u++;
  let bundled = false;
  if(mat.u === 10){ mat.u = 0; mat.t++; bundled = true; }
  drawMat(bundled);
  if(bundled){ $("p-msg").className="msg hint"; $("p-msg").textContent="10 одиниць зібралися в 1 десяток"; }
  checkBuild();
}
function addTen(){ if(busy) return; mat.t++; drawMat(); checkBuild(); }
function resetMat(){ if(busy) return; mat = {t:0,u:0}; drawMat(); $("p-msg").textContent=""; $("p-msg").className="msg"; }
function checkBuild(){
  const q = qs[qi], n = mat.t*10 + mat.u;
  if(n === q.target){ busy = true; finish(true); }
  else if(n > q.target){ busy = true; finish(false); }
}

/* ---------- рендер ---------- */
function drawMap(){
  $("hud-xp").textContent = S.xp;
  $("hud-acc").textContent = S.asked ? Math.round(S.right/S.asked*100)+"%" : "—";
  $("hud-lv").textContent = S.done.filter(Boolean).length + "/10";
  $("map").innerHTML = "";
  LEVELS.forEach((lv,i)=>{
    const b = document.createElement("button");
    const locked = i > S.unlocked;
    b.className = "lvl" + (S.done[i]?" done":"") + (locked?" lock":"");
    b.innerHTML = `<span class="n">РІВЕНЬ ${String(i+1).padStart(2,"0")}</span>${lv.t}
      <span class="tag">${locked ? "зачинено" : (S.done[i] ? "пройдено · повтор ½ XP" : lv.s)}</span>`;
    b.disabled = locked;
    b.onclick = () => startLevel(i);
    $("map").appendChild(b);
  });
}
function show(id){ ["screen-map","screen-play","screen-done"].forEach(s=>$(s).classList.toggle("hide", s!==id)); }

function drawQ(){
  const q = qs[qi];
  $("p-eyebrow").textContent = `РІВЕНЬ ${String(L+1).padStart(2,"0")} · ${replay ? "повтор · ½ XP" : "+"+XP_FULL+" XP за відповідь"}`;
  $("p-title").textContent = LEVELS[L].t;
  $("p-q").textContent = q.q;
  $("p-msg").textContent = ""; $("p-msg").className = "msg";
  $("col-t").classList.toggle("hi", q.kind==="countT" || q.kind==="digitT");
  $("col-u").classList.toggle("hi", q.kind==="countU" || q.kind==="digitU");

  // стіл або велике число
  const showsNumber = q.num !== undefined;
  document.querySelector(".mat").classList.toggle("hide", showsNumber);
  $("bignum").classList.toggle("hide", !showsNumber);
  if(showsNumber){
    const s = String(q.num);
    $("bignum").innerHTML = s.length===2
      ? `<span class="d tens">${s[0]}</span><span class="d units">${s[1]}</span>`
      : `<span class="d">${s}</span>`;
  }else{
    mat = q.build ? {t:0,u:0} : {...q.show};
    $("readout").classList.toggle("hide", !q.build);  // у питаннях «порахуй» табло = відповідь
    drawMat();
  }

  // ціль
  $("p-target").classList.toggle("hide", !q.build);
  if(q.build) $("p-target").textContent = q.target;

  // відповіді
  $("p-opts").innerHTML = ""; $("p-tools").innerHTML = "";
  if(q.build){
    $("p-opts").classList.add("hide");
    const box = document.createElement("div");
    box.className = "tools" + (q.tools==="one" ? " solo" : "");
    if(q.tools!=="one"){
      const t = document.createElement("button");
      t.className="tool ten"; t.textContent="+ десяток"; t.onclick=addTen; box.appendChild(t);
    }
    const o = document.createElement("button");
    o.className="tool one"; o.textContent="+ одиниця"; o.onclick=addUnit; box.appendChild(o);
    const r = document.createElement("button");
    r.className="reset"; r.textContent="почати стіл спочатку"; r.onclick=resetMat;
    $("p-tools").appendChild(box); $("p-tools").appendChild(r);
  }else{
    $("p-opts").classList.remove("hide");
    q.opts.forEach(o=>{
      const b=document.createElement("button"); b.className="opt"; b.textContent=o;
      b.onclick=()=>answer(b,o); $("p-opts").appendChild(b);
    });
  }

  $("p-dots").innerHTML = qs.map((_,i)=>`<span class="dot ${i<qi?"hit":i===qi?"on":""}"></span>`).join("");
  busy=false;
}

/* ---------- відповіді ---------- */
function answer(btn,val){
  if(busy) return; busy=true;
  const ok = val === qs[qi].ans;
  btn.classList.add(ok?"ok":"no");
  [...$("p-opts").children].forEach(b=>{ b.disabled=true; if(!ok && b.textContent===qs[qi].ans) b.classList.add("ok"); });
  finish(ok);
}
function finish(ok){
  if(!qs[qi].build && qs[qi].num === undefined) $("readout").classList.remove("hide");
  if(!replay){ S.asked++; if(ok) S.right++; }
  const msg = $("p-msg");
  if(ok){
    levelXP += replay ? XP_REPLAY : XP_FULL;
    msg.className="msg ok"; msg.textContent = `Правильно · +${replay?XP_REPLAY:XP_FULL} XP`;
    setTimeout(()=>{ qi++; qi<qs.length ? drawQ() : endLevel(); }, 950);
  }else{
    msg.className="msg no";
    msg.textContent = qs[qi].build
      ? `На столі забагато. Правильно було ${qs[qi].target}. Рівень починається спочатку`
      : "Помилка. Рівень починається спочатку, XP рівня скидається";
    setTimeout(()=>{ buildLevel(); drawQ(); }, 1700);
  }
}
function startLevel(i){ L=i; replay=S.done[i]; buildLevel(); show("screen-play"); drawQ(); }
function endLevel(){
  S.xp += levelXP;
  if(!S.done[L]){ S.done[L]=true; if(L===S.unlocked && L<9) S.unlocked=L+1; }
  $("d-title").textContent = LEVELS[L].t;
  $("d-text").textContent = `Зароблено ${levelXP} XP${replay?" (повтор — половина XP, точність не змінюється)":""}. Усього ${S.xp} XP.`;
  $("d-next").classList.toggle("hide", L>=9);
  saveProgress();
  show("screen-done");
}

$("p-back").onclick = ()=>{ drawMap(); show("screen-map"); };
$("d-map").onclick  = ()=>{ drawMap(); show("screen-map"); };
$("d-next").onclick = ()=> startLevel(Math.min(L+1,9));


/* ---------- прогрес: localStorage (ключі sk_*) + heroes/{id}.progress через SK ---------- */
const LS_KEY = "sk_game_rozriadnist";
const setSync = (t,c) => { const e=$("sync"); if(e){ e.textContent=t; e.className="sync "+(c||""); } };

function readLS(){
  try{
    const o = JSON.parse(localStorage.getItem(LS_KEY) || "null");
    if(o && typeof o === "object"){
      S.xp = o.xp|0; S.unlocked = o.unlocked|0; S.asked = o.asked|0; S.right = o.right|0;
      S.done = Array.isArray(o.done) && o.done.length===10 ? o.done : Array(10).fill(false);
    }
  }catch(e){}
}
function saveProgress(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){}
  if(window.SK && SK.pushLocal){
    SK.pushLocal().then(()=>setSync("збережено","ok")).catch(()=>setSync("локально","no"));
  }
}
window.addEventListener("pagehide", saveProgress);

function waitSK(cb){
  let n = 0;
  (function poll(){
    if(window.SK && window.SK.ready) return cb();
    if(++n > 60) return cb(null);           // ~6 с — firebase-config.js не піднявся
    setTimeout(poll, 100);
  })();
}
function boot(){
  readLS(); drawMap(); setSync("з'єднання…");
  waitSK(ok => {
    if(!ok){ setSync("локально — без хмари","no"); return; }
    SK.ready.then(async () => {
      try{
        if(!SK.isHeroSession || !SK.isHeroSession()){ setSync("увійди як Герой","no"); return; }
        await SK.pullLocal();               // хмара → localStorage
        readLS(); drawMap();
        const hero = await SK.getActiveChild();
        setSync(hero && hero.name ? hero.name : "прогрес у хмарі", "ok");
      }catch(e){ setSync("локально","no"); }
    });
  });
}
boot();
</script>
</body>
</html>
