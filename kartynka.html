<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Картинка-пазл</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sk-game.css">
<style>
  #wrap{position:fixed; inset:0; display:flex; flex-direction:column; background:none;}

  #top{display:flex; align-items:center; gap:8px; justify-content:space-between;
    padding:calc(env(safe-area-inset-top) + 10px) 12px 4px;}
  #top .exit{text-decoration:none; color:var(--text); font-weight:700; padding:7px 14px; line-height:1;}
  #hint{text-align:center; font-weight:600; padding:2px 12px 6px; min-height:22px; font-size:15px;}

  #boardWrap{flex:1 1 auto; display:flex; align-items:center; justify-content:center; padding:4px 10px; min-height:0;}
  #board{display:grid; gap:3px; width:min(94vw,100%); max-width:460px; aspect-ratio:1/1;
    background:rgba(20,26,68,.7); padding:6px; border-radius:16px;
    border:3px solid rgba(255,207,77,.45); box-shadow:0 12px 28px rgba(6,16,44,.45);}
  .tile{-webkit-appearance:none; appearance:none; padding:0; border:none; cursor:pointer;
    border-radius:6px; background-repeat:no-repeat; background-color:#0b1030;
    transition:transform .12s, box-shadow .12s; position:relative;}
  .tile.sel{transform:scale(.92); box-shadow:0 0 0 3px var(--gold), 0 0 16px rgba(255,207,77,.7); z-index:2;}
  .tile.ok::after{content:""; position:absolute; inset:0; border-radius:6px;
    box-shadow:inset 0 0 0 2px rgba(123,224,164,.55);}
  #board.solved{border-color:#7be0a4; box-shadow:0 0 26px rgba(123,224,164,.5);}
  #board.solved .tile{border-radius:0;}
  #board.peek .tile{border-radius:0;}

  #bar{display:flex; flex-wrap:wrap; justify-content:center; gap:10px;
    padding:8px 12px calc(env(safe-area-inset-bottom) + 14px);}
  .barbtn{-webkit-appearance:none; appearance:none; cursor:pointer; font-family:inherit; font-weight:700;
    background:rgba(20,26,68,.72); border:2px solid rgba(255,207,77,.4); color:var(--text);
    border-radius:14px; padding:11px 15px; font-size:15px; text-decoration:none;
    display:inline-flex; align-items:center; justify-content:center;}
  .barbtn.gold{background:linear-gradient(180deg,var(--gold),var(--gold-deep)); color:#3a2a00; border:none;}

  .group{display:flex; flex-direction:column; gap:8px; align-items:center;}
  .glabel{font-size:14px; opacity:.85;}
  .seg{display:flex; gap:8px; flex-wrap:wrap; justify-content:center;}
  .opt{-webkit-appearance:none; appearance:none; cursor:pointer; font-family:inherit; font-weight:600;
    background:rgba(20,26,68,.6); border:2px solid rgba(255,207,77,.3); color:var(--text);
    border-radius:14px; padding:10px 14px; font-size:15px;}
  .opt.sel{border-color:var(--gold); background:rgba(255,207,77,.18);}
  .resultbig{font-size:56px;}
</style>
</head>
<body>
<div id="wrap">
  <div id="top">
    <a class="pill exit" href="igry.html" aria-label="До ігор">←</a>
    <div class="pill"><span class="lbl">На місці</span> <span id="okVal">0</span></div>
    <div class="pill"><span class="lbl">Ходи</span> <span id="movesVal">0</span></div>
  </div>

  <div id="hint">Тисни дві частинки — вони поміняються місцями</div>

  <div id="boardWrap"><div id="board"></div></div>

  <div id="bar">
    <a class="barbtn" href="igry.html">← Ігри</a>
    <button class="barbtn" id="peekBtn">👁 Підглянути</button>
    <button class="barbtn" id="menuBtn">☰ Меню</button>
    <button class="barbtn gold" id="newBtn">Нова</button>
  </div>

  <div class="screen" id="startScreen">
    <div class="crown">🧩</div>
    <div class="title">Картинка-пазл</div>
    <div class="group">
      <div class="glabel">На скільки частинок ріжемо?</div>
      <div class="seg" id="sizeSeg">
        <button class="opt sel" data-n="3">🙂 9</button>
        <button class="opt" data-n="4">😃 16</button>
        <button class="opt" data-n="5">🧠 25</button>
      </div>
      <div class="glabel">Картинка</div>
      <div class="seg" id="picSeg">
        <button class="opt sel" data-pic="-1">🎲 Будь-яка</button>
        <button class="opt" data-pic="0">🏰 Замок</button>
        <button class="opt" data-pic="1">🚀 Ракета</button>
        <button class="opt" data-pic="2">🐱 Котик</button>
        <button class="opt" data-pic="3">🌈 Веселка</button>
      </div>
    </div>
    <button class="cta" id="playBtn">Грати</button>
    <div class="sub">Картинку розрізано на частинки й перемішано. Міняй їх місцями, доки не збереш. Зелена рамочка — частинка вже на своєму місці.</div>
    <a class="linkbtn" href="igry.html">← До ігор</a>
  </div>

  <div class="screen hidden" id="overScreen">
    <div class="resultbig">🏆</div>
    <div class="title">Картинку зібрано!</div>
    <div class="sub" id="resultSub"></div>
    <button class="cta" id="againBtn">Ще одна</button>
    <div class="winrow">
      <button class="barbtn" id="backBtn">☰ У меню</button>
      <a class="barbtn" href="igry.html">← До ігор</a>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ═══ КАРТИНКИ: малюємо на canvas, щоб не залежати від файлів ═══ */
  var SIZE=600;
  function draw(pic){
    var cv=document.createElement("canvas");
    cv.width=cv.height=SIZE;
    var x=cv.getContext("2d");
    [castle, rocket, cat, rainbow][pic](x);
    return cv.toDataURL("image/png");
  }
  function sky(x,a,b){
    var g=x.createLinearGradient(0,0,0,SIZE);
    g.addColorStop(0,a); g.addColorStop(1,b);
    x.fillStyle=g; x.fillRect(0,0,SIZE,SIZE);
  }
  function circle(x,cx,cy,r,c){ x.fillStyle=c; x.beginPath(); x.arc(cx,cy,r,0,7); x.fill(); }

  function castle(x){
    sky(x,"#9ad6f5","#5aa3e6");
    circle(x,500,90,52,"#ffe27a");
    x.fillStyle="#7cc35a"; x.beginPath();
    x.moveTo(0,470); x.quadraticCurveTo(300,410,600,470); x.lineTo(600,600); x.lineTo(0,600); x.fill();
    // мури
    x.fillStyle="#d8d2c4"; x.fillRect(160,300,280,180);
    x.fillStyle="#c3bcab"; x.fillRect(110,250,90,230); x.fillRect(400,250,90,230);
    // зубці
    x.fillStyle="#d8d2c4";
    for(var i=0;i<7;i++) x.fillRect(165+i*40,275,26,28);
    x.fillStyle="#c3bcab";
    for(var j=0;j<2;j++){ for(var k=0;k<2;k++) x.fillRect(115+j*290+k*48,222,34,30); }
    // дах веж
    x.fillStyle="#c0392b";
    [155,445].forEach(function(cx){
      x.beginPath(); x.moveTo(cx-62,250); x.lineTo(cx,168); x.lineTo(cx+62,250); x.closePath(); x.fill();
    });
    // прапорці
    x.strokeStyle="#6b5a2a"; x.lineWidth=5;
    [155,445].forEach(function(cx){
      x.beginPath(); x.moveTo(cx,168); x.lineTo(cx,110); x.stroke();
      x.fillStyle="#ffcf4d"; x.beginPath();
      x.moveTo(cx,112); x.lineTo(cx+52,130); x.lineTo(cx,150); x.closePath(); x.fill();
    });
    // ворота і вікна
    x.fillStyle="#5b4326";
    x.beginPath(); x.moveTo(258,480); x.lineTo(258,380); x.quadraticCurveTo(300,340,342,380); x.lineTo(342,480); x.fill();
    x.fillStyle="#2b3373";
    [ [140,320],[430,320],[200,340],[370,340] ].forEach(function(p){ x.fillRect(p[0],p[1],34,46); });
  }

  function rocket(x){
    sky(x,"#1b2050","#3a2b6e");
    for(var i=0;i<70;i++){
      var r=Math.random()*1.8+0.8;
      circle(x, Math.random()*SIZE, Math.random()*SIZE*0.8, r, "rgba(255,255,255,"+(0.4+Math.random()*0.6)+")");
    }
    circle(x,110,110,54,"#f2e9c8"); circle(x,132,96,44,"#3a2b6e");
    // полумʼя
    x.fillStyle="#ffb03a"; x.beginPath();
    x.moveTo(268,440); x.quadraticCurveTo(300,560,332,440); x.closePath(); x.fill();
    x.fillStyle="#ff6b3a"; x.beginPath();
    x.moveTo(283,440); x.quadraticCurveTo(300,510,317,440); x.closePath(); x.fill();
    // крила
    x.fillStyle="#c0392b";
    x.beginPath(); x.moveTo(250,430); x.lineTo(200,470); x.lineTo(250,360); x.closePath(); x.fill();
    x.beginPath(); x.moveTo(350,430); x.lineTo(400,470); x.lineTo(350,360); x.closePath(); x.fill();
    // корпус
    x.fillStyle="#eceff7"; x.beginPath();
    x.moveTo(300,110); x.quadraticCurveTo(360,240,352,440); x.lineTo(248,440);
    x.quadraticCurveTo(240,240,300,110); x.fill();
    x.fillStyle="#c0392b"; x.beginPath();
    x.moveTo(300,110); x.quadraticCurveTo(330,175,336,215); x.lineTo(264,215);
    x.quadraticCurveTo(270,175,300,110); x.fill();
    circle(x,300,290,42,"#7fd0f5"); circle(x,300,290,32,"#2f74c8");
    circle(x,288,278,10,"rgba(255,255,255,.75)");
  }

  function cat(x){
    sky(x,"#ffd9a8","#ff9f6b");
    // вуха
    x.fillStyle="#f2a900";
    x.beginPath(); x.moveTo(170,180); x.lineTo(200,60); x.lineTo(280,140); x.closePath(); x.fill();
    x.beginPath(); x.moveTo(430,180); x.lineTo(400,60); x.lineTo(320,140); x.closePath(); x.fill();
    x.fillStyle="#ffb8c6";
    x.beginPath(); x.moveTo(196,168); x.lineTo(212,104); x.lineTo(258,148); x.closePath(); x.fill();
    x.beginPath(); x.moveTo(404,168); x.lineTo(388,104); x.lineTo(342,148); x.closePath(); x.fill();
    // голова
    circle(x,300,320,170,"#ffc65c");
    // очі
    circle(x,238,290,38,"#fffdf5"); circle(x,362,290,38,"#fffdf5");
    circle(x,240,294,20,"#2b2f5e"); circle(x,364,294,20,"#2b2f5e");
    circle(x,233,286,7,"#fff"); circle(x,357,286,7,"#fff");
    // ніс і рот
    x.fillStyle="#ff8095"; x.beginPath();
    x.moveTo(300,342); x.lineTo(322,362); x.lineTo(278,362); x.closePath(); x.fill();
    x.strokeStyle="#8a5a12"; x.lineWidth=6; x.lineCap="round";
    x.beginPath(); x.moveTo(300,364); x.lineTo(300,384); x.stroke();
    x.beginPath(); x.arc(276,388,24,0,Math.PI); x.stroke();
    x.beginPath(); x.arc(324,388,24,0,Math.PI); x.stroke();
    // вуса
    x.lineWidth=5;
    [[-1,0],[-1,18],[1,0],[1,18]].forEach(function(d){
      x.beginPath(); x.moveTo(300+d[0]*46,356+d[1]);
      x.lineTo(300+d[0]*190,340+d[1]*1.6); x.stroke();
    });
  }

  function rainbow(x){
    sky(x,"#dff3ff","#a8dcff");
    var cols=["#e74c3c","#f39c12","#f7d038","#5ec269","#3aa5e0","#5b53c7","#9b59b6"];
    for(var i=0;i<7;i++){
      x.strokeStyle=cols[i]; x.lineWidth=34;
      x.beginPath(); x.arc(300,470,330-i*34,Math.PI,0); x.stroke();
    }
    // хмаринки
    function cloud(cx,cy,s){
      x.fillStyle="#ffffff";
      circle(x,cx,cy,34*s); circle(x,cx+34*s,cy+8*s,26*s); circle(x,cx-34*s,cy+8*s,24*s);
      x.fillRect(cx-36*s,cy+4*s,72*s,26*s);
    }
    cloud(110,430,1.1); cloud(490,430,1.0); cloud(300,120,0.8);
    // трава й квіти
    x.fillStyle="#6dbb4e"; x.fillRect(0,470,SIZE,130);
    x.fillStyle="#5aa843"; x.beginPath();
    x.moveTo(0,500); x.quadraticCurveTo(300,455,600,500); x.lineTo(600,600); x.lineTo(0,600); x.fill();
    [[70,540,"#ffcf4d"],[190,566,"#ff8095"],[330,542,"#fff"],[450,570,"#ffcf4d"],[540,536,"#ff8095"]]
      .forEach(function(f){
        circle(x,f[0],f[1],13,f[2]); circle(x,f[0],f[1],5,"#f2a900");
      });
  }

  /* ═══ ГРА ═══ */
  var N=3, picChoice=-1, pic=0, url="", order=[], sel=-1, moves=0, done=false;
  var boardEl=document.getElementById("board");
  var hintEl=document.getElementById("hint");

  function shuffled(n){
    var a=[]; for(var i=0;i<n;i++) a.push(i);
    do{
      for(var i2=a.length-1;i2>0;i2--){ var j=(Math.random()*(i2+1))|0; var t=a[i2]; a[i2]=a[j]; a[j]=t; }
    } while(a.every(function(v,k){ return v===k; }));       // не даємо вже зібрану картинку
    return a;
  }

  function build(){
    pic = picChoice>=0 ? picChoice : (Math.random()*4)|0;
    url = draw(pic);
    order = shuffled(N*N);
    sel=-1; moves=0; done=false;
    boardEl.className="";
    boardEl.style.gridTemplateColumns="repeat("+N+",1fr)";
    boardEl.innerHTML=order.map(function(_,i){
      return '<button class="tile" data-p="'+i+'" aria-label="частинка"></button>';
    }).join("");
    Array.prototype.forEach.call(boardEl.children,function(el){
      el.addEventListener("click", function(){ tap(parseInt(el.getAttribute("data-p"),10)); });
    });
    paint();
    document.getElementById("movesVal").textContent="0";
    hintEl.textContent="Тисни дві частинки — вони поміняються місцями";
  }

  function paint(){
    var okCount=0;
    Array.prototype.forEach.call(boardEl.children,function(el,pos){
      var t=order[pos];
      var col=t%N, row=(t/N)|0;
      el.style.backgroundImage="url("+url+")";
      el.style.backgroundSize=(N*100)+"% "+(N*100)+"%";
      el.style.backgroundPosition=(col*100/(N-1))+"% "+(row*100/(N-1))+"%";
      el.className="tile"+(pos===sel?" sel":"")+(t===pos?" ok":"");
      if(t===pos) okCount++;
    });
    document.getElementById("okVal").textContent=okCount+"/"+(N*N);
  }

  function tap(pos){
    if(done) return;
    if(sel<0){ sel=pos; paint(); return; }
    if(sel===pos){ sel=-1; paint(); return; }
    var t=order[sel]; order[sel]=order[pos]; order[pos]=t;
    sel=-1; moves++;
    document.getElementById("movesVal").textContent=moves;
    paint();
    if(order.every(function(v,k){ return v===k; })) win();
  }

  function win(){
    done=true;
    boardEl.classList.add("solved");
    hintEl.textContent="Готово! 🎉";
    document.getElementById("resultSub").textContent=
      "Частинок: "+(N*N)+" · ходів: "+moves;
    setTimeout(function(){ document.getElementById("overScreen").classList.remove("hidden"); }, 550);
  }

  var peekTimer=0;
  document.getElementById("peekBtn").addEventListener("click", function(){
    if(done) return;
    clearTimeout(peekTimer);
    var saved=order.slice();
    order=order.map(function(_,i){ return i; });
    paint();
    boardEl.classList.add("peek");
    hintEl.textContent="Ось як має бути 👀";
    peekTimer=setTimeout(function(){
      order=saved; boardEl.classList.remove("peek"); paint();
      hintEl.textContent="Тисни дві частинки — вони поміняються місцями";
    }, 1600);
  });

  document.getElementById("sizeSeg").addEventListener("click", function(e){
    var b=e.target.closest(".opt"); if(!b) return;
    N=parseInt(b.getAttribute("data-n"),10);
    Array.prototype.forEach.call(this.children,function(x){ x.classList.toggle("sel", x===b); });
  });
  document.getElementById("picSeg").addEventListener("click", function(e){
    var b=e.target.closest(".opt"); if(!b) return;
    picChoice=parseInt(b.getAttribute("data-pic"),10);
    Array.prototype.forEach.call(this.children,function(x){ x.classList.toggle("sel", x===b); });
  });

  function startGame(){
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("overScreen").classList.add("hidden");
    build();
  }
  document.getElementById("playBtn").addEventListener("click", startGame);
  document.getElementById("againBtn").addEventListener("click", startGame);
  document.getElementById("newBtn").addEventListener("click", startGame);
  document.getElementById("menuBtn").addEventListener("click", function(){
    document.getElementById("startScreen").classList.remove("hidden");
  });
  document.getElementById("backBtn").addEventListener("click", function(){
    document.getElementById("overScreen").classList.add("hidden");
    document.getElementById("startScreen").classList.remove("hidden");
  });

  build();
})();
</script>
</body>
</html>
