<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тести — School Kingdoms</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sk-styles.css">
<style>
  /* ── шапка (беремо .topbar зі sk-styles) ── */
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none}
  .brand .crest{font-size:1.8rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,.45))}
  .brand-name{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(1.2rem,3vw,1.6rem);color:#fff;text-shadow:0 2px 5px rgba(0,0,0,.45)}
  .brand-name b{color:var(--gold)}
  .brand-sub{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:#ffe9b8;font-weight:700;margin-top:2px}
  .nav-links{display:flex;gap:10px;flex-wrap:wrap}
  .nav-btn{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);
    border:1.5px solid rgba(242,199,92,.5);color:#fff;text-decoration:none;border-radius:12px;
    padding:9px 16px;font-weight:800;font-size:.85rem;transition:transform .15s,background .15s}
  .nav-btn:hover{transform:translateY(-2px);background:rgba(255,255,255,.16)}

  /* ── заголовок сторінки ── */
  .page-head{max-width:940px;margin:0 auto;padding:clamp(18px,4vh,40px) 20px 6px;text-align:center}

  /* ── смужка Героя (якщо увійшов Герой) ── */
  .hero-strip{max-width:720px;margin:22px auto 0;display:none;
    background:linear-gradient(180deg,rgba(16,33,62,.85),rgba(10,22,46,.9));
    border:2px solid var(--gold);border-radius:16px;padding:12px 18px;
    box-shadow:0 10px 26px rgba(0,0,0,.4)}
  .hero-strip.show{display:block}
  .hs-name{font-family:'Playfair Display',serif;font-weight:800;color:#FBEFD0;font-size:1.05rem;margin-bottom:8px}
  .hs-stats{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .hs-stat{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:5px 12px;font-weight:800;font-size:.85rem;color:#eaf1ff}
  .hs-stat b{color:var(--gold)}
  .hs-guest{max-width:720px;margin:20px auto 0;text-align:center;color:#cdd8ef;font-weight:600;font-size:.9rem;
    background:rgba(255,255,255,.05);border:1px dashed rgba(242,199,92,.45);border-radius:14px;padding:12px 16px;display:none}
  .hs-guest.show{display:block}
  .hs-guest a{color:var(--gold);font-weight:800}

  /* ── контейнер ── */
  .wrap{max-width:940px;margin:0 auto;padding:24px 18px 70px}

  /* ── ступінь (tier) ── */
  details.tier{margin:0 0 16px;border-radius:20px;overflow:hidden;
    background:linear-gradient(165deg,rgba(30,52,92,.55),rgba(12,28,54,.62));
    border:2px solid rgba(242,199,92,.5);box-shadow:0 12px 30px rgba(0,0,0,.38)}
  details.tier > summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:14px;
    padding:18px 20px;user-select:none}
  details.tier > summary::-webkit-details-marker{display:none}
  .tier-ic{font-size:1.9rem;line-height:1;flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
  .tier-tt{flex:1 1 auto;min-width:0}
  .tier-name{font-family:'Playfair Display',serif;font-weight:800;font-size:clamp(1.2rem,3vw,1.55rem);color:#fff}
  .tier-note{font-size:.82rem;color:#c6d3ea;font-weight:600;margin-top:2px}
  .tier-arrow{font-size:1.1rem;color:#f0d9a6;transition:transform .25s;flex-shrink:0}
  details.tier[open] > summary .tier-arrow{transform:rotate(180deg)}
  .pill{font-size:.66rem;font-weight:800;letter-spacing:.03em;padding:3px 10px;border-radius:999px;white-space:nowrap}
  .pill.ready{background:rgba(120,220,150,.18);color:#9be6b0;border:1px solid rgba(120,220,150,.35)}
  .pill.wip{background:rgba(242,199,92,.16);color:#f2d68a;border:1px solid rgba(242,199,92,.4)}
  .pill.soon{background:rgba(255,255,255,.08);color:#c9cbe0;border:1px solid rgba(255,255,255,.18)}
  .tier-body{padding:4px 18px 20px}

  /* ── клас ── */
  .grade-name{font-family:'Playfair Display',serif;font-weight:800;color:var(--gold);
    font-size:1.05rem;margin:14px 4px 10px;display:flex;align-items:center;gap:8px}

  /* ── предмет ── */
  details.subj{margin:0 0 12px;border-radius:16px;overflow:hidden;background:rgba(9,20,42,.5);
    border:1.5px solid rgba(255,255,255,.1)}
  details.subj > summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:12px;
    padding:13px 16px;border-left:7px solid var(--accent,#5C6BC0)}
  details.subj > summary::-webkit-details-marker{display:none}
  .subj-ic{font-size:1.5rem;line-height:1;flex-shrink:0}
  .subj-tt{flex:1 1 auto;min-width:0;display:flex;flex-direction:column}
  .subj-name{font-weight:800;font-size:1.02rem;color:#fff}
  .subj-stat{font-size:.74rem;color:#b9c4e0;font-weight:700;margin-top:2px}
  .subj-stat b{color:var(--accent,#8fa2e6)}
  .subj-arrow{font-size:1rem;color:#cfd4ff;transition:transform .25s;flex-shrink:0}
  details.subj[open] > summary .subj-arrow{transform:rotate(180deg)}
  /* бейдж прогресу предмета (рівень + ХР), напр. біля Математики */
  .subj-prog{flex-shrink:0;display:inline-flex;align-items:center;gap:7px;font-size:.72rem;
    font-weight:800;color:#eaf1ff;background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.16);padding:5px 12px;border-radius:999px;white-space:nowrap}
  .subj-prog .lvl{color:var(--gold)}
  .subj-prog .xp{color:var(--gold)}
  .subj-body{padding:12px 16px 16px}
  .grp-title{font-weight:800;font-size:.72rem;letter-spacing:.05em;color:#c3c8f0;margin:2px 0 8px;text-transform:uppercase}
  .grp-soon{color:#8a94b4;font-weight:600;font-size:.8rem;font-style:italic;margin:0 0 10px}
  .grp-title:not(:first-child){margin-top:14px}

  /* ── теми/тести (чіпи) ── */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:inline-flex;align-items:center;gap:7px;font-size:.85rem;font-weight:700;
    padding:9px 13px;border-radius:11px;text-decoration:none;transition:filter .15s,transform .1s}
  .chip.ready{background:var(--accent,#5C6BC0);color:#fff;box-shadow:0 3px 0 rgba(0,0,0,.32)}
  .chip.ready:hover{filter:brightness(1.12);transform:translateY(-1px)}
  .chip-xp{font-size:.72rem;font-weight:800;color:var(--gold);
    background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.18);
    padding:2px 8px;border-radius:999px;white-space:nowrap}
  /* бейдж пройдених рівнів поруч із тестом, напр. «🧩 3/10 рівнів» */
  .chip-lvprog{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;font-weight:800;
    color:#eaf1ff;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);
    padding:7px 12px;border-radius:11px;white-space:nowrap}
  .chip-lvprog b{color:var(--gold)}
  .chip-lvprog.done{border-color:rgba(120,220,150,.5);color:#bff0cd;background:rgba(120,220,150,.1)}
  .chip-lvprog.done b{color:#9be6b0}
  /* тест разом із бейджами тримаємо однією групою */
  .chip-group{display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap}
  /* заблокований тест: не клікається, приглушений */
  .chip.ready.locked{pointer-events:none;opacity:.5;filter:grayscale(.45);box-shadow:none;cursor:not-allowed}
  /* підказка-замок поруч із закритим тестом */
  .chip-lock{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:800;
    color:#f2d68a;background:rgba(242,199,92,.12);border:1px solid rgba(242,199,92,.4);
    padding:7px 12px;border-radius:11px;white-space:nowrap}
  .chip.plan{background:rgba(255,255,255,.05);color:#aeb6d6;border:1px solid rgba(255,255,255,.14);cursor:default}
  .chip .num{opacity:.65;font-weight:800}
  .chip .dot{color:var(--accent,#8fa2e6);font-weight:900}

  /* ── 🏆 Досягнення (завершені на 100% тести) ── */
  .ach{max-width:940px;margin:0 auto;padding:22px 18px 0;display:none}
  .ach.show{display:block}
  .ach-card{border-radius:20px;padding:16px 18px 18px;
    background:linear-gradient(165deg,rgba(74,58,18,.55),rgba(34,26,8,.55));
    border:2px solid var(--gold);box-shadow:0 12px 30px rgba(0,0,0,.4)}
  .ach-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .ach-ic{font-size:1.8rem;line-height:1;flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
  .ach-tt{flex:1 1 auto;min-width:0}
  .ach-name{font-family:'Playfair Display',serif;font-weight:800;font-size:clamp(1.15rem,3vw,1.5rem);color:var(--gold)}
  .ach-sub{font-size:.8rem;color:#e8d9a6;font-weight:600;margin-top:2px}
  .ach-count{flex-shrink:0;font-size:.72rem;font-weight:800;color:#ffe9b8;white-space:nowrap;
    background:rgba(255,207,77,.14);border:1px solid rgba(255,207,77,.4);padding:5px 12px;border-radius:999px}
  .ach-list{display:flex;flex-wrap:wrap;gap:8px}
  .chip-passed{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;font-weight:800;
    color:#bff0cd;background:rgba(120,220,150,.14);border:1px solid rgba(120,220,150,.5);
    padding:7px 12px;border-radius:11px;white-space:nowrap}

  .foot{max-width:940px;margin:0 auto;padding:0 20px 40px;color:#a9b6d4;font-size:.82rem;text-align:center;line-height:1.6}
  .foot b{color:var(--gold)}
  .foot code{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:1px 6px;color:#ffe9b8;font-size:.9em}

  @media(max-width:560px){
    .nav-links .nav-btn span{display:none}
    .nav-btn{padding:9px 12px}
  }

  /* ───── BOTTOM NAV (як на сторінці Героя) ───── */
  .botnav{position:sticky;bottom:0;z-index:30;margin-top:16px;
    background:linear-gradient(180deg,#1e3a6b,#16294f);
    border-top:3px solid #e0a42a;display:flex;align-items:center;
    gap:2px;padding:6px 8px;overflow-x:auto;scrollbar-width:none}
  .botnav::-webkit-scrollbar{display:none}
  .botnav a,.botnav button{display:flex;flex-direction:column;align-items:center;gap:2px;
    color:#cfe0f5;background:none;border:none;cursor:pointer;font-family:inherit;
    font-weight:800;font-size:.66rem;padding:5px 12px;border-radius:12px;text-decoration:none;
    white-space:nowrap;flex:1;min-width:52px;transition:.15s}
  .botnav .ic{font-size:1.2rem}
  .botnav a.active{background:linear-gradient(180deg,#f4c842,#e0a42a);color:#5a3d05;box-shadow:0 3px 10px rgba(0,0,0,.3)}
  .botnav a:hover:not(.active){background:rgba(255,255,255,.1);color:#fff}
</style>
</head>
<body>
  <div class="bg-fallback"></div>
  <div class="stars"></div>
  <div class="moon"></div>

  <!-- СПІЛЬНИЙ ХЕДЕР (бренд + шкала Героя) вставляється через sk-header.js -->

  <!-- 🏆 ДОСЯГНЕННЯ (тести, пройдені на 100% рівнів) — заповнюється з JS -->
  <section class="ach" id="skAch">
    <div class="ach-card">
      <div class="ach-head">
        <span class="ach-ic">🏆</span>
        <span class="ach-tt">
          <span class="ach-name">Досягнення</span>
          <span class="ach-sub">Тести, пройдені на всі рівні</span>
        </span>
        <span class="ach-count" id="skAchCount">0 тестів</span>
      </div>
      <div class="ach-list" id="skAchList"></div>
    </div>
  </section>

  <!-- ДОРОЖНЯ КАРТА -->
  <main class="wrap" id="root"></main>

  <div class="foot">

    Схему впливу узгоджуємо окремо.

<!-- BOTTOM NAV -->

<script>
/* ============================================================
   ДОРОЖНЯ КАРТА — лише КІСТЯК (ступені/класи/предмети + оформлення).
   Самі тести підтягуються з бази (SK.listActiveTests) і розкладаються
   по предметах за полями grade + subject. Нічого не губиться:
   несопоставлені тести потрапляють у предмет «Інші тести».
     • keys[]   — підрядки, за якими subject тесту зіставляється з предметом
     • gradeNum — номер класу для співставлення з полем grade тесту
   ============================================================ */
const CURRICULUM = [
  {
    id:'preschool', icon:'🌱', name:'Дошкільна підготовка', status:'soon',
    note:'Готуємо майбутнього першачка. Заплановано.',
    grades:[]
  },
  {
    id:'junior', icon:'🎓', name:'Молодша школа', status:'wip',
    note:'1 клас — активний. 2–4 класи заплановано.',
    grades:[
      {
        id:'g1', name:'1 клас', status:'wip', gradeNum:1,
        subjects:[
          { id:'math', icon:'🧮', name:'Математика',        accent:'#5C6BC0', stat:'Точність 🎯',  keys:['матем'], items:[] },
          { id:'yads', icon:'🌍', name:'ЯДС · Я досліджую світ', accent:'#E0954E', stat:'Спритність 🏃', keys:['ядс','я досліджую світ','природознав','довкіл'], items:[] },
          { id:'eng',  icon:'🔤', name:'English',            accent:'#3FB6A8', stat:'Мана 🔮',      keys:['english','англ'], items:[] },
          { id:'ukr',  icon:'🌺', name:'Українська мова',    accent:'#D6577A', stat:'Здоров\u2019я \u2764\ufe0f', keys:['україн','укр мова','рідна мова'], items:[] }
        ]
      }
    ]
  },
  {
    id:'senior', icon:'🏰', name:'Старша школа', status:'soon',
    note:'5–11 класи. Заплановано.',
    grades:[]
  }
];

/* ── рендер ── */
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function pill(status){
  if(status==='ready') return '<span class="pill ready">✅ Доступно</span>';
  if(status==='wip')   return '<span class="pill wip">🔧 Готуємо</span>';
  return '<span class="pill soon">🔒 Скоро</span>';
}
function chip(it, accent){
  if(it.status==='ready' && it.href){
    var badge = it.levels
      ? ' <span class="chip-xp">🧩 рівні</span>'
      : (it.xpKey ? ' <span class="chip-xp" data-xpkey="'+it.xpKey+'">0 XP</span>' : '');
    var tgt = it.db ? '' : ' target="_blank" rel="noopener"';
    // замок: чіп починає життя заблокованим, applyLocks() відкриє його за умовою
    var locked   = !!it.lockPreId;
    var lockAttr = locked ? ' data-lock-preid="'+it.lockPreId+'" data-lock-prelevels="'+(it.lockPreLevels||0)+'"' : '';
    var lockCls  = locked ? ' locked' : '';
    var parts = '<a class="chip ready'+lockCls+'" href="'+it.href+'"'+tgt+lockAttr+' style="--accent:'+accent+'">▶ '+esc(it.label)+badge+'</a>';
    if(locked){
      parts += '<span class="chip-lock">🔒 Пройди «'+esc(it.lockPreTitle||'')+'» на 55%</span>';
    }
    // окремий бейдж прогресу рівнів поруч із тестом (для тестів формату «рівні»)
    if(it.levels && it.testId){
      var total = it.levelCount||0;
      var lvStyle = locked ? ' style="display:none"' : '';
      parts += '<span class="chip-lvprog" data-lvkey="sk_lvtest_'+it.testId+'_done" data-lvtotal="'+total+'"'+lvStyle+'>🧩 <b>0</b>/'+total+' рівнів</span>';
    }
    return '<span class="chip-group">'+parts+'</span>';
  }
  return '<span class="chip plan" style="--accent:'+accent+'"><span class="dot">•</span> '+esc(it.label)+'</span>';
}
function subjectHtml(s){
  var accent = s.accent || '#5C6BC0';
  var body = '';
  if(Array.isArray(s.groups)){
    s.groups.forEach(function(g){
      body += '<div class="grp-title">'+g.title+'</div>';
      if(g.items && g.items.length){
        body += '<div class="chips">'+ g.items.map(function(i){return chip(i,accent);}).join('') +'</div>';
      } else {
        body += '<p class="grp-soon">🔜 Скоро — тести додаються</p>';
      }
    });
  }
  if(Array.isArray(s.items) && s.items.length){
    body += '<div class="grp-title">📚 Теми ('+s.items.length+')</div><div class="chips">'
          + s.items.map(function(i,idx){
              var c = chip(i,accent);
              return c.replace('<span class="dot">•</span> ','<span class="num">'+(idx+1)+'.</span> ');
            }).join('') + '</div>';
  }
  if(!body){
    body = '<p style="color:#9aa6c6;font-weight:600;font-size:.85rem;font-style:italic;margin:2px 0">Тестів поки немає — додай їх в адмін-панелі.</p>';
  }
  return '<details class="subj" style="--accent:'+accent+'">'
    + '<summary><span class="subj-ic">'+s.icon+'</span>'
    + '<span class="subj-tt"><span class="subj-name">'+s.name+'</span>'
    + '<span class="subj-stat"><b>'+s.stat+'</b></span></span>'
    + '<span class="subj-arrow">▾</span></summary>'
    + '<div class="subj-body">'+body+'</div></details>';
}
function tierHtml(t, openFirst){
  var inner = '';
  if(Array.isArray(t.grades) && t.grades.length){
    t.grades.forEach(function(g){
      inner += '<div class="grade-name">📖 '+g.name+'</div>';
      inner += (g.subjects||[]).map(subjectHtml).join('');
    });
  } else {
    inner = '<p style="color:#c6d3ea;font-weight:600;font-size:.9rem;padding:6px 4px 4px">'
          + (t.note || 'У розробці.') + '</p>';
  }
  return '<details class="tier"'+(openFirst?' open':'')+'>'
    + '<summary><span class="tier-ic">'+t.icon+'</span>'
    + '<span class="tier-tt"><span class="tier-name">'+t.name+'</span>'
    + '<span class="tier-note">'+t.note+'</span></span>'
    + pill(t.status)
    + '<span class="tier-arrow">▾</span></summary>'
    + '<div class="tier-body">'+inner+'</div></details>';
}
/* ── зіставлення тесту з предметом дорожньої карти ── */
function norm(s){ return String(s==null?'':s).toLowerCase().replace(/[’'`]/g,'').replace(/\s+/g,' ').trim(); }
function subjectMatches(subj, testSubject){
  var t = norm(testSubject);
  if(!t) return false;
  if(norm(subj.name)===t) return true;
  return (subj.keys||[]).some(function(k){ return t.indexOf(norm(k))!==-1; });
}
function isLevelsTest(t){ return !!(t && (t.format==='levels' || (Array.isArray(t.levels) && t.levels.length))); }
/* ══ КАРТА ТЕМ МАТЕМАТИКИ (єдине джерело правди) ══
   З цього масиву будується І групування тестів на сторінці, І порядок замків.
   Як редагувати самостійно:
     • додати тему        → додай {topic:'Назва', chain:false, tests:['Назва тесту']}
     • додати тест у тему  → впиши його назву в масив tests
                             (назва має ТОЧНО збігатися з назвою тесту в адмінці)
     • порядок тестів      = порядок назв у tests
     • chain:true  → тема в «ланцюгу»: кожен наступний тест ланцюга відкривається
                     лише коли попередній пройдено на 55%
     • chain:false → тема вільна: усі її тести доступні одразу
   ⚠ Цей масив має бути ІДЕНТИЧНИМ у test.html. */
var PASS_RATIO = 0.55;
var MATH_CURRICULUM = [
  { topic:'Лічба',                chain:false, tests:['Лічба вперед/назад'] },
  { topic:'Числа в межах 10',      chain:true,  tests:['Додавання до 10','Віднімання до 10'] },
  { topic:'Числа в межах 20',      chain:true,  tests:['Додавання до 20','Віднімання до 20'] },
  { topic:'Числа в межах 100',     chain:true,  tests:['Додавання до 100','Віднімання до 100'] },
  { topic:'Задачі',                chain:false, tests:['Задачі на додавання','Задачі на віднімання'] },
  { topic:'Розрядність чисел',     chain:false, tests:['Десятки і одиниці'] },
  { topic:'Вирази у дві дії',       chain:false, tests:['Вирази у дві дії: додавання','Вирази у дві дії: віднімання'] },
  { topic:'Вирази у три дії',      chain:false, tests:['Вирази у три дії: додавання','Вирази у три дії: віднімання'] },
  { topic:'Назви компонентів дій', chain:false, tests:['Компоненти додавання','Компоненти віднімання'] },
  { topic:'Величини (см, дм, м)',  chain:false, tests:['Одиниці довжини'] },
  { topic:'Порівняння чисел',      chain:false, tests:['Порівняння чисел'] },
  { topic:'Геометричні фігури',    chain:false, tests:['Геометричні фігури'] },
  { topic:'Цікава математика',     chain:false, tests:['Логічні задачі'] }
];
/* «ланцюг» = усі тести тем із chain:true, по порядку */
function mathChain(){
  var arr=[];
  MATH_CURRICULUM.forEach(function(t){ if(t.chain) (t.tests||[]).forEach(function(n){ arr.push(n); }); });
  return arr;
}
/* назва попереднього тесту в ланцюгу (null, якщо тест не в ланцюгу або перший) */
function chainPrevTitle(title){
  var arr=mathChain(), w=norm(title);
  for(var i=0;i<arr.length;i++){ if(norm(arr[i])===w) return i>0?arr[i-1]:null; }
  return null;
}
/* чи «пройдено на 55%» тест pre. lookup(key)→значення (localStorage/Firebase) */
function isTestPassed(pre, lookup){
  if(!pre || !pre.id) return false;
  var mark=lookup('sk_testpass_'+pre.id);
  if(mark==='1'||mark===1||mark===true) return true;
  if(pre.levels>0){
    var done=countDoneLevels(lookup('sk_lvtest_'+pre.id+'_done'));
    return (done/pre.levels)>=PASS_RATIO;
  }
  return false;
}

function testChip(t, byTitle){
  var lv = isLevelsTest(t);
  var c = { db:true, status:'ready', label:t.title||'Тест',
    href:'test.html?id='+encodeURIComponent(t.id),
    levels:lv, testId:t.id,
    levelCount: lv ? (Array.isArray(t.levels)?t.levels.length:0) : 0,
    grade:t.grade };
  // замок лише для тестів у «ланцюгу»: відкривається, коли попередній тест
  // ланцюга пройдено на 55%. Немає попереднього серед активних → fail-open.
  var prevTitle = chainPrevTitle(t.title);
  if(prevTitle && byTitle){
    var pre = byTitle[norm(prevTitle)];
    if(pre && pre.id){
      c.lockPreId     = pre.id;
      c.lockPreTitle  = pre.title;
      c.lockPreLevels = isLevelsTest(pre) ? (Array.isArray(pre.levels)?pre.levels.length:0) : 0;
    }
  }
  return c;
}

/* ── розкласти тести з бази по предметах (мутуємо CURRICULUM) ── */
function distribute(tests){
  var index = []; var mathSubj = null;
  CURRICULUM.forEach(function(tier){
    (tier.grades||[]).forEach(function(g){
      (g.subjects||[]).forEach(function(s){
        s.items = []; s.groups = null;
        index.push({gradeNum:g.gradeNum, subj:s});
        if(g.gradeNum===1 && s.id==='math') mathSubj = s;
      });
    });
  });
  var byTitle = {};
  (tests||[]).forEach(function(t){ if(t && t.id && t.title) byTitle[norm(t.title)] = t; });

  // 1) МАТЕМАТИКА → групи за темами (з MATH_CURRICULUM)
  //    Тест потрапляє в тему, якщо: (а) його назва є в списку теми,
  //    (б) у тесті задано поле topic == назва теми (керується з адмінки),
  //    (в) назва тесту починається з назви теми (зручний префікс).
  var mathTaken = {};    // назви тестів, уже показані в темах Математики
  var mathUsedId = {};   // id тестів, уже доданих (щоб не дублювати)
  if(mathSubj){
    mathSubj.groups = MATH_CURRICULUM.map(function(tp){
      var items = [];
      var tpN = norm(tp.topic);
      function addTest(t){
        if(!t || !t.id || mathUsedId[t.id]) return;
        if(Number(t.grade||1)!==1) return;
        items.push(testChip(t, byTitle));
        mathUsedId[t.id] = true;
        mathTaken[norm(t.title)] = true;
      }
      // (а) явний список назв — сумісність зі старими темами
      (tp.tests||[]).forEach(function(name){ addTest(byTitle[norm(name)]); });
      // (б)+(в) поле topic або префікс назви — лише для математичних тестів
      (tests||[]).forEach(function(t){
        if(!t || !t.title) return;
        if(!subjectMatches(mathSubj, t.subject)) return;
        var byField  = t.topic && norm(t.topic)===tpN;
        var byPrefix = norm(t.title).indexOf(tpN)===0;
        if(byField || byPrefix) addTest(t);
      });
      return { title:(tp.chain?'🔗 ':'')+esc(tp.topic), items:items };
    });
  }

  // 2) решта тестів → по предметах (як було), окрім уже показаних у Математиці
  var leftovers = [];
  (tests||[]).forEach(function(t){
    if(!t || !t.id) return;
    if(mathTaken[norm(t.title)]) return;
    var placed = false;
    for(var i=0;i<index.length;i++){
      var e = index[i];
      if(e.subj===mathSubj) continue;         // Математику вже зібрали групами
      if(Number(t.grade)===Number(e.gradeNum) && subjectMatches(e.subj, t.subject)){
        e.subj.items.push(testChip(t, byTitle)); placed = true; break;
      }
    }
    if(!placed) leftovers.push(t);
  });

  // 3) катч-ол: усе несопоставлене → «Інші тести» в 1 класі (нічого не губимо)
  if(leftovers.length){
    var g1 = null;
    CURRICULUM.forEach(function(tier){ (tier.grades||[]).forEach(function(g){ if(g.gradeNum===1) g1 = g; }); });
    if(g1){
      g1.subjects.push({ id:'other', icon:'📦', name:'Інші тести', accent:'#8a8fb0',
        stat:'—', keys:[], items: leftovers.map(function(t){
          var c = testChip(t, byTitle);
          if(Number(t.grade) && Number(t.grade)!==1) c.label = '['+t.grade+' кл] ' + c.label;
          return c;
        }) });
    }
  }
}

/* ── підрахунок пройдених рівнів із збереженого стану ── */
function countDoneLevels(v){
  try{ var o=(typeof v==='string')?JSON.parse(v):v;
    if(Array.isArray(o)) return o.length;
    return (o && typeof o==='object') ? Object.keys(o).length : 0;
  }catch(e){ return 0; }
}
/* заповнити бейджі «X/N рівнів» зі стану на цьому пристрої (localStorage) */
function fillLevelProgress(){
  document.querySelectorAll('.chip-lvprog[data-lvkey]').forEach(function(el){
    var key   = el.getAttribute('data-lvkey');
    var total = parseInt(el.getAttribute('data-lvtotal')||'0',10)||0;
    var done  = 0;
    try{ var ls=localStorage.getItem(key); if(ls) done=countDoneLevels(ls); }catch(e){}
    if(total && done>total) done=total;
    el.innerHTML = '🧩 <b>'+done+'</b>/'+total+' рівнів';
    el.classList.toggle('done', !!(total && done>=total));
  });
}
/* відкрити/лишити закритими тести-замки. prog (Firebase) — необовʼязковий,
   беремо максимум із локальним станом пристрою (localStorage) */
function applyLocks(prog){
  function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  function pgGet(k){ return (prog && prog[k]!=null) ? prog[k] : null; }
  document.querySelectorAll('.chip-group').forEach(function(g){
    var a = g.querySelector('.chip.ready[data-lock-preid]');
    if(!a) return;
    var pre = { id: a.getAttribute('data-lock-preid'),
                levels: parseInt(a.getAttribute('data-lock-prelevels')||'0',10)||0 };
    // пройдено на 55% локально АБО за даними Firebase → відкрито
    var unlocked = isTestPassed(pre, lsGet) || isTestPassed(pre, pgGet);
    a.classList.toggle('locked', !unlocked);
    var lock = g.querySelector('.chip-lock');   if(lock) lock.style.display = unlocked ? 'none' : '';
    var lv   = g.querySelector('.chip-lvprog'); if(lv)   lv.style.display   = unlocked ? '' : 'none';
  });
}

/* ── 🏆 Досягнення: тести, пройдені на 100% рівнів, переносяться сюди
      (оригінал у рідній темі ховаємо, порожню тему теж) ── */
function achPlural(n){
  n=Math.abs(n)%100; var d=n%10;
  if(n>10 && n<20) return 'тестів';
  if(d===1) return 'тест';
  if(d>=2 && d<=4) return 'тести';
  return 'тестів';
}
function applyAchievements(){
  var sec=document.getElementById('skAch');
  var list=document.getElementById('skAchList');
  if(!sec || !list) return;
  list.innerHTML='';
  var count=0;

  /* 1) знайти тести, ВИКОНАНІ на 100% (прапорець sk_test100_<id>) — будь-якого типу,
        сховати оригінал у рідній темі, клон → Досягнення. Розблокування ланцюга — окремо, на 55%. */
  document.querySelectorAll('#root .chip-group').forEach(function(grp){
    var link=grp.querySelector('.chip.ready');
    if(!link) return;                                 // не тест-посилання — пропускаємо
    var href=link.getAttribute('href')||'';
    var id='';
    try{ id=new URL(href, location.href).searchParams.get('id')||''; }
    catch(e){ var m=/[?&]id=([^&]+)/.exec(href); id=m?decodeURIComponent(m[1]):''; }
    var full=false;
    if(id){ try{ full = localStorage.getItem('sk_test100_'+id)==='1'; }catch(e){} }
    if(!full){ grp.style.display=''; return; }         // ще не на 100%

    grp.style.display='none';                          // ховаємо у рідній темі
    count++;
    var accent=(link.style.getPropertyValue('--accent').trim()) || '#5C6BC0';
    var tn=link.childNodes[0];
    var name=(tn && tn.nodeValue!=null ? tn.nodeValue : link.textContent||'').replace(/^\s*▶\s*/,'').trim();
    var cg=document.createElement('span');
    cg.className='chip-group';
    cg.innerHTML='<a class="chip ready" href="'+href+'" style="--accent:'+accent+'">🏆 '+esc(name)+'</a>'
               +'<span class="chip-passed">✅ 100%</span>';
    list.appendChild(cg);
  });

  /* 2) сховати теми, що лишились без жодного видимого тесту */
  document.querySelectorAll('#root .chips').forEach(function(ch){
    var kids=ch.children, visible=0;
    for(var i=0;i<kids.length;i++){ if(kids[i].style.display!=='none') visible++; }
    var empty=(visible===0);
    ch.style.display=empty ? 'none' : '';
    var prev=ch.previousElementSibling;
    if(prev && prev.classList.contains('grp-title')) prev.style.display=empty ? 'none' : '';
  });

  /* 3) сам блок Досягнень показуємо лише коли є що показати */
  sec.classList.toggle('show', count>0);
  var cnt=document.getElementById('skAchCount');
  if(cnt) cnt.textContent=count+' '+achPlural(count);
}

/* ── рендер дорожньої карти ── */
function render(){
  document.getElementById('root').innerHTML =
    CURRICULUM.map(function(t){ return tierHtml(t, t.id==='junior'); }).join('');
  fillLevelProgress();
  applyLocks();
  applyAchievements();
}

/* первинний стан — щоб не блимала порожня сторінка */
document.getElementById('root').innerHTML =
  '<p style="text-align:center;color:#c6d3ea;font-weight:600;padding:26px 10px">Завантаження тестів…</p>';

/* дочекатись SK → підтягнути активні тести з бази → розкласти → відрендерити */
(function loadFromDB(){
  var tries = 0;
  (function tick(){
    if(window.SK && SK.ready){
      SK.ready.then(function(){
        SK.listActiveTests().then(function(list){
          distribute(list || []);
          render();
        }).catch(function(){
          // напр. гість без доступу до бази — показуємо кістяк (порожні предмети)
          distribute([]);
          render();
        });
      });
      return;
    }
    if(tries++ < 100) setTimeout(tick, 50);
    else { distribute([]); render(); }  // SK так і не з'явився — показуємо кістяк
  })();
})();</script>

<!-- смужка характеристик активного Героя (читання з Firebase) -->
<script type="module" src="firebase-config.js"></script>
<!-- прогрес дорожньої карти (бейджі рівнів, замки, XP тем). Шкалу Героя
     тепер малює спільний хедер sk-header.js, тож тут її немає. -->
<script>
(function(){
  var tries = 0;
  (function whenSK(){
    if(window.SK && SK.ready){
      SK.ready.then(function(){
        try{
          if(SK.isHeroSession && SK.isHeroSession()){
            SK.getHero().then(function(h){
              if(!h) return;
              var prog = h.progress || {};
              function countSet(v){
                try{ var o=JSON.parse(v);
                  if(Array.isArray(o)) return o.length;
                  return (o && typeof o==='object') ? Object.keys(o).length : 0;
                }catch(e){ return 0; }
              }

              /* Прогрес із Firebase застосовуємо ЛИШЕ коли плитки вже намальовані.
                 Інакше цей блок (getHero — один документ) випереджає render()
                 (listActiveTests — вся колекція), застосовується до порожнього
                 DOM і мовчки нічого не робить → усе лишається замкненим. */
              (function applyProg(tries){
                tries = tries || 0;
                if(!document.querySelector('.chip.ready') && tries < 120){
                  return setTimeout(function(){ applyProg(tries + 1); }, 50);
                }

              /* ── бейджі «X/N рівнів»: максимум із локальним станом ── */
              document.querySelectorAll('.chip-lvprog[data-lvkey]').forEach(function(el){
                var key   = el.getAttribute('data-lvkey');
                var total = parseInt(el.getAttribute('data-lvtotal')||'0',10)||0;
                var b     = el.querySelector('b');
                var cur   = b ? (parseInt(b.textContent,10)||0) : 0;
                var fromProg = (prog[key]!=null) ? countSet(prog[key]) : 0;
                var done = Math.max(cur, fromProg);
                if(total && done>total) done=total;
                el.innerHTML = '🧩 <b>'+done+'</b>/'+total+' рівнів';
                el.classList.toggle('done', !!(total && done>=total));
              });

              /* ── замки: перерахувати з урахуванням прогресу з Firebase ── */
              if(typeof applyLocks==='function') applyLocks(prog);

              /* ── ХР біля кожної теми (з progress відповідного тесту) ── */
              document.querySelectorAll('.chip-xp[data-xpkey]').forEach(function(el){
                var key = el.getAttribute('data-xpkey');
                var v = 0;
                if(prog[key]!=null){ var n=parseFloat(prog[key]); if(!isNaN(n)) v=n; }
                el.textContent = v + ' XP';
              });

              /* ── перенести завершені тести в 🏆 Досягнення (після оновлення бейджів) ── */
              if(typeof applyAchievements==='function') applyAchievements();
              })();   /* /applyProg */
            }).catch(function(){});
          }
        }catch(e){}
      });
      return;
    }
    if(tries++ < 100) setTimeout(whenSK, 50);
  })();
})();
</script>

  function loadP(){ try{ return JSON.parse(localStorage.getItem(PKEY)||'{}')||{}; }catch(e){ return {}; } }

    else if(choice==='3'){ var v=prompt("Про героя:",p.about||''); if(v&&v.trim()){p.about=v.trim().slice(0,160);saveP(p);} }

  });
  var outBtn=document.getElementById('heroLogoutBtn');
  if(outBtn) outBtn.addEventListener('click',async function(){

})();
