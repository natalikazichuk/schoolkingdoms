<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🗺️ Обласні центри України — SchoolKingdom</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#1a1040 0%,#2d1b6b 50%,#0d2647 100%);min-height:100vh;color:#fff;
       -webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;touch-action:manipulation}

  /* BACK BUTTON */
  .back-bar{padding:12px 16px;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.08)}
  .back-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(108,99,255,0.2);border:1px solid rgba(108,99,255,0.4);border-radius:10px;padding:7px 14px;color:#c3b8ff;font-size:0.85rem;font-weight:700;text-decoration:none;transition:background .15s}
  .back-btn:hover{background:rgba(108,99,255,0.35)}
  .back-bar-title{color:#9B8FCC;font-size:0.85rem}

  /* HOME */
  #home{display:flex;flex-direction:column;align-items:center;padding:32px 16px}
  .xp-badge{background:linear-gradient(135deg,rgba(255,179,0,.2),rgba(255,138,0,.13));border:2px solid #FFB300;border-radius:30px;padding:8px 20px;margin-bottom:24px;display:flex;align-items:center;gap:8px}
  .xp-badge span{color:#FFD54F;font-weight:800;font-size:18px}
  .levels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;width:100%;max-width:720px}
  .lv-card{border-radius:16px;padding:14px 12px;cursor:pointer;position:relative;overflow:hidden;transition:all .2s ease;border:2px solid #5040A0;background:#26185A}
  .lv-card.locked{opacity:.45;cursor:not-allowed;background:#1e1450;border-color:#2d245a}
  .lv-card.done{border-color:#FFD700}
  .lv-card:not(.locked):hover{transform:translateY(-3px) scale(1.03)}

  /* QUIZ */
  #quiz{display:none;flex-direction:column;align-items:center;padding:16px}
  .quiz-topbar{width:100%;max-width:520px;margin-bottom:16px}
  .progress-track{background:#E8E8F0;border-radius:12px;height:14px;overflow:hidden;width:100%}
  .progress-fill{height:100%;border-radius:12px;transition:width .4s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,#4ECDC4,#6C63FF)}
  .quiz-card{border-radius:24px;padding:28px 24px;max-width:520px;width:100%;border:2px solid #5040A0;background:#1e1450;transition:background .3s,border .3s}
  .quiz-card.correct{background:#1b3a1b;border-color:#4CAF50}
  .quiz-card.wrong{background:#3a1b1b;border-color:#F44336}
  .q-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:20px}
  .speak-btn{flex:0 0 auto;background:#2d2060;border:2px solid #5040A0;border-radius:12px;width:44px;height:44px;font-size:20px;cursor:pointer;color:#fff;line-height:1}
  .speak-btn:active{background:#4ECDC4}
  .choices{display:flex;flex-direction:column;gap:10px}
  .choice-btn{width:100%;background:#2d2060;color:#fff;border:2px solid #5040A0;border-radius:14px;padding:15px 14px;font-size:17px;font-weight:700;cursor:pointer;transition:all .15s;
              -webkit-user-select:none;user-select:none;touch-action:manipulation}
  .choice-btn:not(:disabled):hover{border-color:#4ECDC4;transform:translateY(-2px)}
  .choice-btn:disabled{cursor:not-allowed}
  .choice-btn.sel-ok{background:#2e7d32;border-color:#4CAF50}
  .choice-btn.sel-bad{background:#c62828;border-color:#F44336}
  .choice-btn.reveal{border-color:#4CAF50;color:#9EFF9E}
  .feedback{margin-top:16px;text-align:center;font-size:19px;font-weight:700;animation:fadeIn .2s ease}

  /* RESULT */
  #result{display:none;align-items:center;justify-content:center;min-height:80vh;padding:16px}
  .result-card{background:#1e1450;border-radius:24px;padding:32px;max-width:400px;width:100%;text-align:center}
  .xp-box{background:linear-gradient(135deg,rgba(255,179,0,.2),rgba(255,138,0,.13));border:2px solid #FFB300;border-radius:14px;padding:12px 14px;margin:18px 0;text-align:center}
  .btn-main{background:linear-gradient(135deg,#6C63FF,#A06CFF);color:#fff;border:none;border-radius:14px;padding:14px 32px;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px}
  .btn-ghost{background:none;color:#9B8FCC;border:none;font-size:14px;cursor:pointer;text-decoration:underline}

  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<!-- BACK BAR -->
<div class="back-bar">
  <a class="back-btn" href="hero.html">← До кабінету</a>
  <span class="back-bar-title">Академія Героїв · Світ України</span>
</div>

<!-- HOME -->
<div id="home">
  <div style="text-align:center;margin-bottom:20px">
    <div style="font-size:56px;margin-bottom:8px">🗺️</div>
    <h1 style="font-size:clamp(24px,5vw,36px);font-weight:800;letter-spacing:-1px">Обласні центри України</h1>
    <p style="color:#9B8FCC;margin-top:8px;font-size:15px">Вивчи всі 24 обласні центри — від Заходу до Сходу!</p>
  </div>
  <div class="xp-badge">
    <span style="font-size:20px">⚡</span>
    <span id="home-xp">0 XP</span>
  </div>
  <div class="levels-grid" id="levels-grid"></div>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="quiz-topbar">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="color:#9B8FCC;font-size:13px" id="q-meta-lv"></span>
      <span style="color:#4ECDC4;font-weight:700;font-size:14px" id="q-meta-prog"></span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="q-progress" style="width:0%"></div></div>
  </div>
  <div class="quiz-card" id="quiz-card">
    <div class="q-head">
      <button class="speak-btn" id="q-speak" title="Прослухати">🔊</button>
      <p style="color:#E0D8FF;font-size:clamp(16px,3.4vw,20px);font-weight:700;margin:0;line-height:1.45;align-self:center" id="q-text"></p>
    </div>
    <div id="q-choices" class="choices"></div>
    <div id="q-feedback" class="feedback" style="display:none"></div>
  </div>
  <div style="margin-top:16px;display:flex;align-items:center;gap:6px;color:#FFD54F;font-size:14px;font-weight:700">
    <span>⚡</span><span id="q-xp-ticker">0 XP за рівень</span>
  </div>
</div>

<!-- RESULT -->
<div id="result">
  <div class="result-card" id="result-card">
    <div id="res-emoji" style="font-size:64px;margin-bottom:8px"></div>
    <h2 id="res-h2" style="font-size:26px;line-height:1.2;margin:0 0 6px"></h2>
    <div id="res-msg" style="font-size:18px;font-weight:800;margin-bottom:16px;line-height:1.3;color:#FFD700"></div>
    <div id="res-stars" style="display:none;font-size:32px;letter-spacing:4px;margin-bottom:4px">⭐⭐⭐</div>
    <div class="xp-box">
      <div style="color:#FFD54F;font-weight:800;font-size:22px">⚡ <span id="res-xp-earned"></span></div>
      <div style="color:#9B8FCC;font-size:13px" id="res-xp-total"></div>
    </div>
    <p id="res-fail-note" style="display:none;color:#9B8FCC;font-size:14px;margin-bottom:14px;line-height:1.4">
      XP за цей рівень обнулилися. Пройди весь рівень без помилок!
    </p>
    <button class="btn-main" id="res-btn-main"></button>
    <button class="btn-ghost" id="res-btn-menu" style="display:none">До меню рівнів</button>
    <br>
    <a href="hero.html" style="display:inline-block;margin-top:10px;color:#9B8FCC;font-size:13px;text-decoration:underline">← До кабінету</a>
  </div>
</div>

<script>
/* ── 24 ОБЛАСНІ ЦЕНТРИ УКРАЇНИ ──
   a = форма "...ої області", n = "... область", c = місто-центр */
const R=[
  {a:"Вінницької",        n:"Вінницька",        c:"Вінниця"},
  {a:"Волинської",        n:"Волинська",        c:"Луцьк"},
  {a:"Дніпропетровської", n:"Дніпропетровська", c:"Дніпро"},
  {a:"Донецької",         n:"Донецька",         c:"Донецьк"},
  {a:"Житомирської",      n:"Житомирська",      c:"Житомир"},
  {a:"Закарпатської",     n:"Закарпатська",     c:"Ужгород"},
  {a:"Запорізької",       n:"Запорізька",       c:"Запоріжжя"},
  {a:"Івано-Франківської",n:"Івано-Франківська",c:"Івано-Франківськ"},
  {a:"Київської",         n:"Київська",         c:"Київ"},
  {a:"Кіровоградської",   n:"Кіровоградська",   c:"Кропивницький"},
  {a:"Луганської",        n:"Луганська",        c:"Луганськ"},
  {a:"Львівської",        n:"Львівська",        c:"Львів"},
  {a:"Миколаївської",     n:"Миколаївська",     c:"Миколаїв"},
  {a:"Одеської",          n:"Одеська",          c:"Одеса"},
  {a:"Полтавської",       n:"Полтавська",       c:"Полтава"},
  {a:"Рівненської",       n:"Рівненська",       c:"Рівне"},
  {a:"Сумської",          n:"Сумська",          c:"Суми"},
  {a:"Тернопільської",    n:"Тернопільська",    c:"Тернопіль"},
  {a:"Харківської",       n:"Харківська",       c:"Харків"},
  {a:"Херсонської",       n:"Херсонська",       c:"Херсон"},
  {a:"Хмельницької",      n:"Хмельницька",      c:"Хмельницький"},
  {a:"Черкаської",        n:"Черкаська",        c:"Черкаси"},
  {a:"Чернівецької",      n:"Чернівецька",      c:"Чернівці"},
  {a:"Чернігівської",     n:"Чернігівська",     c:"Чернігів"}
];
const ALL=R.map((_,i)=>i);

/* Географічні групи (індекси в R) */
const WEST  =[11,1,5,7,17,15];                 // Львів, Луцьк, Ужгород, Ів-Франківськ, Тернопіль, Рівне
const CENTER=[8,0,4,21,20,9];                  // Київ, Вінниця, Житомир, Черкаси, Хмельницький, Кропивницький
const EAST  =[18,2,6,3,10];                    // Харків, Дніпро, Запоріжжя, Донецьк, Луганськ
const SOUTH =[13,12,19];                       // Одеса, Миколаїв, Херсон
const NORTH =[16,14,23,22];                    // Суми, Полтава, Чернігів, Чернівці

const LEVELS=[
  {level:1, medal:"🥉", tasks:8,  mode:"city",  pool:WEST,   title:"Захід України",      cheer:"Західну Україну вивчено!"},
  {level:2, medal:"🥉", tasks:8,  mode:"city",  pool:CENTER, title:"Центр України",      cheer:"Центр країни — твій!"},
  {level:3, medal:"🥉", tasks:8,  mode:"city",  pool:EAST,   title:"Схід України",       cheer:"Схід підкорено!"},
  {level:4, medal:"🥈", tasks:10, mode:"city",  pool:SOUTH.concat(NORTH), title:"Південь і Північ", cheer:"Південь і Північ знаєш!"},
  {level:5, medal:"🥈", tasks:12, mode:"city",  pool:ALL,    title:"Назви центр області", cheer:"Усі центри назвав!"},
  {level:6, medal:"🥈", tasks:12, mode:"obl",   pool:ALL,    title:"Яка це область?",    cheer:"Області відгадано!"},
  {level:7, medal:"🥇", tasks:14, mode:"mix",   pool:WEST.concat(CENTER), title:"Захід + Центр (мікс)", cheer:"Золото! Мікс підкорено!"},
  {level:8, medal:"🥇", tasks:16, mode:"mix",   pool:ALL,    title:"Уся Україна (мікс)",  cheer:"Уся країна в голові!"},
  {level:9, medal:"⭐", tasks:18, mode:"mix",   pool:ALL,    title:"Експерт України",     cheer:"Ти справжній експерт!"},
  {level:10,medal:"👑", tasks:24, mode:"mix",   pool:ALL,    title:"Бос: усі 24 центри",  cheer:"БОС ПЕРЕМОЖЕНИЙ! Ти знавець України!"}
];

const PASTEL=["#FFD6D6","#FFE8C8","#FFF6C0","#D6F5D6","#D6ECF5","#E6D6F5","#F5D6EC","#D6F5EF"];

let unlocked=0,totalXp=0,activeLevel=null,questions=[],idx=0,earnedXp=0,feedback=null;
try{unlocked=parseInt(localStorage.getItem("sk_geo_cities_unlocked_v1")||"0")||0;}catch{}
try{totalXp=parseInt(localStorage.getItem("sk_geo_cities_pts_v1")||"0")||0;}catch{}

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[rnd(0,arr.length-1)];}
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=rnd(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}
function save(){try{localStorage.setItem("sk_geo_cities_unlocked_v1",String(unlocked));localStorage.setItem("sk_geo_cities_pts_v1",String(totalXp));}catch{}}

function speak(t){try{if(!('speechSynthesis'in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='uk-UA';u.rate=0.95;speechSynthesis.speak(u);}catch{}}

function showScreen(id){
  document.getElementById("home").style.display   = id==="home"   ? "flex" : "none";
  document.getElementById("quiz").style.display   = id==="quiz"   ? "flex" : "none";
  document.getElementById("result").style.display = id==="result" ? "flex" : "none";
  if(id==="quiz") document.getElementById("quiz").style.flexDirection="column";
}

/* ── Генерація питання ── */
function makeQuestion(lv){
  const ri=pick(lv.pool);
  const r=R[ri];
  let mode=lv.mode;
  if(mode==="mix") mode = Math.random()<.5 ? "city" : "obl";

  if(mode==="city"){
    // дано область → обери місто-центр
    const wrong=shuffle(ALL.filter(i=>i!==ri)).slice(0,3).map(i=>R[i].c);
    const choices=shuffle([r.c,...wrong]);
    return {text:`Яке місто є центром ${r.a} області?`, answer:r.c, choices, speak:`Яке місто є центром ${r.n} області?`};
  } else {
    // дано місто → обери область
    const wrong=shuffle(ALL.filter(i=>i!==ri)).slice(0,3).map(i=>R[i].n+" область");
    const correct=r.n+" область";
    const choices=shuffle([correct,...wrong]);
    return {text:`Центром якої області є місто ${r.c}?`, answer:correct, choices, speak:`Центром якої області є місто ${r.c}?`};
  }
}

function buildQuestions(lv){
  const list=[];
  for(let i=0;i<lv.tasks;i++){
    let q=makeQuestion(lv);
    const recent=list.slice(-3).map(x=>x.answer);
    let t=0;
    while(t<14 && recent.includes(q.answer)){q=makeQuestion(lv);t++;}
    list.push(q);
  }
  return list;
}

/* ── HOME ── */
function renderHome(){
  showScreen("home");
  document.getElementById("home-xp").textContent=totalXp+" XP";
  const grid=document.getElementById("levels-grid");
  grid.innerHTML="";
  LEVELS.forEach((lv,i)=>{
    const locked=lv.level>unlocked+1, done=lv.level<=unlocked;
    const card=document.createElement("div");
    card.className="lv-card"+(locked?" locked":"")+(done?" done":"");
    card.innerHTML=`<div style="font-size:22px;margin-bottom:4px">${lv.medal}</div>
      <div style="font-weight:700;font-size:13px;color:${locked?"#5a4fa0":"#fff"};margin-bottom:2px">Рівень ${lv.level}</div>
      <div style="color:#9B8FCC;font-size:11px;line-height:1.3">${lv.title}</div>
      <div style="color:#6C60B0;font-size:10px;margin-top:4px">${lv.tasks} запитань</div>
      ${done?'<div style="position:absolute;top:6px;right:8px;font-size:13px">✓</div>':""}
      ${locked?'<div style="position:absolute;top:8px;right:8px;font-size:16px">🔒</div>':""}`;
    if(!locked){
      card.addEventListener("mouseenter",()=>card.style.background=PASTEL[i%PASTEL.length]);
      card.addEventListener("mouseleave",()=>card.style.background="");
      card.addEventListener("click",()=>startLevel(lv.level));
    }
    grid.appendChild(card);
  });
}

/* ── QUIZ ── */
function startLevel(level){
  activeLevel=level;
  const lv=LEVELS[level-1];
  questions=buildQuestions(lv);
  idx=0;earnedXp=0;feedback=null;
  showScreen("quiz");
  renderQuestion();
}

function renderQuestion(){
  const lv=LEVELS[activeLevel-1], TOTAL=lv.tasks, q=questions[idx];
  const pct=Math.min(100,Math.round((idx/TOTAL)*100));

  document.getElementById("q-meta-lv").textContent=`${lv.medal} Рівень ${activeLevel}: ${lv.title}`;
  document.getElementById("q-meta-prog").textContent=`${idx+1}/${TOTAL}`;
  document.getElementById("q-progress").style.width=pct+"%";
  document.getElementById("q-xp-ticker").textContent=earnedXp+" XP за рівень";
  document.getElementById("quiz-card").className="quiz-card";
  document.getElementById("q-text").textContent=q.text;
  document.getElementById("q-feedback").style.display="none";
  document.getElementById("q-speak").onclick=()=>speak(q.speak||q.text);

  const choicesEl=document.getElementById("q-choices");
  choicesEl.innerHTML="";
  q.choices.forEach(c=>{
    const btn=document.createElement("button");
    btn.className="choice-btn";btn.textContent=c;
    btn.addEventListener("click",()=>submitAnswer(c,btn));
    choicesEl.appendChild(btn);
  });
}

function submitAnswer(ans,btnEl){
  if(feedback)return;
  const lv=LEVELS[activeLevel-1], TOTAL=lv.tasks, q=questions[idx];
  const correct=ans===q.answer;
  feedback=correct?"correct":"wrong";
  document.getElementById("quiz-card").className="quiz-card "+(correct?"correct":"wrong");

  document.querySelectorAll(".choice-btn").forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.answer && !correct) b.classList.add("reveal");
  });
  btnEl.classList.add(correct?"sel-ok":"sel-bad");

  const fb=document.getElementById("q-feedback");
  fb.style.display="block";fb.style.color=correct?"#6EE86E":"#FF7070";
  fb.textContent=correct?"✅ Правильно!":"❌ Правильно: "+q.answer;

  if(correct){
    earnedXp+=(activeLevel===10?2:1);
    document.getElementById("q-xp-ticker").textContent=earnedXp+" XP за рівень";
    setTimeout(()=>{feedback=null;if(idx+1>=TOTAL)showResult(true);else{idx++;renderQuestion();}},850);
  } else {
    earnedXp=0; // відкат XP — рівень спочатку
    setTimeout(()=>{feedback=null;questions=buildQuestions(lv);idx=0;renderQuestion();},1500);
  }
}

/* ── RESULT ── */
function showResult(win){
  const lv=LEVELS[activeLevel-1];
  showScreen("result");
  document.getElementById("result-card").style.border=`2px solid ${win?"#FFD700":"#5040A0"}`;
  document.getElementById("res-emoji").textContent=win?"🎉":"💪";
  document.getElementById("res-h2").textContent=win?"Вітаю!":"Ой, помилка!";
  const msg=document.getElementById("res-msg");
  msg.textContent=win?`${lv.medal} ${lv.cheer}`:"Рівень починаємо спочатку";
  msg.style.color=win?"#FFD700":"#FFB74D";
  document.getElementById("res-stars").style.display=win?"block":"none";
  document.getElementById("res-xp-earned").textContent=`+${earnedXp} XP`;
  document.getElementById("res-fail-note").style.display=win?"none":"block";

  if(win){totalXp+=earnedXp;if(activeLevel>=unlocked+1)unlocked=activeLevel;save();}
  document.getElementById("res-xp-total").textContent=`Всього: ${totalXp} XP`;

  const btnMain=document.getElementById("res-btn-main");
  const btnMenu=document.getElementById("res-btn-menu");
  if(win){
    btnMain.textContent=activeLevel<LEVELS.length?`Рівень ${activeLevel+1} →`:"До меню 👑";
    btnMain.onclick=()=>{if(activeLevel<LEVELS.length)startLevel(activeLevel+1);else renderHome();};
    btnMenu.style.display="inline-block";
    btnMenu.onclick=()=>renderHome();
  } else {
    btnMain.textContent="↻ Почати рівень спочатку";
    btnMain.onclick=()=>startLevel(activeLevel);
    btnMenu.style.display="none";
  }
}

renderHome();
</script>
</body>
</html>
