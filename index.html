<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Kingdoms — Моє королівство знань</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#13315f; --navy-d:#0c2247; --navy-l:#1e4d8b;
    --green:#2c7a4b; --green-d:#1d5836;
    --gold:#F2C75C; --gold-d:#C9942F; --gold-deep:#8a5e16;
    --cream:#FBEFD0; --ink:#16315c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Nunito',sans-serif;color:#fff;overflow-x:hidden;min-height:100vh;position:relative;}

  /* ── ФОН: зоряне небо (тимчасово, поки немає ілюстрації) ── */
  .bg-fallback{position:fixed;inset:0;z-index:-3;
    background:radial-gradient(120% 90% at 50% 0%, #2d1b6b 0%, #1a1040 45%, #0d2647 100%);}
  .stars{position:fixed;inset:0;z-index:-2;overflow:hidden}
  .stars::before,.stars::after{content:"";position:absolute;inset:-50%;
    background-image:
      radial-gradient(1.6px 1.6px at 40px 60px,#fff,transparent),
      radial-gradient(1.4px 1.4px at 130px 170px,#fff,transparent),
      radial-gradient(1px 1px at 210px 90px,#cfe3ff,transparent),
      radial-gradient(1.3px 1.3px at 300px 230px,#fff,transparent),
      radial-gradient(1px 1px at 360px 40px,#ffe9b8,transparent),
      radial-gradient(1.5px 1.5px at 80px 300px,#fff,transparent),
      radial-gradient(1px 1px at 250px 340px,#bfe0ef,transparent);
    background-repeat:repeat;background-size:400px 400px;
    animation:twinkle 4.5s ease-in-out infinite}
  .stars::after{background-size:300px 300px;background-position:90px 130px;
    animation-duration:6.5s;animation-delay:1.6s;opacity:.7}
  @keyframes twinkle{0%,100%{opacity:.35}50%{opacity:.95}}
  /* м'яке сяйво місяця */
  .moon{position:fixed;top:8%;right:9%;width:120px;height:120px;z-index:-2;border-radius:50%;
    background:radial-gradient(circle at 38% 38%, #fff7e0 0%, #ffe9b8 38%, rgba(255,233,184,.0) 70%);
    filter:blur(2px);opacity:.85;pointer-events:none}
  @media(prefers-reduced-motion:reduce){.stars::before,.stars::after{animation:none}}

  .bg-img{position:fixed;inset:0;z-index:-1;
    background:url('landing-bg.webp') center top/cover no-repeat;}

  /* ── ШАПКА ── */
  .topbar{position:relative;display:flex;align-items:center;justify-content:space-between;
    padding:14px clamp(16px,4vw,48px);}
  .brand{display:flex;align-items:center;gap:14px;text-decoration:none;cursor:pointer}
  .logo-img{width:clamp(44px,6vw,60px);height:auto;display:block;filter:drop-shadow(0 3px 6px rgba(0,0,0,.4))}
  .hero-logo-link{display:inline-block;text-decoration:none;max-width:100%;transition:transform .18s}
  .hero-logo-link:hover{transform:translateY(-3px)}
  .hero-logo{max-width:min(640px,88vw);width:100%;height:auto;display:block;margin:0 auto;
    filter:drop-shadow(0 8px 24px rgba(0,0,0,.5))}
  .hero-logo-link.ph::after{content:'Великий логотип — додай logo-big.png';
    display:block;padding:clamp(40px,9vh,80px) 30px;border:2px dashed rgba(242,199,92,.75);
    border-radius:20px;color:#FBEFD0;font-family:'Playfair Display',serif;
    font-size:clamp(1.05rem,3vw,1.6rem);background:rgba(13,28,54,.45)}
  .brand .logo{width:clamp(44px,6vw,60px);height:clamp(44px,6vw,60px);flex-shrink:0;
    filter:drop-shadow(0 3px 6px rgba(0,0,0,.35))}
  .brand-text{line-height:1}
  .brand-name{font-family:'Playfair Display',serif;font-weight:900;
    font-size:clamp(1.4rem,3.2vw,2rem);color:#fff;text-shadow:0 2px 5px rgba(0,0,0,.45);letter-spacing:.5px}
  .brand-name b{color:var(--gold)}
  .brand-sub{font-size:clamp(.72rem,1.6vw,.9rem);color:#ffe9b8;font-weight:600;margin-top:2px;
    text-shadow:0 1px 3px rgba(0,0,0,.5)}
  .btn-login{display:inline-flex;align-items:center;gap:8px;
    background:linear-gradient(180deg,#27518c,#16356a);color:#fff;text-decoration:none;
    border:2px solid var(--gold);border-radius:14px;padding:10px 22px;font-weight:800;
    font-size:clamp(.9rem,2vw,1.05rem);box-shadow:0 6px 16px rgba(0,0,0,.3);transition:transform .15s,box-shadow .15s}
  .btn-login:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(0,0,0,.4)}
  .btn-login svg{width:18px;height:18px}

  /* ── ГЕРОЙ ── */
  .hero{position:relative;max-width:980px;margin:0 auto;padding:clamp(20px,5vh,60px) 20px 40px;text-align:center}
  .hero-title{font-family:'Playfair Display',serif;font-weight:900;color:#FBEFD0;
    font-size:clamp(2.2rem,6.6vw,4.6rem);line-height:1.05;letter-spacing:.5px;
    text-shadow:0 2px 12px rgba(0,0,0,.55), 0 0 30px rgba(124,99,255,.45)}
  .crown-div{display:flex;align-items:center;justify-content:center;gap:14px;margin:22px auto 18px;max-width:360px}
  .crown-div .line{height:2px;flex:1;background:linear-gradient(90deg,transparent,var(--gold))}
  .crown-div .line:last-child{background:linear-gradient(90deg,var(--gold),transparent)}
  .crown-div svg{width:30px;height:30px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
  .hero-sub{color:#dce6f7;font-weight:600;font-size:clamp(1rem,2.4vw,1.3rem);line-height:1.55;
    max-width:600px;margin:0 auto;text-shadow:0 1px 8px rgba(0,0,0,.5)}
  .hero-tag{color:#FFD166;font-weight:800;font-size:clamp(1.05rem,2.6vw,1.4rem);margin-top:14px;
    text-shadow:0 1px 10px rgba(0,0,0,.5)}

  /* ── КАРТКИ ── */
  .cards{display:flex;align-items:stretch;justify-content:center;gap:0;
    margin:clamp(28px,5vh,48px) auto 0;max-width:820px;position:relative}
  .card{flex:1;text-decoration:none;color:#fff;text-align:center;position:relative;
    border:2px solid rgba(242,199,92,.85);border-radius:22px;padding:30px 26px 26px;
    backdrop-filter:blur(10px) saturate(1.15);-webkit-backdrop-filter:blur(10px) saturate(1.15);
    box-shadow:0 14px 34px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.16);
    transition:transform .18s,box-shadow .18s,border-color .18s;
    display:flex;flex-direction:column;align-items:center;gap:8px}
  .card:first-child{border-top-right-radius:14px;border-bottom-right-radius:14px}
  .card:last-child{border-top-left-radius:14px;border-bottom-left-radius:14px}
  .card.blue{background:linear-gradient(165deg,rgba(39,81,140,.58),rgba(16,40,82,.62))}
  .card.green{background:linear-gradient(165deg,rgba(47,132,81,.56),rgba(20,62,40,.62))}
  .card:hover{transform:translateY(-6px);border-color:#FFE7A0;
    box-shadow:0 22px 46px rgba(0,0,0,.5), 0 0 0 1px rgba(242,199,92,.5), inset 0 1px 0 rgba(255,255,255,.22)}
  .card .ic{width:clamp(52px,8vw,68px);height:clamp(52px,8vw,68px);
    filter:drop-shadow(0 3px 5px rgba(0,0,0,.4));margin-bottom:4px}
  .card .ctitle{font-family:'Playfair Display',serif;font-weight:800;font-size:clamp(1.3rem,3vw,1.8rem)}
  .card .cdesc{font-size:clamp(.85rem,1.9vw,.98rem);color:#e8eefb;font-weight:600;line-height:1.45;max-width:240px}
  .card.green .cdesc{color:#e6f4ea}
  .or{align-self:center;flex:0 0 auto;z-index:3;margin:0 -16px;
    width:58px;height:58px;border-radius:50%;background:var(--cream);
    border:3px solid var(--gold-d);box-shadow:0 6px 14px rgba(0,0,0,.3);
    display:flex;align-items:center;justify-content:center;
    font-family:'Playfair Display',serif;font-weight:800;color:#6b4e1a;font-size:1.05rem}

  /* ── БАНЕР ВІДЕО ── */
  .video{display:flex;align-items:center;gap:18px;text-decoration:none;
    margin:clamp(26px,4vh,40px) auto 30px;max-width:680px;
    background:linear-gradient(180deg,rgba(16,33,62,.92),rgba(10,22,46,.92));
    border:2px solid var(--gold);border-radius:20px;padding:16px 24px;
    box-shadow:0 12px 30px rgba(0,0,0,.4);transition:transform .15s}
  .video:hover{transform:translateY(-2px)}
  .video .play{width:56px;height:56px;flex:0 0 auto;border:3px solid var(--gold);border-radius:50%;
    display:flex;align-items:center;justify-content:center;background:rgba(242,199,92,.12)}
  .video .play svg{width:22px;height:22px;margin-left:3px}
  .video .vtext{text-align:left}
  .video .vtitle{font-family:'Playfair Display',serif;font-weight:800;font-size:clamp(1.1rem,2.6vw,1.5rem);color:#fff}
  .video .vsub{font-size:clamp(.82rem,1.8vw,.95rem);color:#d7e2f5;font-weight:600;margin-top:3px}

  @media(max-width:680px){
    .cards{flex-direction:column;gap:0;max-width:380px}
    .card{border-radius:20px !important}
    .or{margin:-16px auto}
    .video{flex-direction:row}
  }

  /* ── БІЧНА ВКЛАДКА: перехід на сторінку героя ── */
  .side-tab{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:30;
    text-decoration:none;color:#fff;
    background:linear-gradient(180deg,#27518c,#16356a);
    border:2px solid var(--gold);border-right:none;border-radius:16px 0 0 16px;
    padding:16px 9px;box-shadow:-4px 6px 18px rgba(0,0,0,.42);
    display:flex;flex-direction:column;align-items:center;gap:8px;
    font-weight:800;font-size:.92rem;letter-spacing:.02em;
    transition:transform .15s,box-shadow .15s}
  .side-tab:hover{transform:translateY(-50%) translateX(-3px);
    box-shadow:-9px 8px 24px rgba(0,0,0,.55);border-color:#FFE7A0}
  .side-tab .st-ic{font-size:1.5rem;filter:drop-shadow(0 2px 3px rgba(0,0,0,.4))}
  .side-tab .st-label{writing-mode:vertical-rl;text-orientation:mixed}
  @media(max-width:680px){
    .side-tab{padding:12px 7px;font-size:.82rem}
    .side-tab .st-ic{font-size:1.25rem}
  }
</style>
</head>
<body>
  <div class="bg-fallback"></div>
  <div class="stars"></div>
  <div class="moon"></div>
  <div class="bg-img"></div>

  <!-- ── БІЧНА ВКЛАДКА: перехід на сторінку героя ── -->
  <a class="side-tab" href="hero.html" aria-label="Сторінка героя">
    <span class="st-ic" aria-hidden="true">🛡️</span>
    <span class="st-label">Сторінка героя</span>
  </a>

  <svg width="0" height="0" style="position:absolute"><defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE7A0"/><stop offset="1" stop-color="#D49B33"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9c6a37"/><stop offset="1" stop-color="#6e451f"/>
    </linearGradient>
  </defs></svg>

  <!-- ── ШАПКА ── -->
  <header class="topbar">
    <!-- МАЛИЙ ЛОГОТИП: заміни src="logo-small.png" та href за потреби -->
    <a class="brand" href="index.html">
      <img class="logo-img" src="logo-small.png" alt="School Kingdoms"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <svg class="logo" style="display:none" viewBox="0 0 64 64" aria-hidden="true">
        <path d="M32 3 L57 12 L57 31 C57 47 46 57 32 61 C18 57 7 47 7 31 L7 12 Z"
              fill="url(#gold)" stroke="#7a5512" stroke-width="2.5"/>
        <path d="M18 25 Q32 21 32 25 L32 41 Q32 37 18 41 Z" fill="#13315f"/>
        <path d="M46 25 Q32 21 32 25 L32 41 Q32 37 46 41 Z" fill="#1e4d8b"/>
        <line x1="32" y1="25" x2="32" y2="41" stroke="#FFE7A0" stroke-width="1.6"/>
      </svg>
      <div class="brand-text">
        <div class="brand-name">School <b>Kingdoms</b></div>
        <div class="brand-sub">Моє королівство знань</div>
      </div>
    </a>
    <a class="btn-login" href="auth.html">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 5v14M5 12h14" stroke="#FFE7A0" stroke-width="2.4" stroke-linecap="round" fill="none"/>
      </svg>
      Реєстрація
    </a>
  </header>

  <!-- ── ГЕРОЙ ── -->
  <main class="hero">
    <!-- ВЕЛИКИЙ ЛОГОТИП: заміни src="logo-big.png" та href за потреби -->
    <a class="hero-logo-link" href="index.html">
      <img class="hero-logo" src="logo-big.png" alt="School Kingdoms — Твої знання. Твоє королівство."
           onerror="this.style.display='none';this.parentElement.classList.add('ph')">
    </a>

    <div class="cards">
      <a class="card blue" href="login.html">
        <svg class="ic" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M32 6 L54 13 L54 30 C54 43 44 52 32 56 C20 52 10 43 10 30 L10 13 Z"
                fill="url(#gold)" stroke="#7a5512" stroke-width="2.5"/>
          <g fill="#12305c">
            <circle cx="32" cy="23" r="5.2"/><path d="M23 39 a9 9 0 0 1 18 0 Z"/>
            <circle cx="20" cy="27" r="4"/><path d="M13 40 a7 7 0 0 1 14 0 Z"/>
            <circle cx="44" cy="27" r="4"/><path d="M37 40 a7 7 0 0 1 14 0 Z"/>
          </g>
        </svg>
        <div class="ctitle">Вхід — user</div>
        <div class="cdesc">Керуй завданнями та дивись прогрес дітей.</div>
      </a>

      <div class="or">або</div>

      <a class="card green" href="login.html?next=hero">
        <svg class="ic" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M40 8 L42 14 L48 16 L42 18 L40 24 L38 18 L32 16 L38 14 Z" fill="url(#gold)"/>
          <circle cx="28" cy="26" r="10" fill="url(#gold)" stroke="#7a5512" stroke-width="2.5"/>
          <path d="M10 58 a18 18 0 0 1 36 0 Z" fill="url(#gold)" stroke="#7a5512" stroke-width="2.5"/>
        </svg>
        <div class="ctitle">Вхід — Герой</div>
        <div class="cdesc">Введи свій логін і пароль — і вирушай у пригоду!</div>
      </a>
    </div>

    <a class="video" href="#video">
      <span class="play">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4 L20 12 L7 20 Z" fill="url(#gold)"/></svg>
      </span>
      <span class="vtext">
        <span class="vtitle">Дивись відео-презентацію</span>
        <span class="vsub">Дізнайся більше про School Kingdoms та можливості для твоєї дитини</span>
      </span>
    </a>
  </main>

  <!-- ── Авторедірект: лендінг бачать лише гості; залогінених кидаємо в їхній кабінет ── -->
  <script type="module" src="firebase-config.js"></script>
  <script>
  (function(){
    var tries = 0;
    (function wait(){
      if (window.SK && SK.ready){
        SK.ready.then(function(){
          if (SK.currentUser && SK.currentUser()){
            // сесія Героя → сторінка героя, інакше → кабінет user
            var dest = (SK.isHeroSession && SK.isHeroSession()) ? 'hero.html' : 'parent.html';
            location.replace(dest);
          }
        });
        return;
      }
      if (tries++ < 100) setTimeout(wait, 50);   // чекаємо, поки підвантажиться firebase-config (до ~5 с)
    })();
  })();
  </script>
</body>
</html>
